<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTT Druck Premium</title>
  <style>
    :root{
      --bg:#eef3ef;
      --surface:#ffffff;
      --text:#1a2d23;
      --muted:#6b7f74;
      --line:#d9e3dc;
      --line-strong:#c7d4ca;
      --brand:#2f8615;
      --brand-soft:#edf7ea;
      --shadow:0 12px 28px rgba(30,52,40,.08);
      --danger:#a63a32;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;padding:0;
      background:var(--bg);
      color:var(--text);
      font:15px/1.45 "Inter",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    .app{max-width:1100px;margin:0 auto;padding:22px}
    .toolbar{
      display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
      background:var(--surface);border:1px solid var(--line);border-radius:22px;
      padding:16px 18px;box-shadow:var(--shadow);margin-bottom:18px
    }
    .title h1{margin:0;font-size:22px;line-height:1.1}
    .title .sub{margin-top:4px;color:var(--muted)}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      border:1px solid var(--line-strong);background:#fff;color:var(--text);border-radius:14px;
      padding:11px 15px;font-weight:800;cursor:pointer
    }
    .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}

    .paper{
      background:#fff;border:1px solid var(--line);border-radius:24px;
      box-shadow:var(--shadow);padding:28px 30px;
    }

    .print-head{
      display:grid;grid-template-columns:220px 1fr;gap:22px;align-items:start;
      padding-bottom:18px;border-bottom:2px solid var(--line);
    }
    .logo-box{
      min-height:88px;display:flex;align-items:flex-start;justify-content:flex-start;
    }
    .logo-box img{
      max-width:180px;max-height:56px;object-fit:contain;display:block;
    }
    .doc-head-right{
      display:flex;flex-direction:column;gap:10px;
    }
    .doc-title{
      display:flex;align-items:flex-start;justify-content:space-between;gap:18px;
    }
    .doc-title h2{
      margin:0;font-size:30px;letter-spacing:-.03em;line-height:1.05;
    }
    .doc-title .muted{
      color:var(--muted);font-size:13px;text-align:right;
    }
    .status-row{
      display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    }
    .status-badge{
      display:inline-flex;align-items:center;gap:8px;padding:9px 13px;border-radius:999px;
      border:1px solid var(--line);font-weight:900;font-size:13px;background:#f8fbf8;
    }
    .studio-box{
      background:var(--brand-soft);border:1px solid #d4e9cf;border-radius:16px;padding:12px 14px;
      min-width:260px;
    }
    .studio-box .k{
      font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.35px;color:#53725f;
    }
    .studio-box .v{
      margin-top:4px;font-weight:800;
    }

    .patient-grid{
      display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:18px 0 18px;
    }
    .info-card{
      background:#fbfcfb;border:1px solid var(--line);border-radius:18px;padding:14px 15px;
    }
    .info-card.wide{grid-column:span 2}
    .info-card .k{
      font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.35px;color:#5e7968;
    }
    .info-card .v{
      margin-top:6px;font-weight:700;white-space:pre-wrap;
    }

    .section-title{
      margin:6px 0 10px;font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.35px;color:#587265;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:4px;
    }
    th,td{
      border:1px solid var(--line);
      padding:10px 12px;
      vertical-align:top;
      text-align:left;
    }
    th{
      background:#f5f8f5;
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.38px;
      color:#5f7869;
    }
    td.nr{width:44px;text-align:center;font-weight:900}
    td.date{width:115px;font-weight:800}
    td.notes{width:220px}
    .doc-footer{
      margin-top:18px;padding-top:14px;border-top:1px solid var(--line);
      display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;color:var(--muted);font-size:12px
    }
    .error{
      background:#fff2f0;border:1px solid #efc8c2;color:var(--danger);
      padding:14px 16px;border-radius:16px
    }
    .loading{padding:34px;text-align:center;color:var(--muted)}

    @media (max-width:860px){
      .print-head{grid-template-columns:1fr}
      .patient-grid{grid-template-columns:1fr 1fr}
      .info-card.wide{grid-column:auto}
    }

    @media print{
      html,body{background:#fff}
      .app{max-width:none;padding:0}
      .toolbar{display:none !important}
      .paper{
        border:none;box-shadow:none;border-radius:0;padding:0;
      }
      .print-head{gap:14px}
      @page{size:A4 portrait;margin:12mm 11mm 12mm 11mm}
    }
  </style>
</head>
<body>
<script>
(function(){
  var SESSION_KEY='fitbox_session';
  var TIMEOUT_MS=8 * 60 * 60 * 1000;
  // Session aus localStorage ODER sessionStorage lesen
  var s;
  try{
    var raw=localStorage.getItem(SESSION_KEY)||sessionStorage.getItem(SESSION_KEY);
    s=JSON.parse(raw);
    // Migrieren falls nur in sessionStorage
    if(s && !localStorage.getItem(SESSION_KEY)){
      localStorage.setItem(SESSION_KEY, raw);
    }
  }catch(e){}
  if(!s||!s.access_token||s.expires_at<Date.now()){
    // Im iframe? Parent weiterleiten, sonst direkt
    if(window.self!==window.top){
      try{window.top.location.replace('login.html');}catch(e){window.location.replace('login.html');}
    } else {
      window.location.replace('login.html');
    }
    throw new Error('AUTH');
  }
  window._fbSession=s;window._fbToken=s.access_token;
  // Auto-Logout
  var _timer;
  function resetTimer(){clearTimeout(_timer);_timer=setTimeout(function(){
    localStorage.removeItem(SESSION_KEY);sessionStorage.removeItem(SESSION_KEY);
    var msg=encodeURIComponent('Automatisch abgemeldet.');
    if(window.self!==window.top){try{window.top.location.replace('login.html?msg='+msg);}catch(e){}}
    else{window.location.replace('login.html?msg='+msg);}
  },TIMEOUT_MS);}
  ['mousemove','mousedown','keydown','scroll','touchstart','click'].forEach(function(ev){
    document.addEventListener(ev,resetTimer,{passive:true});
  });
  resetTimer();
})();
</script>
<script>
// ── fitbox Auth Guard ───────────────────────────────────────────────────────
(function(){
  var SESSION_KEY='fitbox_session';
  var TIMEOUT_MS=8 * 60 * 60 * 1000; // 8h auto-logout
  var s;try{s=JSON.parse(localStorage.getItem(SESSION_KEY))||JSON.parse(sessionStorage.getItem(SESSION_KEY));}catch(e){}
  if(!s||!s.access_token||s.expires_at<Date.now()){
    var here=encodeURIComponent(location.pathname+location.search);
    location.replace('login.html?next='+here);throw new Error('AUTH');
  }

  // ── Auto-Logout nach 8h Inaktivität ──
  var _lastActivity=Date.now();
  var _logoutTimer;
  function resetTimer(){
    _lastActivity=Date.now();
    clearTimeout(_logoutTimer);
    _logoutTimer=setTimeout(function(){
      localStorage.removeItem(SESSION_KEY);
      location.replace('login.html?msg='+encodeURIComponent('Automatisch abgemeldet (8h Inaktivität).'));
    },TIMEOUT_MS);
  }
  ['mousemove','mousedown','keydown','scroll','touchstart','click'].forEach(function(ev){
    document.addEventListener(ev,resetTimer,{passive:true});
  });
  resetTimer();

  // ── User-Badge in Topbar ──
  window.addEventListener('DOMContentLoaded',function(){
    var tb=document.querySelector('.fitbox-topbar-outer > div');
    if(!tb||tb.querySelector('#fb-user'))return;
    var sp=tb.querySelector('[style*="flex:1"]');if(sp)sp.remove();
    var emp=s.employee||{};
    var name=emp.display_name||emp.first_name||s.user.email||'User';
    var roleName=emp.roles?emp.roles.name:'';
    var ini=((emp.first_name||'')[0]+(emp.last_name||'')[0]).toUpperCase()||'?';
    var d=document.createElement('div');
    d.id='fb-user';
    d.style='display:flex;align-items:center;gap:8px;margin-left:auto';
    d.innerHTML=
      '<div style="text-align:right;line-height:1.3">'
        +'<div style="font-size:12px;font-weight:800;color:#fff">'+name+'</div>'
        +'<div style="font-size:10px;color:rgba(255,255,255,.65)">'+roleName+'</div>'
      +'</div>'
      +'<div style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.22);'
        +'border:2px solid rgba(255,255,255,.4);display:flex;align-items:center;'
        +'justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0">'+ini+'</div>'
      +'<button id="fb-logout-btn" style="appearance:none;border:1px solid rgba(255,255,255,.35);'
        +'background:rgba(255,255,255,.12);color:#fff;border-radius:8px;padding:5px 10px;'
        +'font:700 11px/1 inherit;cursor:pointer;white-space:nowrap">Abmelden</button>';
    tb.appendChild(d);
    document.getElementById('fb-logout-btn').addEventListener('click',function(){
      localStorage.removeItem(SESSION_KEY);
      location.href='login.html';
    });
  });
  window._fbToken=s.access_token;
})();
</script>
  <div class="app">
    <div class="toolbar">
      <div class="title">
        <h1>MTT Druckansicht</h1>
        <div id="statusText" class="sub">Lade Abrechnungsdaten …</div>
      </div>
      <div class="actions">
        <button class="btn" onclick="history.back()">Zurück</button>
        <button class="btn primary" onclick="window.print()">Drucken / PDF</button>
      </div>
    </div>

    <div id="content"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://jypbyywxfjniafuygxci.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_ue_bdtrmkW4NP76h114wqQ__pIkA-YU';

    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: false, autoRefreshToken: false }
    });

    const statusText = document.getElementById('statusText');
    const content = document.getElementById('content');

    const FITBOX_LOGO = 'https://fitboxmemmingen.is-best.net/images/fitbox_memmingen_logo.png';

    function esc(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function fmtDate(value) {
      if (!value) return '–';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return d.toLocaleDateString('de-DE');
    }

    function getParam(name) {
      return new URLSearchParams(location.search).get(name);
    }

    function renderError(msg) {
      statusText.textContent = 'Fehler';
      content.innerHTML = `<div class="error">${esc(msg)}</div>`;
    }

    function renderStatusBadge(status) {
      const s = String(status || '').toUpperCase();
      let style = '';
      if (s === 'READY' || s === 'ABRECHENBAR') style = 'border-color:#bcdcb4;background:#eef9ea;color:#256d16;';
      else if (s === 'BILLED' || s === 'EINGEREICHT') style = 'border-color:#f1cf98;background:#fff6e7;color:#a05d00;';
      else if (s === 'PAID' || s === 'BEZAHLT') style = 'border-color:#b9d6f3;background:#eef6ff;color:#1f5d98;';
      else style = 'border-color:#d9e3dc;background:#f8fbf8;color:#50675b;';
      return `<span class="status-badge" style="${style}">${esc(status || 'Unbekannt')}</span>`;
    }

    function studioNameFromAddress(address) {
      const a = String(address || '').toLowerCase();
      if (a.includes('senden')) return 'fitbox Senden';
      if (a.includes('memmingen')) return 'fitbox Memmingen';
      return 'fitbox Studio';
    }

    function studioCityFromAddress(address) {
      const a = String(address || '').toLowerCase();
      if (a.includes('senden')) return 'Senden';
      if (a.includes('memmingen')) return 'Memmingen';
      return '–';
    }

    function renderDocument(data) {
      const rows = Array.isArray(data.rows) ? data.rows : [];
      const periodText = data.period_from || data.period_to
        ? `${fmtDate(data.period_from)} – ${fmtDate(data.period_to)}`
        : '–';

      const studioName = data.studio_name || studioNameFromAddress(data.address);
      const studioCity = data.studio_city || studioCityFromAddress(data.address);
      const billingStatus = data.billing_status_label || data.billing_status || 'Abrechenbar';

      content.innerHTML = `
        <div class="paper">
          <div class="print-head">
            <div class="logo-box">
              <img src="${FITBOX_LOGO}" alt="fitbox Logo" />
            </div>

            <div class="doc-head-right">
              <div class="doc-title">
                <div>
                  <h2>MTT Dokumentation</h2>
                  <div class="muted">Medizinische Trainings Therapie · Abrechnungsübersicht</div>
                </div>
                <div class="muted">
                  Erstellt am ${esc(fmtDate(new Date().toISOString()))}<br>
                  Rezept-ID ${esc(String(data.prescription_id || '').slice(0, 8))}…
                </div>
              </div>

              <div class="status-row">
                <div>${renderStatusBadge(billingStatus)}</div>
                <div class="studio-box">
                  <div class="k">Studio</div>
                  <div class="v">${esc(studioName)}</div>
                  <div class="muted">${esc(studioCity)}</div>
                </div>
              </div>
            </div>
          </div>

          <div class="patient-grid">
            <div class="info-card">
              <div class="k">Patient</div>
              <div class="v">${esc(data.customer_name || '–')}</div>
            </div>
            <div class="info-card">
              <div class="k">Telefon</div>
              <div class="v">${esc(data.phone || '–')}</div>
            </div>
            <div class="info-card wide">
              <div class="k">Adresse</div>
              <div class="v">${esc(data.address || '–')}</div>
            </div>
            <div class="info-card">
              <div class="k">Rezept vom</div>
              <div class="v">${esc(fmtDate(data.prescription_issued))}</div>
            </div>
            <div class="info-card">
              <div class="k">Zeitraum</div>
              <div class="v">${esc(periodText)}</div>
            </div>
            <div class="info-card">
              <div class="k">Einheiten</div>
              <div class="v">${rows.length}/8</div>
            </div>
          </div>

          <div class="section-title">Dokumentierte Einheiten</div>
          <table>
            <thead>
              <tr>
                <th style="width:44px">Nr.</th>
                <th style="width:115px">Termin</th>
                <th>Dokumentation Wirkung / Verlauf</th>
                <th style="width:220px">Auffälligkeiten</th>
              </tr>
            </thead>
            <tbody>
              ${rows.length ? rows.map((r, i) => `
                <tr>
                  <td class="nr">${i + 1}</td>
                  <td class="date">${esc(fmtDate(r.date))}</td>
                  <td>${esc(r.documentation || '–')}</td>
                  <td class="notes">${esc(r.notes || 'Keine Auffälligkeiten')}</td>
                </tr>
              `).join('') : `
                <tr>
                  <td colspan="4">Keine Einheiten vorhanden.</td>
                </tr>
              `}
            </tbody>
          </table>

          <div class="doc-footer">
            <div>Automatisch generierte MTT-Druckansicht aus dem Studio-OS.</div>
            <div>Status zum Zeitpunkt des Drucks: ${esc(billingStatus)}</div>
          </div>
        </div>
      `;

      statusText.textContent = 'Druckansicht bereit';
    }

    async function init() {
      const prescriptionId = getParam('prescription_id');

      if (!prescriptionId) {
        renderError('Es wurde keine prescription_id übergeben.');
        return;
      }

      statusText.textContent = 'Lade Abrechnungsdaten …';
      content.innerHTML = '<div class="loading">Lade Dokument …</div>';

      const { data, error } = await client.rpc('mtt_get_billing_document_data', {
        p_prescription_id: prescriptionId
      });

      if (error) {
        console.error(error);
        renderError(error.message || 'Druckdaten konnten nicht geladen werden.');
        return;
      }

      if (!data?.ok) {
        renderError(data?.error || 'Druckdaten konnten nicht geladen werden.');
        return;
      }

      renderDocument(data);
    }

    init().catch(err => {
      console.error(err);
      renderError(err?.message || 'Unbekannter Fehler');
    });
  </script>
</body>
</html>
