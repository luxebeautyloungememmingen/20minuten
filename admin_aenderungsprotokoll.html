<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Audit Log · fitbox Admin</title>
  <style>
    :root{
      --green:#2f8615; --green2:#95c11f; --bg:#f5f7fb; --card:#fff;
      --text:#0f172a; --muted:#64748b; --line:#dbe3ee;
      --shadow:0 12px 32px rgba(15,23,42,.08);
      --ins-bg:#dcfce7; --ins-bd:#86efac; --ins-tx:#166534;
      --upd-bg:#fef9c3; --upd-bd:#fde047; --upd-tx:#854d0e;
      --del-bg:#fee2e2; --del-bd:#fca5a5; --del-tx:#991b1b;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px}

    /* ── TOPBAR ── */
    .logo{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,var(--green),#61c949);
      display:grid;place-items:center;color:#fff;font-weight:900;font-size:16px;flex-shrink:0}
    /* ── FILTER BAR ── */
    .filterbar{
      background:#fff;border-bottom:1px solid var(--line);
      padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;
    }
    input,select,button{
      border:1px solid var(--line);background:#fff;color:var(--text);
      padding:7px 11px;border-radius:9px;font:inherit;font-weight:700;
    }
    input:focus,select:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(47,134,21,.12)}
    button{cursor:pointer;font-weight:800}
    button.green{background:var(--green);color:#fff;border-color:var(--green)}
    button.soft{background:#f8fafc}
    .search-wrap{position:relative;flex:1;min-width:200px;max-width:320px}
    .search-wrap input{width:100%;padding-left:32px}
    .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px}

    /* ── WRAPPER ── */
    .wrapper{padding:16px 20px;max-width:1600px;margin:auto}

    /* ── STATS ROW ── */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
    .stat-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow)}
    .stat-val{font-size:24px;font-weight:900;line-height:1}
    .stat-lbl{font-size:11px;color:var(--muted);font-weight:700;margin-top:4px}
    .stat-card.ins .stat-val{color:var(--ins-tx)}
    .stat-card.upd .stat-val{color:var(--upd-tx)}
    .stat-card.del .stat-val{color:var(--del-tx)}

    /* ── TABLE ── */
    .table-wrap{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
    table{width:100%;border-collapse:collapse}
    thead th{
      background:#f8fafc;border-bottom:2px solid var(--line);
      padding:10px 12px;text-align:left;font-weight:800;font-size:11px;
      color:var(--muted);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;
    }
    thead th.sortable{cursor:pointer;user-select:none}
    thead th.sortable:hover{color:var(--green)}
    tbody tr{border-bottom:1px solid var(--line);transition:.1s}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:#fafbfd}
    tbody td{padding:9px 12px;vertical-align:middle}

    /* ── BADGES ── */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:800;border:1px solid transparent;white-space:nowrap}
    .badge.INSERT{background:var(--ins-bg);border-color:var(--ins-bd);color:var(--ins-tx)}
    .badge.UPDATE{background:var(--upd-bg);border-color:var(--upd-bd);color:var(--upd-tx)}
    .badge.DELETE{background:var(--del-bg);border-color:var(--del-bd);color:var(--del-tx)}
    .table-badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:800;background:#f1f5f9;color:var(--muted);font-family:monospace}

    /* ── FIELDS CHIPS ── */
    .fields{display:flex;gap:3px;flex-wrap:wrap;max-width:280px}
    .field-chip{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}

    /* ── DETAIL MODAL ── */
    .modal-back{display:none;position:fixed;inset:0;z-index:200;background:rgba(15,23,42,.45);backdrop-filter:blur(4px)}
    .modal-back.show{display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:#fff;border-radius:20px;box-shadow:0 32px 80px rgba(15,23,42,.2);width:100%;max-width:780px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
    .modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
    .modal-head h2{font-size:15px;font-weight:900;flex:1}
    .modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:4px 8px;border-radius:8px}
    .modal-close:hover{background:#f1f5f9}
    .modal-body{padding:18px 22px;overflow-y:auto;flex:1}
    .diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .diff-panel{border:1px solid var(--line);border-radius:12px;overflow:hidden}
    .diff-panel-head{padding:8px 12px;font-size:11px;font-weight:800;color:var(--muted);background:#f8fafc;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.04em}
    .diff-panel-head.old{background:var(--del-bg);color:var(--del-tx)}
    .diff-panel-head.new{background:var(--ins-bg);color:var(--ins-tx)}
    .diff-rows{padding:8px 0}
    .diff-row{display:grid;grid-template-columns:130px 1fr;gap:8px;padding:4px 12px;font-size:11px}
    .diff-row:hover{background:#f8fafc}
    .diff-key{font-weight:800;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .diff-val{color:var(--text);word-break:break-all;font-family:monospace}
    .diff-row.changed .diff-key{color:var(--green)}
    .diff-row.changed .diff-val{font-weight:700}
    .meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
    .meta-item{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
    .meta-item-lbl{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
    .meta-item-val{font-size:13px;font-weight:800;margin-top:3px;word-break:break-all}

    /* ── PAGINATION ── */
    .pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--line);background:#f8fafc}
    .page-info{font-size:12px;color:var(--muted);font-weight:700}
    .page-btns{display:flex;gap:6px}

    /* ── LOADING / TOAST ── */
    .fit-loading{display:none;position:fixed;inset:0;z-index:9999;background:rgba(255,255,255,.7);backdrop-filter:blur(4px);place-items:center}
    .fit-loading.show{display:grid}
    .fit-loadingCard{background:#fff;border-radius:18px;padding:24px 32px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);border:1px solid var(--line)}
    .fit-spinner{width:26px;height:26px;border-radius:50%;border:3px solid rgba(47,134,21,.2);border-top-color:var(--green);animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{display:none;position:fixed;bottom:20px;right:20px;background:#0f172a;color:#fff;padding:11px 16px;border-radius:11px;font-weight:700;z-index:9999}

    /* ── EMPTY ── */
    .empty{text-align:center;padding:48px;color:var(--muted)}
    .empty-icon{font-size:36px;margin-bottom:10px}

    /* ── IFRAME COMPAT ── */
    html
  
.topbar-new{
  display:flex;align-items:center;gap:14px;
  background:linear-gradient(135deg,#2f8615 0%,#256a10 100%);
  padding:0 18px;height:46px;flex-shrink:0;
  box-shadow:0 2px 12px rgba(0,0,0,.15);
  position:sticky;top:0;z-index:200;
}
.tb-pagetitle{color:#fff;font-weight:700;font-size:14px;letter-spacing:-.2px;display:flex;align-items:center;gap:8px;white-space:nowrap;flex-shrink:0;}
.tb-pagetitle-icon{font-size:16px;}
.tb-divider{width:1px;height:18px;background:rgba(255,255,255,.2);flex-shrink:0;}
.tb-stats{display:flex;align-items:center;gap:14px;font-size:12px;color:rgba(255,255,255,.85);font-weight:500;}
.tb-stat{display:flex;align-items:center;gap:5px;white-space:nowrap;}
.tb-stat-num{font-weight:700;color:#fff;}
.tb-stat-dot{width:5px;height:5px;border-radius:50%;background:#95c11f;display:inline-block;}
.tb-space{flex:1;}
#connStatus{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);}
#connStatus.ok{background:rgba(149,193,31,.25);color:#fff;border-color:rgba(149,193,31,.4);}
#connStatus.err{background:rgba(220,38,38,.3);color:#fff;border-color:rgba(220,38,38,.5);}
.topbar-btn{appearance:none;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.22);color:#fff;font:600 12px/1 inherit;padding:6px 12px;border-radius:8px;cursor:pointer;white-space:nowrap}
.topbar-btn:hover{background:rgba(255,255,255,.25)}

</style>
</head>
<body>

<!-- ═══════════ TOPBAR ═══════════ -->
<div class="topbar-new" id="topbar">
  <span class="tb-pagetitle"><span class="tb-pagetitle-icon">📋</span> Audit Log</span>
  <span class="tb-divider"></span>
  <div class="tb-stats">
    <span class="tb-stat"><span class="tb-stat-dot"></span><span class="tb-stat-num" id="stat-total">–</span> Einträge</span>
    <span class="tb-stat"><span class="tb-stat-dot" style="background:#4ade80"></span><span class="tb-stat-num" id="stat-ins">–</span> INSERT</span>
    <span class="tb-stat"><span class="tb-stat-dot" style="background:#60a5fa"></span><span class="tb-stat-num" id="stat-upd">–</span> UPDATE</span>
    <span class="tb-stat"><span class="tb-stat-dot" style="background:#f87171"></span><span class="tb-stat-num" id="stat-del">–</span> DELETE</span>
  </div>
  <div class="tb-space"></div>
  <span id="connStatus">Verbinde…</span>
  <button class="topbar-btn" onclick="exportCSV()">⬇ CSV</button>
  <button class="topbar-btn" id="reloadBtnTop">↻ Neu laden</button>
</div>

<!-- FILTER -->
<div class="filterbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Tabelle, Mitarbeiter, ID …" oninput="applyFilters()"/>
  </div>
  <select id="actionFilter" onchange="applyFilters()">
    <option value="">Alle Aktionen</option>
    <option value="INSERT">INSERT</option>
    <option value="UPDATE">UPDATE</option>
    <option value="DELETE">DELETE</option>
  </select>
  <select id="tableFilter" onchange="applyFilters()">
    <option value="">Alle Tabellen</option>
  </select>
  <select id="studioFilter" onchange="applyFilters()">
    <option value="">Alle Studios</option>
  </select>
  <input type="date" id="dateFrom" onchange="applyFilters()" title="Von"/>
  <input type="date" id="dateTo" onchange="applyFilters()" title="Bis"/>
  <button class="soft" onclick="clearFilters()">✕ Zurücksetzen</button>
  <span id="resultCount" style="margin-left:4px;font-size:12px;color:var(--muted);font-weight:700"></span>
</div>

<div class="wrapper">
  <!-- STATS -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-val" id="statTotal">–</div>
      <div class="stat-lbl">Einträge gesamt</div>
    </div>
    <div class="stat-card ins">
      <div class="stat-val" id="statIns">–</div>
      <div class="stat-lbl">Erstellt (INSERT)</div>
    </div>
    <div class="stat-card upd">
      <div class="stat-val" id="statUpd">–</div>
      <div class="stat-lbl">Geändert (UPDATE)</div>
    </div>
    <div class="stat-card del">
      <div class="stat-val" id="statDel">–</div>
      <div class="stat-lbl">Gelöscht (DELETE)</div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="sortable" onclick="sortBy('occurred_at')">Zeitpunkt ↕</th>
          <th>Aktion</th>
          <th class="sortable" onclick="sortBy('table_name')">Tabelle ↕</th>
          <th>Mitarbeiter</th>
          <th>Studio</th>
          <th>Geänderte Felder</th>
          <th style="width:60px"></th>
        </tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>
    <div class="pagination">
      <div class="page-info" id="pageInfo"></div>
      <div class="page-btns">
        <button class="soft" id="btnPrev" onclick="prevPage()">◀ Zurück</button>
        <button class="soft" id="btnNext" onclick="nextPage()">Weiter ▶</button>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-back" id="modalBack" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">Details</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- LOADING -->
<div class="fit-loading" id="fitLoading">
  <div class="fit-loadingCard">
    <div class="fit-spinner"></div>
    <span>Wird geladen …</span>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script>
// ── CONFIG ──
const SUPA_URL    = 'https://jypbyywxfjniafuygxci.supabase.co';
const SUPA_KEY    = 'sb_publishable_ue_bdtrmkW4NP76h114wqQ__pIkA-YU';
const SESSION_KEY = 'fitbox_session';

const TABLE_LABELS = {
  shift_assignments:'Schichtplanung', employee_absences:'Abwesenheiten',
  time_entries:'Zeiterfassung', time_events:'Stempeluhr', time_daily_records:'Tagesdaten',
  cash_transactions:'Kassenbuchungen', cash_closings:'Kassenabschlüsse', cash_movements:'Kassenbewegungen',
  pt_leads:'PT Leads', pt_sessions:'PT Sessions',
  mtt_customers:'MTT Kunden', mtt_prescriptions:'MTT Rezepte',
  employees:'Mitarbeiter', employee_studios:'MA-Zuordnungen'
};

// ── SESSION ──
let session, sb, studios = [];
(function(){
  try { session = JSON.parse(localStorage.getItem(SESSION_KEY)) || JSON.parse(sessionStorage.getItem(SESSION_KEY)); } catch {}
  if (!session?.access_token || session.expires_at < Date.now()) { window.location.href = 'login.html'; return; }
  const emp = session.employee || {};
  const roleCode = emp.roles?.code || '';
  const roleId   = emp.role_id || '';
  const isAdmin  = roleId === '80f04245-ee93-45e8-9861-121778b5ff84' || roleCode === 'admin';
  if (!isAdmin) { window.location.href = 'index.html'; return; }

  sb = supabase.createClient(SUPA_URL, SUPA_KEY, {
    auth: { persistSession: false, storageKey: "sb_audit_log" },
    global: { headers: { Authorization: 'Bearer ' + session.access_token } }
  });
})();

// ── STATE ──
let allRows = [], filtered = [], employees = [];
let page = 0;
const PAGE_SIZE = 50;
let sortCol = 'occurred_at', sortDir = -1;

// ── HELPERS ──
const $ = id => document.getElementById(id);
function showLoading(){ $('fitLoading').classList.add('show') }
function hideLoading(){ $('fitLoading').classList.remove('show') }
function toast(msg, dur=2500){ const t=$('toast'); t.textContent=msg; t.style.display='block'; clearTimeout(window._tt); window._tt=setTimeout(()=>t.style.display='none',dur); }
function esc(s){ return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;') }
function fmtDate(iso){
  if(!iso) return '–';
  const d = new Date(iso);
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' +
         d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function empName(id){ return employees.find(e=>e.id===id)?.display_name || id?.slice(0,8)+'…' || '–' }
function studioName(id){ return studios.find(s=>s.id===id)?.name || id?.slice(0,8)+'…' || '–' }

// ── LOAD ──
async function loadData(){
  showLoading();
  try {
    // Studios
    const { data: st } = await sb.from('studios').select('id,name').order('name');
    studios = st || [];
    const stSel = $('studioFilter');
    stSel.innerHTML = '<option value="">Alle Studios</option>' + studios.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');

    // Employees
    const { data: em } = await sb.from('employees').select('id,display_name').order('display_name');
    employees = em || [];

    // Audit log — max 2000 letzte Einträge
    const { data, error } = await sb.from('audit_log')
      .select('id,occurred_at,table_name,record_id,action,studio_id,employee_id,old_data,new_data,changed_fields')
      .order('occurred_at', { ascending: false })
      .limit(2000);
    if (error) throw error;
    allRows = data || [];

    // Tabellen-Dropdown befüllen
    const tables = [...new Set(allRows.map(r=>r.table_name))].sort();
    $('tableFilter').innerHTML = '<option value="">Alle Tabellen</option>' + tables.map(t=>`<option value="${t}">${TABLE_LABELS[t]||t}</option>`).join('');

    applyFilters();
    updateStats(allRows);
  } catch(e){
    toast('⚠ ' + e.message);
  } finally {
    hideLoading();
  }
}

function updateStats(rows){
  $('statTotal').textContent = rows.length.toLocaleString('de-DE');
  var sT=document.getElementById('stat-total');if(sT)sT.textContent=rows.length.toLocaleString('de-DE');
  var sI=document.getElementById('stat-ins');if(sI)sI.textContent=rows.filter(r=>r.action==='INSERT').length;
  var sU=document.getElementById('stat-upd');if(sU)sU.textContent=rows.filter(r=>r.action==='UPDATE').length;
  var sD=document.getElementById('stat-del');if(sD)sD.textContent=rows.filter(r=>r.action==='DELETE').length;
  var cs=document.getElementById('connStatus');if(cs){cs.textContent='Verbunden';cs.className='ok';}
  $('statIns').textContent   = rows.filter(r=>r.action==='INSERT').length.toLocaleString('de-DE');
  $('statUpd').textContent   = rows.filter(r=>r.action==='UPDATE').length.toLocaleString('de-DE');
  $('statDel').textContent   = rows.filter(r=>r.action==='DELETE').length.toLocaleString('de-DE');
}

// ── FILTER ──
function applyFilters(){
  const search  = $('searchInput').value.toLowerCase();
  const action  = $('actionFilter').value;
  const table   = $('tableFilter').value;
  const studio  = $('studioFilter').value;
  const dateFrom= $('dateFrom').value;
  const dateTo  = $('dateTo').value;

  filtered = allRows.filter(r => {
    if (action && r.action !== action) return false;
    if (table  && r.table_name !== table) return false;
    if (studio && r.studio_id !== studio) return false;
    if (dateFrom && r.occurred_at < dateFrom) return false;
    if (dateTo   && r.occurred_at > dateTo + 'T23:59:59') return false;
    if (search){
      const haystack = [
        r.table_name, r.action, r.record_id,
        empName(r.employee_id), studioName(r.studio_id),
        ...(r.changed_fields||[])
      ].join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  // Sort
  filtered.sort((a,b) => {
    const va = a[sortCol] ?? '';
    const vb = b[sortCol] ?? '';
    return va < vb ? -sortDir : va > vb ? sortDir : 0;
  });

  $('resultCount').textContent = filtered.length !== allRows.length ? `${filtered.length} Treffer` : '';
  page = 0;
  renderTable();
}

function clearFilters(){
  ['searchInput','actionFilter','tableFilter','studioFilter','dateFrom','dateTo'].forEach(id=>{ $(id).value=''; });
  applyFilters();
}

function sortBy(col){
  if(sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=-1; }
  applyFilters();
}

// ── RENDER ──
function renderTable(){
  const start = page * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);
  const total = filtered.length;
  const pages = Math.ceil(total / PAGE_SIZE);

  $('pageInfo').textContent = `${start+1}–${Math.min(start+PAGE_SIZE,total)} von ${total}`;
  $('btnPrev').disabled = page === 0;
  $('btnNext').disabled = page >= pages - 1;

  if (!slice.length){
    $('logBody').innerHTML = `<tr><td colspan="7"><div class="empty"><div class="empty-icon">📋</div>Keine Einträge gefunden</div></td></tr>`;
    return;
  }

  $('logBody').innerHTML = slice.map(r => {
    const fields = (r.changed_fields||[]).slice(0,4);
    const fieldsMore = (r.changed_fields||[]).length > 4 ? `<span style="font-size:10px;color:var(--muted)">+${r.changed_fields.length-4}</span>` : '';
    return `<tr>
      <td style="white-space:nowrap;color:var(--muted)">${fmtDate(r.occurred_at)}</td>
      <td><span class="badge ${r.action}">${r.action}</span></td>
      <td><span class="table-badge">${TABLE_LABELS[r.table_name]||r.table_name}</span></td>
      <td style="font-weight:700">${esc(empName(r.employee_id))}</td>
      <td style="color:var(--muted)">${esc(studioName(r.studio_id))}</td>
      <td><div class="fields">${fields.map(f=>`<span class="field-chip">${esc(f)}</span>`).join('')}${fieldsMore}</div></td>
      <td><button class="soft" style="padding:5px 10px;font-size:11px" onclick="showDetail(${r.id})">Detail</button></td>
    </tr>`;
  }).join('');
}

function prevPage(){ if(page>0){ page--; renderTable(); } }
function nextPage(){ const pages=Math.ceil(filtered.length/PAGE_SIZE); if(page<pages-1){ page++; renderTable(); } }

// ── DETAIL MODAL ──
function showDetail(id){
  const r = allRows.find(x=>x.id===id);
  if(!r) return;

  const changedSet = new Set(r.changed_fields||[]);

  function renderPanel(data, label, cls){
    if(!data) return `<div class="diff-panel"><div class="diff-panel-head ${cls}">${label}</div><div style="padding:16px;color:var(--muted);font-size:12px">—</div></div>`;
    const rows = Object.entries(data).map(([k,v])=>{
      const isChanged = changedSet.has(k);
      return `<div class="diff-row ${isChanged?'changed':''}">
        <div class="diff-key">${esc(k)}</div>
        <div class="diff-val">${esc(v===null?'NULL':JSON.stringify(v))}</div>
      </div>`;
    }).join('');
    return `<div class="diff-panel"><div class="diff-panel-head ${cls}">${label}</div><div class="diff-rows">${rows}</div></div>`;
  }

  $('modalTitle').textContent = `${r.action} · ${TABLE_LABELS[r.table_name]||r.table_name}`;
  $('modalBody').innerHTML = `
    <div class="meta-grid">
      <div class="meta-item"><div class="meta-item-lbl">Zeitpunkt</div><div class="meta-item-val">${fmtDate(r.occurred_at)}</div></div>
      <div class="meta-item"><div class="meta-item-lbl">Mitarbeiter</div><div class="meta-item-val">${esc(empName(r.employee_id))}</div></div>
      <div class="meta-item"><div class="meta-item-lbl">Studio</div><div class="meta-item-val">${esc(studioName(r.studio_id))}</div></div>
      <div class="meta-item"><div class="meta-item-lbl">Tabelle</div><div class="meta-item-val" style="font-family:monospace">${esc(r.table_name)}</div></div>
      <div class="meta-item"><div class="meta-item-lbl">Record ID</div><div class="meta-item-val" style="font-family:monospace;font-size:11px">${esc(r.record_id)}</div></div>
      <div class="meta-item"><div class="meta-item-lbl">Aktion</div><div class="meta-item-val"><span class="badge ${r.action}">${r.action}</span></div></div>
    </div>
    ${r.changed_fields?.length ? `<div style="margin-bottom:12px"><strong style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em">Geänderte Felder:</strong> <div class="fields" style="display:inline-flex;margin-left:8px">${r.changed_fields.map(f=>`<span class="field-chip">${esc(f)}</span>`).join('')}</div></div>` : ''}
    <div class="diff-grid">
      ${renderPanel(r.old_data, 'Vorher (OLD)', 'old')}
      ${renderPanel(r.new_data, 'Nachher (NEW)', 'new')}
    </div>`;

  $('modalBack').classList.add('show');
}
function closeModal(){ $('modalBack').classList.remove('show'); }

// ── CSV EXPORT ──
function exportCSV(){
  const rows = [
    ['Zeitpunkt','Aktion','Tabelle','Mitarbeiter','Studio','Geänderte Felder','Record ID'],
    ...filtered.map(r => [
      fmtDate(r.occurred_at), r.action,
      TABLE_LABELS[r.table_name]||r.table_name,
      empName(r.employee_id), studioName(r.studio_id),
      (r.changed_fields||[]).join(';'), r.record_id
    ])
  ];
  const csv = rows.map(r=>r.map(v=>`"${String(v??'').replaceAll('"','""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download = `audit_log_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── IFRAME COMPAT ──
if(window.self !== window.top) document.documentElement.classList.add('in-iframe');

// ── INIT ──
if(sb){ loadData(); var rBtn=document.getElementById("reloadBtnTop");if(rBtn)rBtn.addEventListener("click",loadData); }
