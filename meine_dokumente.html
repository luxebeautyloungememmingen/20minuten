<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Dokumente | fitbox Studio OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --fit: #2f8615; --fit2: #95c11f;
    --bg: #f5f7f2; --card: #fff; --border: #e0e8d8;
    --text: #1a2a14; --muted: #6b7c61;
    --radius: 10px; --shadow: 0 2px 12px rgba(47,134,21,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

  header{display:none}

  .container { max-width: 860px; margin: 0; padding: 24px 16px; }

  .filter-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .ftab { padding: 7px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: #fff; font-size: .82rem; font-weight: 600; cursor: pointer; color: var(--muted); transition: all .2s; }
  .ftab.active { background: var(--fit); color: #fff; border-color: var(--fit); }

  .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }

  .doc-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 18px; transition: transform .15s, box-shadow .15s;
    cursor: pointer;
  }
  .doc-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(47,134,21,.12); }

  .doc-card-icon { font-size: 2.2rem; margin-bottom: 10px; }
  .doc-card-type { margin-bottom: 6px; }
  .doc-card-titel { font-weight: 700; font-size: .95rem; margin-bottom: 4px; }
  .doc-card-meta { font-size: .78rem; color: var(--muted); }
  .doc-card-actions { display: flex; gap: 8px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }

  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .72rem; font-weight: 600; }
  .badge-arbeitsvertrag { background: #d1ecf1; color: #0c5460; }
  .badge-vertragsaenderung { background: #cce5ff; color: #004085; }
  .badge-zeugnis { background: #d4edda; color: #155724; }
  .badge-zertifikat { background: #e2d9f3; color: #4a235a; }
  .badge-au_schein { background: #fff3cd; color: #856404; }
  .badge-lohnabrechnung { background: #f8d7da; color: #721c24; }
  .badge-sonstiges { background: #e2e3e5; color: #383d41; }

  .btn { padding: 7px 14px; border-radius: 7px; border: none; font-size: .82rem; font-weight: 600; cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 5px; flex: 1; justify-content: center; }
  .btn-ghost { background: #f0f5eb; color: var(--fit); border: 1px solid var(--border); }
  .btn-ghost:hover { background: #e0edcf; }
  .btn-primary { background: var(--fit); color: #fff; }
  .btn-primary:hover { background: #247010; }

  .empty { text-align: center; padding: 60px; color: var(--muted); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 24px; width: 700px; max-width: 96vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,.18); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-header h3 { font-size: 1rem; font-weight: 700; }
  .btn-close { background: #eee; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: .85rem; }

  @media (max-width: 500px) { .doc-grid { grid-template-columns: 1fr; } }
.topbar-outer{background:linear-gradient(135deg,#2f8615 0%,#256a10 100%);box-shadow:0 2px 12px rgba(0,0,0,.15);position:sticky;top:0;z-index:200;}
.topbar{max-width:none;margin:0;height:46px;display:flex;align-items:center;flex-wrap:nowrap;padding:0 18px;gap:14px;overflow:hidden;}
.tb-pagetitle{color:#fff;font-weight:700;font-size:14px;letter-spacing:-.2px;display:flex;align-items:center;gap:8px;flex-shrink:0;white-space:nowrap;}
.tb-pagetitle-icon{font-size:16px;}
.tb-divider{width:1px;height:18px;background:rgba(255,255,255,.2);}
.tb-stats{display:flex;align-items:center;gap:14px;font-size:12px;color:rgba(255,255,255,.85);font-weight:500;}
.tb-stat{display:flex;align-items:center;gap:5px;white-space:nowrap;}
.tb-stat-num{font-weight:700;color:#fff;}
.tb-stat-dot{width:5px;height:5px;border-radius:50%;background:#95c11f;display:inline-block;}
.topbar-spacer{flex:1}
</style>
</head>
<body>

<script>
if(window.self!==window.top){
  document.documentElement.classList.add('in-iframe');
  document.addEventListener('DOMContentLoaded',function(){
    document.body.classList.add('in-iframe');
    document.body.style.background='#f5f7f4';
    document.body.style.display='block';
    var to=document.querySelector('.topbar-outer');
    if(to){ to.style.width='100%'; }
    var pg=document.querySelector('.container');
    if(pg){ pg.style.maxWidth='none';pg.style.width='auto';pg.style.margin='0'; }
  });
}
</script>
<script>
(function(){
  var SK='fitbox_session';var TM=8*60*60*1000;var s;
  try{var r=localStorage.getItem(SK)||sessionStorage.getItem(SK);s=JSON.parse(r);if(s&&!localStorage.getItem(SK))localStorage.setItem(SK,r);}catch(e){}
  if(!s||!s.access_token||s.expires_at<Date.now()){
    if(window.self!==window.top){try{window.top.location.replace('login.html');}catch(e){window.location.replace('login.html');}}
    else{window.location.replace('login.html');}
    throw new Error('AUTH');
  }
  window._fbSession=s;window._fbToken=s.access_token;
  var _t;
  function resetTimer(){clearTimeout(_t);_t=setTimeout(function(){localStorage.removeItem(SK);sessionStorage.removeItem(SK);window.location.replace('login.html?msg='+encodeURIComponent('Automatisch abgemeldet (8h Inaktivität).'));},TM);}
  ['mousemove','mousedown','keydown','scroll','touchstart','click'].forEach(function(ev){document.addEventListener(ev,resetTimer,{passive:true});});
  resetTimer();
})();
</script>

<div class="topbar-outer"><div class="topbar">
  <span class="tb-pagetitle"><span class="tb-pagetitle-icon">📁</span> Meine Dokumente</span>
  <span class="tb-divider"></span>
  <div class="tb-stats">
    <span class="tb-stat" id="stat-datum">–</span>
    <span class="tb-stat"><span class="tb-stat-dot"></span><span class="tb-stat-num" id="stat-uhrzeit">–:–</span></span>
  </div>
  <div class="topbar-spacer"></div>
</div></div>

<script>
(function(){
  function pad(n){return n<10?'0'+n:n;}
  function tick(){
    var now=new Date();
    var months=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
    var weekdays=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
    var dEl=document.getElementById('stat-datum');
    var tEl=document.getElementById('stat-uhrzeit');
    if(dEl) dEl.textContent=weekdays[now.getDay()]+', '+now.getDate()+'. '+months[now.getMonth()];
    if(tEl) tEl.textContent=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  }
  document.addEventListener('DOMContentLoaded',function(){tick();setInterval(tick,1000);});
})();
</script>

<div class="container">
  <div class="filter-tabs" id="filter-tabs">
    <button class="ftab active" onclick="setFilter('')">Alle</button>
    <button class="ftab" onclick="setFilter('arbeitsvertrag')">📄 Arbeitsvertrag</button>
    <button class="ftab" onclick="setFilter('zeugnis')">🎓 Zeugnis</button>
    <button class="ftab" onclick="setFilter('zertifikat')">🏅 Zertifikat</button>
    <button class="ftab" onclick="setFilter('au_schein')">🏥 AU-Schein</button>
    <button class="ftab" onclick="setFilter('sonstiges')">📎 Sonstiges</button>
  </div>
  <div id="doc-grid" class="doc-grid"><div class="empty">Lade...</div></div>
</div>

<!-- Vorschau Modal -->
<div class="modal-overlay" id="preview-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="preview-title">Dokument</h3>
      <button class="btn-close" onclick="closePreview()">✕ Schließen</button>
    </div>
    <iframe id="preview-frame" style="width:100%;height:480px;border:1px solid var(--border);border-radius:8px"></iframe>
    <div id="preview-img-wrap" style="display:none;text-align:center">
      <img id="preview-img" style="max-width:100%;border-radius:8px">
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://jypbyywxfjniafuygxci.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ue_bdtrmkW4NP76h114wqQ__pIkA-YU';

let sb, session, allDocs = [], currentFilter = '';

const DOC_LABELS = {
  arbeitsvertrag: '📄 Arbeitsvertrag', vertragsaenderung: '📝 Vertragsänderung',
  zeugnis: '🎓 Zeugnis', zertifikat: '🏅 Zertifikat',
  au_schein: '🏥 AU-Schein', lohnabrechnung: '💶 Lohnabrechnung', sonstiges: '📎 Sonstiges'
};

async function init() {
  const stored = window._fbSession || JSON.parse(localStorage.getItem('fitbox_session') || 'null');
  if (!stored) { alert('Bitte einloggen.'); return; }
  session = stored;
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: false, autoRefreshToken: false },
    global: { headers: { Authorization: `Bearer ${session.access_token}` } }
  });

  const { data: emp } = await sb.from('employees')
    .select('id, first_name, last_name').eq('auth_user_id', session.user.id).single();

  const { data } = await sb.from('employee_documents')
    .select('*')
    .eq('sichtbar_fuer_ma', true)
    .order('created_at', { ascending: false });
  allDocs = data || [];
  renderDocs();
}

function setFilter(type) {
  currentFilter = type;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderDocs();
}

function renderDocs() {
  const docs = currentFilter ? allDocs.filter(d => d.doc_type === currentFilter) : allDocs;
  const grid = document.getElementById('doc-grid');

  if (!docs.length) {
    grid.innerHTML = '<div class="empty">📭 Keine Dokumente vorhanden.</div>';
    return;
  }

  const ext2icon = ext => ['jpg','jpeg','png','webp'].includes(ext) ? '🖼️' : ext === 'pdf' ? '📄' : '📝';

  grid.innerHTML = docs.map(d => {
    const ext = d.dateiname.split('.').pop().toLowerCase();
    const icon = ext2icon(ext);
    const von = d.gueltig_ab ? new Date(d.gueltig_ab).toLocaleDateString('de-DE') : '';
    const bis = d.gueltig_bis ? new Date(d.gueltig_bis).toLocaleDateString('de-DE') : '';
    const zeitraum = von && bis ? `${von} – ${bis}` : von || '';
    const created = new Date(d.created_at).toLocaleDateString('de-DE');
    const size = d.dateigroesse_kb ? (d.dateigroesse_kb > 1024 ? `${(d.dateigroesse_kb/1024).toFixed(1)} MB` : `${d.dateigroesse_kb} KB`) : '';

    return `<div class="doc-card">
      <div class="doc-card-icon">${icon}</div>
      <div class="doc-card-type"><span class="badge badge-${d.doc_type}">${DOC_LABELS[d.doc_type] || d.doc_type}</span></div>
      <div class="doc-card-titel">${d.titel}</div>
      ${d.beschreibung ? `<div class="doc-card-meta">${d.beschreibung}</div>` : ''}
      ${zeitraum ? `<div class="doc-card-meta">📅 ${zeitraum}</div>` : ''}
      <div class="doc-card-meta">Hochgeladen: ${created} ${size ? '· ' + size : ''}</div>
      <div class="doc-card-actions">
        <button class="btn btn-ghost" onclick="viewDoc('${d.storage_path}','${d.dateiname}')">👁 Ansehen</button>
        <button class="btn btn-primary" onclick="downloadDoc('${d.storage_path}','${d.dateiname}')">⬇️ Download</button>
      </div>
    </div>`;
  }).join('');
}

async function viewDoc(path, name) {
  const { data } = await sb.storage.from('employee-documents').createSignedUrl(path, 120);
  if (!data?.signedUrl) return alert('Vorschau nicht möglich.');
  document.getElementById('preview-title').textContent = name;
  const ext = name.split('.').pop().toLowerCase();
  const frame = document.getElementById('preview-frame');
  const imgWrap = document.getElementById('preview-img-wrap');
  if (['jpg','jpeg','png','webp'].includes(ext)) {
    frame.style.display = 'none'; imgWrap.style.display = 'block';
    document.getElementById('preview-img').src = data.signedUrl;
  } else {
    imgWrap.style.display = 'none'; frame.style.display = 'block';
    frame.src = data.signedUrl;
  }
  document.getElementById('preview-modal').classList.add('open');
}

function closePreview() {
  document.getElementById('preview-modal').classList.remove('open');
  document.getElementById('preview-frame').src = '';
}

async function downloadDoc(path, name) {
  const { data } = await sb.storage.from('employee-documents').createSignedUrl(path, 60);
  if (!data?.signedUrl) return alert('Download nicht möglich.');
  const a = document.createElement('a'); a.href = data.signedUrl; a.download = name; a.click();
}

document.getElementById('preview-modal').addEventListener('click', function(e) { if (e.target === this) closePreview(); });
init();

window.setFilter = setFilter;
window.viewDoc = viewDoc;
window.closePreview = closePreview;
window.downloadDoc = downloadDoc;

</script>
</body>
</html>
