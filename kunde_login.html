<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Mein fitbox – Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#2f8615;--brand-dark:#236010;
  --brand-soft:#eef7e9;--brand-line:#d4eacc;
  --bg:#f5f7f4;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e4e9e2;
  --font:'DM Sans',system-ui,sans-serif;--radius:16px;
  --shadow-md:0 8px 28px rgba(16,40,12,.13);
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px 20px;-webkit-tap-highlight-color:transparent}
.wrap{width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;gap:32px}
.logo-area{display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center}
.logo-mark{width:68px;height:68px;border-radius:20px;background:var(--brand);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(47,134,21,.35)}
.logo-title{font-size:26px;font-weight:900;letter-spacing:-.02em}
.logo-title span{color:var(--brand)}
.logo-sub{font-size:14px;color:var(--muted);line-height:1.5;max-width:280px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:28px 24px 24px;box-shadow:var(--shadow-md);width:100%}
.card-title{font-size:17px;font-weight:800;margin-bottom:6px}
.card-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.field input{width:100%;height:48px;border:1.5px solid var(--line);border-radius:12px;padding:0 14px;font:500 15px/1 var(--font);color:var(--text);background:#fff;outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--brand)}
.field input::placeholder{color:#b0b8c1}
.otp-field{height:64px;letter-spacing:.3em;text-align:center;font-size:28px;font-weight:900;padding:0 8px}
.btn{width:100%;height:50px;background:var(--brand);color:#fff;border:none;border-radius:12px;font:800 15px/1 var(--font);cursor:pointer;transition:background .15s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent}
.btn:hover{background:var(--brand-dark)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:none;border:none;color:var(--muted);font:600 13px/1 var(--font);cursor:pointer;padding:12px;width:100%;text-align:center;margin-top:4px;text-decoration:underline}
.msg{display:none;padding:13px 15px;border-radius:11px;font-size:13px;font-weight:600;line-height:1.5;margin-top:14px}
.msg.ok{background:var(--brand-soft);color:var(--brand-dark);border:1px solid var(--brand-line);display:block}
.msg.err{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;display:block}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.email-chip{background:var(--brand-soft);border:1px solid var(--brand-line);color:var(--brand-dark);font:700 12px/1 var(--font);padding:6px 12px;border-radius:999px;display:inline-block;margin-bottom:16px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.step{display:none}
.step.active{display:block}
.footer-note{font-size:12px;color:var(--muted);text-align:center;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-area">
    <div class="logo-mark">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <rect x="4" y="15" width="6" height="6" rx="2" fill="rgba(255,255,255,.5)"/>
        <rect x="4" y="10" width="6" height="4" rx="1.5" fill="#fff"/>
        <rect x="4" y="22" width="6" height="4" rx="1.5" fill="#fff"/>
        <rect x="26" y="15" width="6" height="6" rx="2" fill="rgba(255,255,255,.5)"/>
        <rect x="26" y="10" width="6" height="4" rx="1.5" fill="#fff"/>
        <rect x="26" y="22" width="6" height="4" rx="1.5" fill="#fff"/>
        <rect x="11" y="12" width="14" height="12" rx="3" fill="#fff"/>
      </svg>
    </div>
    <div>
      <div class="logo-title">mein <span>fitbox</span></div>
      <div class="logo-sub">Dein persönliches Portal für Analysen &amp; Trainingsfortschritt</div>
    </div>
  </div>

  <div class="card">
    <!-- SCHRITT 1 -->
    <div class="step active" id="step1">
      <div class="card-title">Anmelden</div>
      <div class="card-desc">Gib deine E-Mail ein. Wir schicken dir einen 6-stelligen Code — kein Passwort nötig.</div>
      <div class="field">
        <label>E-Mail-Adresse</label>
        <input type="email" id="email-input" placeholder="deine@email.de" autocomplete="email" inputmode="email"/>
      </div>
      <button class="btn" id="btn-send">Code anfordern</button>
      <div class="msg" id="msg1"></div>
    </div>

    <!-- SCHRITT 2 -->
    <div class="step" id="step2">
      <div class="card-title">Code eingeben</div>
      <div class="card-desc">Wir haben dir einen 6-stelligen Code geschickt.</div>
      <div id="chip-wrap"></div>
      <div class="field">
        <label>Einmal-Code</label>
        <input type="text" id="otp-input" class="otp-field" placeholder="000000" inputmode="numeric" maxlength="6" autocomplete="one-time-code"/>
      </div>
      <button class="btn" id="btn-verify">Anmelden</button>
      <button class="btn-ghost" id="btn-back">Andere E-Mail verwenden</button>
      <div class="msg" id="msg2"></div>
    </div>
  </div>

  <div class="footer-note">Nur für fitbox-Mitglieder.<br/>Probleme? Ruf uns an oder schreib uns.</div>
</div>

<script>
const SUPA_URL = 'https://jypbyywxfjniafuygxci.supabase.co';
const SUPA_KEY = 'sb_publishable_ue_bdtrmkW4NP76h114wqQ__pIkA-YU';
const EDGE_URL = SUPA_URL + '/functions/v1';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let currentEmail = '';

// Session prüfen
sb.auth.getSession().then(({data}) => {
  if (data.session) location.replace('kunde_portal.html');
});

function showMsg(id, type, text) {
  const el = document.getElementById(id);
  el.className = 'msg ' + type;
  el.textContent = text;
}
function clearMsg(id) { document.getElementById(id).className = 'msg'; }
function setLoading(btn, on, label) {
  btn.disabled = on;
  btn.innerHTML = on ? '<span class="spinner"></span>Bitte warten…' : label;
}

// SCHRITT 1: Code anfordern via Edge Function
const btnSend = document.getElementById('btn-send');
btnSend.addEventListener('click', async () => {
  const email = document.getElementById('email-input').value.trim().toLowerCase();
  if (!email || !email.includes('@')) { showMsg('msg1','err','Bitte gültige E-Mail eingeben.'); return; }

  setLoading(btnSend, true, 'Code anfordern');
  clearMsg('msg1');

  try {
    const res = await fetch(EDGE_URL + '/send-kunde-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPA_KEY },
      body: JSON.stringify({ email })
    });

    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      if (res.status === 404) {
        showMsg('msg1','err','Diese E-Mail ist uns nicht bekannt. Bitte wende dich an dein Studio.');
      } else {
        showMsg('msg1','err','Fehler beim Senden. Bitte versuche es erneut.');
      }
      setLoading(btnSend, false, 'Code anfordern');
      return;
    }

    currentEmail = email;
    document.getElementById('chip-wrap').innerHTML = '<div class="email-chip">&#128231; ' + email + '</div>';
    document.getElementById('step1').classList.remove('active');
    document.getElementById('step2').classList.add('active');
    setTimeout(() => document.getElementById('otp-input').focus(), 100);

  } catch(e) {
    showMsg('msg1','err','Netzwerkfehler. Bitte versuche es erneut.');
  }

  setLoading(btnSend, false, 'Code anfordern');
});

document.getElementById('email-input').addEventListener('keydown', e => { if(e.key==='Enter') btnSend.click(); });

// SCHRITT 2: Code prüfen via DB-Funktion, dann weiterleiten
const btnVerify = document.getElementById('btn-verify');
btnVerify.addEventListener('click', async () => {
  const code = document.getElementById('otp-input').value.replace(/\D/g,'');
  if (code.length !== 6) { showMsg('msg2','err','Bitte den 6-stelligen Code eingeben.'); return; }

  setLoading(btnVerify, true, 'Anmelden');
  clearMsg('msg2');

  try {
    const { data: valid, error } = await sb.rpc('verify_kunde_otp', {
      p_email: currentEmail,
      p_code: code
    });

    if (error || !valid) {
      showMsg('msg2','err','Code ungültig oder abgelaufen. Bitte erneut versuchen.');
      setLoading(btnVerify, false, 'Anmelden');
      return;
    }

    // Code gültig → Session im sessionStorage speichern & weiterleiten
    sessionStorage.setItem('kunde_email', currentEmail);
    sessionStorage.setItem('kunde_verified', '1');
    location.replace('kunde_portal.html');

  } catch(e) {
    showMsg('msg2','err','Fehler. Bitte versuche es erneut.');
    setLoading(btnVerify, false, 'Anmelden');
  }
});

document.getElementById('otp-input').addEventListener('input', e => {
  e.target.value = e.target.value.replace(/\D/g,'');
  if(e.target.value.length === 6) btnVerify.click();
});
document.getElementById('otp-input').addEventListener('keydown', e => { if(e.key==='Enter') btnVerify.click(); });

document.getElementById('btn-back').addEventListener('click', () => {
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step1').classList.add('active');
  document.getElementById('otp-input').value = '';
  clearMsg('msg2');
});
</script>
</body>
</html>
