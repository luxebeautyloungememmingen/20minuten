<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>mein fitbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g1:#95c11f;--g2:#2f8615;--g3:#1a4d0a;
  --bg:#080c07;--bg2:#0e1510;--bg3:#141d10;
  --card:#111a0d;--card2:#162012;
  --border:rgba(149,193,31,.12);--border2:rgba(149,193,31,.22);
  --text:#f0f4ee;--text2:#a8b8a4;--text3:#5a6e56;
  --font:'Outfit',sans-serif;--display:'Bebas Neue',sans-serif;--mono:'JetBrains Mono',monospace;
  --tab-h:68px;--radius:16px;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;-webkit-tap-highlight-color:transparent;overflow:hidden}

/* GRAIN OVERLAY */
body::before{content:'';position:fixed;inset:0;opacity:.03;pointer-events:none;z-index:9999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat:repeat;background-size:128px;}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;position:relative;overflow:hidden}

/* AMBIENT GLOW */
.app::after{content:'';position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:300px;height:300px;background:radial-gradient(circle,rgba(47,134,21,.18) 0%,transparent 70%);pointer-events:none;z-index:0}

/* HEADER */
.header{flex-shrink:0;padding:20px 20px 0;position:relative;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--g1),var(--g2));border-radius:9px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(149,193,31,.3)}
.logo-icon svg{width:18px;height:18px}
.logo-text{font-family:var(--display);font-size:20px;letter-spacing:.03em;color:var(--text)}
.logo-text span{color:var(--g1)}
.btn-logout{background:rgba(149,193,31,.08);border:1px solid var(--border);color:var(--text2);font:600 11px/1 var(--font);padding:7px 12px;border-radius:8px;cursor:pointer;transition:all .2s;letter-spacing:.03em}
.btn-logout:hover{background:rgba(149,193,31,.15);color:var(--text)}

/* HERO */
.hero{padding:0 20px 24px;position:relative;z-index:1}
.hero-greeting{font-family:var(--display);font-size:42px;letter-spacing:.02em;line-height:.95;color:var(--text);margin-bottom:6px}
.hero-greeting .accent{color:var(--g1)}
.hero-meta{display:flex;align-items:center;gap:10px}
.hero-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(149,193,31,.1);border:1px solid var(--border2);color:var(--g1);font:600 11px/1 var(--font);padding:5px 10px;border-radius:999px;letter-spacing:.04em}
.hero-badge::before{content:'';width:6px;height:6px;background:var(--g1);border-radius:50%;box-shadow:0 0 8px var(--g1);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}
.hero-nr{font:500 11px/1 var(--mono);color:var(--text3);letter-spacing:.06em}

/* DIVIDER */
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:0 20px}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:20px 20px calc(var(--tab-h) + 24px);position:relative;z-index:1}
.scroll-area::-webkit-scrollbar{display:none}

/* SECTION */
.sec{margin-bottom:28px}
.sec-label{font:700 10px/1 var(--mono);letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:10px;position:relative;overflow:hidden;transition:border-color .2s}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(149,193,31,.04),transparent 60%);pointer-events:none}
.card:last-child{margin-bottom:0}
.card:hover{border-color:var(--border2)}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px 14px 12px;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--g2),var(--g1))}
.stat-val{font-family:var(--display);font-size:36px;letter-spacing:.02em;line-height:1;color:var(--text);margin-bottom:2px}
.stat-val .unit{font-family:var(--font);font-size:13px;font-weight:600;color:var(--text3);margin-left:2px}
.stat-label{font:500 11px/1 var(--font);color:var(--text3);letter-spacing:.02em}
.stat-delta{position:absolute;top:14px;right:12px;font:700 10px/1 var(--mono);padding:3px 6px;border-radius:5px}
.stat-delta.up{background:rgba(149,193,31,.15);color:var(--g1)}
.stat-delta.down{background:rgba(220,38,38,.12);color:#f87171}

/* PROGRESS RING */
.ring-wrap{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.ring-svg{flex-shrink:0}
.ring-info{flex:1}
.ring-title{font:700 15px/1.2 var(--font);color:var(--text);margin-bottom:4px}
.ring-sub{font:400 12px/1.5 var(--font);color:var(--text2)}

/* PROGRESS BAR */
.bar-wrap{margin-bottom:12px}
.bar-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.bar-label{font:600 12px/1 var(--font);color:var(--text2)}
.bar-val{font:600 12px/1 var(--mono);color:var(--g1)}
.bar-track{height:5px;background:var(--bg3);border-radius:999px;overflow:hidden}
.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--g2),var(--g1));transition:width .8s cubic-bezier(.34,1.56,.64,1)}

/* TIMELINE */
.timeline{position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;width:1px;background:linear-gradient(180deg,var(--g2),transparent)}
.tl-item{position:relative;margin-bottom:16px}
.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-20px;top:4px;width:13px;height:13px;border-radius:50%;background:var(--bg3);border:2px solid var(--g2);box-shadow:0 0 8px rgba(47,134,21,.4)}
.tl-dot.active{background:var(--g2);box-shadow:0 0 12px rgba(149,193,31,.5)}
.tl-date{font:500 10px/1 var(--mono);color:var(--text3);letter-spacing:.06em;margin-bottom:4px}
.tl-val{font:700 13px/1 var(--font);color:var(--text);margin-bottom:2px}
.tl-note{font:400 11px/1.5 var(--font);color:var(--text2)}

/* MACRO ROW */
.macro-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.macro{background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:12px 10px;text-align:center}
.macro-val{font-family:var(--display);font-size:28px;letter-spacing:.02em;color:var(--text);line-height:1}
.macro-lbl{font:600 10px/1 var(--font);color:var(--text3);margin-top:4px;letter-spacing:.04em}
.macro-val.p{color:#6ee7b7}
.macro-val.c{color:#93c5fd}
.macro-val.f{color:#fde68a}

/* MEAL BLOCK */
.meal{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;position:relative}
.meal-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.meal-icon{width:28px;height:28px;border-radius:8px;background:rgba(149,193,31,.1);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.meal-title{font:700 13px/1 var(--font);color:var(--text)}
.meal-body{font:400 12px/1.7 var(--font);color:var(--text2)}

/* ANAMNESE */
.ana-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(149,193,31,.08);border:1px solid var(--border);color:var(--g1);font:600 11px/1 var(--font);padding:4px 10px;border-radius:999px;margin:3px 2px;letter-spacing:.02em}
.info-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-lbl{font:600 11px/1.4 var(--font);color:var(--text3);min-width:110px;letter-spacing:.02em}
.info-val{font:500 12px/1.4 var(--font);color:var(--text2);flex:1}

/* PROFIL */
.avatar{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--g2),var(--g3));display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:32px;letter-spacing:.04em;color:#fff;margin:0 auto 12px;box-shadow:0 8px 32px rgba(47,134,21,.35)}
.profil-name{font-family:var(--display);font-size:32px;letter-spacing:.03em;text-align:center;margin-bottom:4px}
.profil-sub{font:500 12px/1 var(--mono);color:var(--text3);text-align:center;letter-spacing:.06em;margin-bottom:20px}
.profil-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.profil-item{background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:12px}
.profil-item-lbl{font:600 10px/1 var(--font);color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.profil-item-val{font:600 13px/1.3 var(--font);color:var(--text)}

/* TAB BAR */
.tab-bar{position:absolute;bottom:0;left:0;right:0;height:var(--tab-h);background:rgba(8,12,7,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;border:none;background:none;padding:0;font-family:var(--font);position:relative;transition:opacity .15s}
.tab-icon{font-size:18px;line-height:1;transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.tab-label{font:700 9px/1 var(--font);color:var(--text3);letter-spacing:.05em;text-transform:uppercase;transition:color .15s}
.tab.active .tab-label{color:var(--g1)}
.tab.active .tab-icon{transform:translateY(-3px)}
.tab-pip{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--g1);opacity:0;transition:opacity .15s;box-shadow:0 0 6px var(--g1)}
.tab.active .tab-pip{opacity:1}

/* PAGE */
.page{display:none;animation:fadeUp .25s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:16px}
.loader{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--g1);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font:500 12px/1 var(--mono);color:var(--text3);letter-spacing:.06em}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;text-align:center}
.empty-icon{font-size:40px;opacity:.25;filter:grayscale(1)}
.empty-title{font:700 15px/1 var(--font);color:var(--text2)}
.empty-sub{font:400 12px/1.6 var(--font);color:var(--text3);max-width:240px}

/* BTN DANGER */
.btn-danger{width:100%;height:46px;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.2);color:#f87171;font:700 13px/1 var(--font);border-radius:12px;cursor:pointer;transition:all .2s;letter-spacing:.03em}
.btn-danger:hover{background:rgba(220,38,38,.15)}

/* NUMBER HIGHLIGHT */
.num-big{font-family:var(--display);font-size:52px;letter-spacing:.02em;line-height:1;color:var(--g1)}
.num-unit{font:600 16px/1 var(--font);color:var(--text3);margin-left:4px}

/* SUPPLEMENT TAG */
.supp-tag{display:inline-flex;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font:500 11px/1 var(--font);padding:6px 11px;border-radius:8px;margin:3px 2px}

/* CARD ACCENT LINE */
.card-accent{border-left:3px solid var(--g1);padding-left:15px}

/* KCAL BIG */
.kcal-hero{text-align:center;padding:20px 0 14px}
.kcal-num{font-family:var(--display);font-size:64px;letter-spacing:.02em;line-height:1;color:var(--text)}
.kcal-label{font:500 12px/1 var(--mono);color:var(--text3);letter-spacing:.08em;margin-top:4px}

/* SCORE BAR */
.score-bar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.score-dots{display:flex;gap:4px;flex:1}
.score-dot{flex:1;height:6px;border-radius:3px;background:var(--bg3);border:1px solid var(--border);transition:background .3s}
.score-dot.filled{background:var(--g1);border-color:var(--g2);box-shadow:0 0 6px rgba(149,193,31,.4)}
.score-val{font:700 13px/1 var(--mono);color:var(--g1);min-width:28px;text-align:right}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 36 36" fill="none">
            <rect x="4" y="15" width="6" height="6" rx="2" fill="rgba(255,255,255,.5)"/>
            <rect x="4" y="10" width="6" height="4" rx="1.5" fill="#fff"/>
            <rect x="4" y="22" width="6" height="4" rx="1.5" fill="#fff"/>
            <rect x="26" y="15" width="6" height="6" rx="2" fill="rgba(255,255,255,.5)"/>
            <rect x="26" y="10" width="6" height="4" rx="1.5" fill="#fff"/>
            <rect x="26" y="22" width="6" height="4" rx="1.5" fill="#fff"/>
            <rect x="11" y="12" width="14" height="12" rx="3" fill="#fff"/>
          </svg>
        </div>
        <div class="logo-text">mein <span>fitbox</span></div>
      </div>
      <button class="btn-logout" id="btn-logout">Abmelden</button>
    </div>
    <div class="hero">
      <div class="hero-greeting" id="header-greeting">Hallo,<br><span class="accent"></span></div>
      <div class="hero-meta">
        <div class="hero-badge" id="hero-badge">AKTIV</div>
        <div class="hero-nr" id="header-nr"></div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- SCROLL AREA -->
  <div class="scroll-area" id="scroll-area">
    <div id="content-koerper" class="page active"></div>
    <div id="content-ernaehrung" class="page"></div>
    <div id="content-gesundheit" class="page"></div>
    <div id="content-profil" class="page"></div>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab active" data-tab="koerper">
      <span class="tab-icon">📊</span>
      <span class="tab-label">Körper</span>
      <span class="tab-pip"></span>
    </button>
    <button class="tab" data-tab="ernaehrung">
      <span class="tab-icon">🥗</span>
      <span class="tab-label">Ernährung</span>
      <span class="tab-pip"></span>
    </button>
    <button class="tab" data-tab="gesundheit">
      <span class="tab-icon">🩺</span>
      <span class="tab-label">Gesundheit</span>
      <span class="tab-pip"></span>
    </button>
    <button class="tab" data-tab="profil">
      <span class="tab-icon">👤</span>
      <span class="tab-label">Profil</span>
      <span class="tab-pip"></span>
    </button>
  </div>
</div>

<script>
const SUPA_URL = 'https://jypbyywxfjniafuygxci.supabase.co';
const SUPA_KEY = 'sb_publishable_ue_bdtrmkW4NP76h114wqQ__pIkA-YU';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let kunde = null;
let loaded = {};

// ── AUTH CHECK ──────────────────────────────────────────────
async function init() {
  const verified = sessionStorage.getItem('kunde_verified');
  const email    = sessionStorage.getItem('kunde_email');
  if (!verified || !email) { location.replace('kunde_login.html'); return; }

  let portalData;
  try {
    const res = await fetch(`${SUPA_URL}/functions/v1/get-kunde-data`, {
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPA_KEY},
      body: JSON.stringify({ email })
    });
    if (!res.ok) { sessionStorage.clear(); location.replace('kunde_login.html'); return; }
    portalData = await res.json();
  } catch(e) { location.replace('kunde_login.html'); return; }

  kunde = portalData.kunde;
  window._portalData = portalData;

  const fn = kunde.first_name || '';
  document.querySelector('.hero-greeting .accent').textContent = fn;
  document.getElementById('hero-badge').textContent = (kunde.status || 'Aktiv').toUpperCase();
  document.getElementById('header-nr').textContent = kunde.kundennummer ? 'NR. ' + kunde.kundennummer : '';

  loadTab('koerper');
}

// ── TAB NAVIGATION ──────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    const tab = t.dataset.tab;
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    const page = document.getElementById('content-' + tab);
    page.classList.add('active');
    document.getElementById('scroll-area').scrollTop = 0;
    if (!loaded[tab]) loadTab(tab);
  });
});

function loadTab(tab) {
  loaded[tab] = true;
  if (tab === 'koerper') loadKoerper();
  else if (tab === 'ernaehrung') loadErnaehrung();
  else if (tab === 'gesundheit') loadGesundheit();
  else if (tab === 'profil') loadProfil();
}

function show(tab, html) {
  document.getElementById('content-' + tab).innerHTML = html;
}
function loading(tab) {
  show(tab, `<div class="loading"><div class="loader"></div><div class="loading-text">LADEN...</div></div>`);
}
function empty(icon, title, sub) {
  return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div></div>`;
}
function fmtDate(d) {
  if (!d) return '–';
  return new Date(d).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function fmtDateShort(d) {
  if (!d) return '–';
  const dt = new Date(d);
  return dt.toLocaleDateString('de-DE',{month:'short',year:'2-digit'}).replace(' ','`');
}
function fmtV(v, u='') { return (v !== null && v !== undefined) ? v + (u ? ' '+u : '') : '–'; }
function delta(cur, prev, unit='', invert=false) {
  if (!prev) return '';
  const d = parseFloat(cur) - parseFloat(prev);
  const pos = invert ? d < 0 : d > 0;
  const sign = d > 0 ? '+' : '';
  return `<span class="stat-delta ${pos?'up':'down'}">${sign}${d.toFixed(1)}${unit}</span>`;
}

// ── KÖRPER ───────────────────────────────────────────────────
function loadKoerper() {
  const data = window._portalData?.messungen || [];
  if (!data.length) { show('koerper', empty('📊','Noch keine Körperanalyse','Deine Messdaten erscheinen hier, sobald dein Trainer sie eingetragen hat.')); return; }

  const l = data[0]; // aktuell
  const p = data[1]; // vorherige
  const bmi = l.bmi ? parseFloat(l.bmi).toFixed(1) : (l.gewicht_kg && l.koerpergroesse_cm ? (l.gewicht_kg / Math.pow(l.koerpergroesse_cm/100,2)).toFixed(1) : null);

  // Fortschritt Kreisring
  const ziel = 78; // Wunschgewicht
  const start = data[data.length-1]?.gewicht_kg || l.gewicht_kg;
  const curr = parseFloat(l.gewicht_kg);
  const verloren = parseFloat(start) - curr;
  const zielVerlust = parseFloat(start) - ziel;
  const pct = Math.min(100, Math.max(0, Math.round(verloren / zielVerlust * 100)));
  const r = 40, circ = 2 * Math.PI * r;
  const dash = circ * pct / 100;

  let html = `<div class="sec"><div class="sec-label">Aktuell · ${fmtDate(l.datum)}</div>`;

  // Hauptstats
  html += `<div class="stat-grid">
    <div class="stat">
      <div class="stat-val">${parseFloat(l.gewicht_kg).toFixed(1)}<span class="unit">kg</span></div>
      <div class="stat-label">Gewicht</div>
      ${p ? delta(l.gewicht_kg, p.gewicht_kg, 'kg', true) : ''}
    </div>
    <div class="stat">
      <div class="stat-val">${parseFloat(l.koerperfett_prozent).toFixed(1)}<span class="unit">%</span></div>
      <div class="stat-label">Körperfett</div>
      ${p ? delta(l.koerperfett_prozent, p.koerperfett_prozent, '%', true) : ''}
    </div>
    <div class="stat">
      <div class="stat-val">${parseFloat(l.muskelmasse_prozent).toFixed(1)}<span class="unit">%</span></div>
      <div class="stat-label">Muskelmasse</div>
      ${p ? delta(l.muskelmasse_prozent, p.muskelmasse_prozent, '%') : ''}
    </div>
    <div class="stat">
      <div class="stat-val">${bmi || '–'}</div>
      <div class="stat-label">BMI</div>
    </div>
  </div>`;

  // Fortschrittsring
  html += `<div class="card">
    <div class="ring-wrap">
      <svg class="ring-svg" width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="${r}" fill="none" stroke="rgba(149,193,31,.1)" stroke-width="8"/>
        <circle cx="50" cy="50" r="${r}" fill="none" stroke="url(#rg)" stroke-width="8"
          stroke-dasharray="${dash.toFixed(1)} ${(circ-dash).toFixed(1)}"
          stroke-linecap="round" transform="rotate(-90 50 50)"/>
        <defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#2f8615"/><stop offset="100%" stop-color="#95c11f"/>
        </linearGradient></defs>
        <text x="50" y="46" text-anchor="middle" fill="#95c11f" font-size="18" font-family="Bebas Neue" letter-spacing="1">${pct}%</text>
        <text x="50" y="60" text-anchor="middle" fill="#5a6e56" font-size="9" font-family="JetBrains Mono">ZIEL</text>
      </svg>
      <div class="ring-info">
        <div class="ring-title">Zielfortschritt</div>
        <div class="ring-sub">${verloren.toFixed(1)} kg von ${zielVerlust.toFixed(1)} kg Gesamtziel abgenommen</div>
        <div style="margin-top:8px">
          <div class="bar-wrap">
            <div class="bar-meta"><span class="bar-label">Körperfett-Ziel</span><span class="bar-val">${parseFloat(l.koerperfett_prozent).toFixed(1)}% → 15%</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,(24.8-parseFloat(l.koerperfett_prozent))/(24.8-15)*100).toFixed(0)}%"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>`;

  // Körpermaße
  if (l.taille_cm || l.bauch_cm) {
    html += `<div class="card">
      <div class="sec-label" style="margin-bottom:12px">Körpermaße</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        ${l.oberarm_links_cm ? `<div class="stat" style="padding:10px 10px 8px"><div class="stat-val" style="font-size:22px">${l.oberarm_links_cm}<span class="unit">cm</span></div><div class="stat-label">Oberarm L</div></div>` : ''}
        ${l.oberarm_rechts_cm ? `<div class="stat" style="padding:10px 10px 8px"><div class="stat-val" style="font-size:22px">${l.oberarm_rechts_cm}<span class="unit">cm</span></div><div class="stat-label">Oberarm R</div></div>` : ''}
        ${l.brust_cm ? `<div class="stat" style="padding:10px 10px 8px"><div class="stat-val" style="font-size:22px">${l.brust_cm}<span class="unit">cm</span></div><div class="stat-label">Brust</div></div>` : ''}
        ${l.taille_cm ? `<div class="stat" style="padding:10px 10px 8px"><div class="stat-val" style="font-size:22px">${l.taille_cm}<span class="unit">cm</span></div><div class="stat-label">Taille</div></div>` : ''}
        ${l.bauch_cm ? `<div class="stat" style="padding:10px 10px 8px"><div class="stat-val" style="font-size:22px">${l.bauch_cm}<span class="unit">cm</span></div><div class="stat-label">Bauch</div></div>` : ''}
        ${l.hufte_cm ? `<div class="stat" style="padding:10px 10px 8px"><div class="stat-val" style="font-size:22px">${l.hufte_cm}<span class="unit">cm</span></div><div class="stat-label">Hüfte</div></div>` : ''}
      </div>
    </div>`;
  }

  // Verlauf Timeline
  if (data.length > 1) {
    html += `<div class="sec" style="margin-top:20px"><div class="sec-label">Verlauf</div><div class="card"><div class="timeline">`;
    data.forEach((m, i) => {
      html += `<div class="tl-item">
        <div class="tl-dot ${i===0?'active':''}"></div>
        <div class="tl-date">${fmtDate(m.datum)}</div>
        <div class="tl-val">${parseFloat(m.gewicht_kg).toFixed(1)} kg · ${parseFloat(m.koerperfett_prozent).toFixed(1)}% KF · ${parseFloat(m.muskelmasse_prozent).toFixed(1)}% MM</div>
        ${m.notizen ? `<div class="tl-note">${m.notizen}</div>` : ''}
      </div>`;
    });
    html += `</div></div></div>`;
  }

  html += `</div>`;
  show('koerper', html);
}

// ── ERNÄHRUNG ────────────────────────────────────────────────
function loadErnaehrung() {
  const data = window._portalData?.ernaehrung || [];
  if (!data.length) { show('ernaehrung', empty('🥗','Noch keine Ernährungsanalyse','Deine Ernährungsempfehlungen erscheinen hier, sobald dein Trainer sie erstellt hat.')); return; }

  const a = data[0];
  const meals = [
    {icon:'🌅', title:'Frühstück', body: a.block_fruehstueck},
    {icon:'☀️', title:'Mittagessen', body: a.block_mittagessen},
    {icon:'🌙', title:'Abendessen', body: a.block_abendessen},
    {icon:'🍎', title:'Snacks', body: a.block_snacks},
    {icon:'💧', title:'Trinken', body: a.block_trinken},
  ].filter(m => m.body);

  let html = `<div class="sec"><div class="sec-label">${fmtDate(a.datum)} · ${a.ziel === 'abnehmen' ? 'Fettabbau' : a.ziel === 'muskelaufbau' ? 'Muskelaufbau' : a.ziel || 'Plan'}</div>`;

  // Kcal Hero
  html += `<div class="card" style="text-align:center;padding:24px 18px 20px">
    <div class="kcal-hero">
      <div class="kcal-num">${a.kalorienbedarf_kcal || '–'}</div>
      <div class="kcal-label">KCAL TAGESBEDARF</div>
    </div>
    <div class="macro-row">
      <div class="macro"><div class="macro-val p">${a.protein_ziel_g || '–'}<span style="font-size:14px">g</span></div><div class="macro-lbl">Protein</div></div>
      <div class="macro"><div class="macro-val c">${a.kohlenhydrate_ziel_g || '–'}<span style="font-size:14px">g</span></div><div class="macro-lbl">Kohlenhydrate</div></div>
      <div class="macro"><div class="macro-val f">${a.fett_ziel_g || '–'}<span style="font-size:14px">g</span></div><div class="macro-lbl">Fett</div></div>
    </div>
    <div>
      <div class="bar-wrap" style="margin-bottom:6px">
        <div class="bar-meta"><span class="bar-label" style="color:#6ee7b7">Protein</span><span class="bar-val" style="color:#6ee7b7">${a.protein_ziel_g}g</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${a.protein_ziel_g ? Math.round(a.protein_ziel_g*4/a.kalorienbedarf_kcal*100) : 0}%;background:linear-gradient(90deg,#059669,#6ee7b7)"></div></div>
      </div>
      <div class="bar-wrap" style="margin-bottom:6px">
        <div class="bar-meta"><span class="bar-label" style="color:#93c5fd">Kohlenhydrate</span><span class="bar-val" style="color:#93c5fd">${a.kohlenhydrate_ziel_g}g</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${a.kohlenhydrate_ziel_g ? Math.round(a.kohlenhydrate_ziel_g*4/a.kalorienbedarf_kcal*100) : 0}%;background:linear-gradient(90deg,#1d4ed8,#93c5fd)"></div></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-meta"><span class="bar-label" style="color:#fde68a">Fett</span><span class="bar-val" style="color:#fde68a">${a.fett_ziel_g}g</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${a.fett_ziel_g ? Math.round(a.fett_ziel_g*9/a.kalorienbedarf_kcal*100) : 0}%;background:linear-gradient(90deg,#b45309,#fde68a)"></div></div>
      </div>
    </div>
  </div></div>`;

  // Mahlzeiten
  html += `<div class="sec"><div class="sec-label">Mahlzeiten</div>`;
  meals.forEach(m => {
    html += `<div class="meal">
      <div class="meal-head"><div class="meal-icon">${m.icon}</div><div class="meal-title">${m.title}</div></div>
      <div class="meal-body">${m.body}</div>
    </div>`;
  });
  html += `</div>`;

  // Tipps & Supplemente
  if (a.block_tipps) {
    html += `<div class="sec"><div class="sec-label">Tipps</div><div class="card card-accent"><div class="meal-body">${a.block_tipps}</div></div></div>`;
  }
  if (a.block_supplemente) {
    html += `<div class="sec"><div class="sec-label">Supplemente</div><div class="card">`;
    a.block_supplemente.split('·').filter(s=>s.trim()).forEach(s => {
      html += `<span class="supp-tag">💊 ${s.trim()}</span>`;
    });
    html += `</div></div>`;
  }
  if (a.block_motivation) {
    html += `<div class="sec"><div class="sec-label">Motivation</div><div class="card" style="border-color:rgba(149,193,31,.3)"><div class="meal-body" style="color:var(--text2);font-style:italic;line-height:1.8">${a.block_motivation}</div></div></div>`;
  }

  // Ältere Analysen
  if (data.length > 1) {
    html += `<div class="sec"><div class="sec-label">Frühere Pläne</div>`;
    data.slice(1).forEach(d => {
      html += `<div class="card" style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font:600 13px/1 var(--font);color:var(--text);margin-bottom:3px">${fmtDate(d.datum)}</div>
          <div style="font:500 11px/1 var(--mono);color:var(--text3)">${d.ziel === 'abnehmen' ? 'Fettabbau' : d.ziel === 'muskelaufbau' ? 'Muskelaufbau' : d.ziel} · ${d.kalorienbedarf_kcal} kcal</div>
        </div>
        <div style="font-family:var(--display);font-size:22px;color:var(--text3)">${d.protein_ziel_g}g P</div>
      </div>`;
    });
    html += `</div>`;
  }

  show('ernaehrung', html);
}

// ── GESUNDHEIT ───────────────────────────────────────────────
function loadGesundheit() {
  const data = window._portalData?.anamnese || [];
  if (!data.length) { show('gesundheit', empty('🩺','Keine Anamnese','Deine Gesundheitsdaten erscheinen hier, sobald du die Anamnese ausgefüllt hast.')); return; }
  const g = data[0];

  let html = `<div class="sec"><div class="sec-label">Anamnese · ${fmtDate(g.created_at)}</div>`;

  // Motivation Score
  if (g.motivation_skala) {
    html += `<div class="card">
      <div style="margin-bottom:10px;font:600 12px/1 var(--font);color:var(--text2)">Motivation</div>
      <div class="score-bar">
        <div class="score-dots">${Array.from({length:10},(_,i)=>`<div class="score-dot ${i<g.motivation_skala?'filled':''}"></div>`).join('')}</div>
        <div class="score-val">${g.motivation_skala}/10</div>
      </div>
    </div>`;
  }

  // Ziele
  if (g.ziele?.length) {
    html += `<div class="card"><div style="font:600 12px/1 var(--font);color:var(--text2);margin-bottom:10px">Meine Ziele</div>`;
    g.ziele.forEach(z => html += `<span class="ana-chip">✦ ${z}</span>`);
    html += `</div>`;
  }

  // Herausforderungen
  if (g.herausforderungen?.length) {
    html += `<div class="card"><div style="font:600 12px/1 var(--font);color:var(--text2);margin-bottom:10px">Herausforderungen</div>`;
    g.herausforderungen.forEach(h => html += `<span class="ana-chip" style="border-color:rgba(251,191,36,.2);color:#fbbf24;background:rgba(251,191,36,.06)">⚡ ${h}</span>`);
    html += `</div>`;
  }

  html += `</div>`;

  // Details
  html += `<div class="sec"><div class="sec-label">Angaben</div><div class="card">`;
  const rows = [
    ['Gewicht', g.gewicht_kg ? g.gewicht_kg + ' kg' : null],
    ['Größe', g.koerpergroesse_cm ? g.koerpergroesse_cm + ' cm' : null],
    ['Alter', g.alter_jahre ? g.alter_jahre + ' Jahre' : null],
    ['Wunschgewicht', g.wunschgewicht_kg ? g.wunschgewicht_kg + ' kg' : null],
    ['Beruf / Tätigkeit', g.beruf_taetigkeit],
    ['Alltag', g.alltag_beschreibung],
    ['Auswärts essen', g.auswaerts_haeufigkeit],
    ['Frisch kochen', g.frisch_kochen],
    ['Wasser täglich', g.wasser_liter_taeglich],
    ['Alkohol', g.alkohol],
    ['Kaffee', g.kaffee_energydrinks],
    ['Schlaf', g.schlaf_stunden ? g.schlaf_stunden + ' · ' + (g.schlaf_qualitaet || '') : null],
    ['Einschränkungen', g.koerperliches_befinden],
    ['3-Monats-Ziel', g.ziel_3monate],
  ].filter(r => r[1]);

  rows.forEach(([lbl, val]) => {
    html += `<div class="info-row"><div class="info-lbl">${lbl}</div><div class="info-val">${val}</div></div>`;
  });
  html += `</div></div>`;

  if (g.trainer_notizen) {
    html += `<div class="sec"><div class="sec-label">Trainer-Notiz</div><div class="card card-accent"><div class="meal-body">${g.trainer_notizen}</div></div></div>`;
  }

  show('gesundheit', html);
}

// ── PROFIL ───────────────────────────────────────────────────
function loadProfil() {
  if (!kunde) return;
  const initials = ((kunde.first_name||'')[0]||'') + ((kunde.last_name||'')[0]||'');
  const age = kunde.geburtsdatum ? Math.floor((Date.now()-new Date(kunde.geburtsdatum))/31557600000) : null;

  const items = [
    ['Alter', age ? age + ' Jahre' : '–'],
    ['Geschlecht', kunde.geschlecht || '–'],
    ['E-Mail', kunde.email || '–'],
    ['Telefon', kunde.telefon || kunde.mobil || '–'],
    ['Ziel', kunde.ziel || '–'],
    ['Status', (kunde.status || 'Aktiv').charAt(0).toUpperCase() + (kunde.status||'aktiv').slice(1)],
  ];

  let html = `<div class="sec"><div class="sec-label">Mein Profil</div>
    <div class="card" style="text-align:center;padding:28px 20px 20px">
      <div class="avatar">${initials.toUpperCase()}</div>
      <div class="profil-name">${kunde.first_name} ${kunde.last_name}</div>
      <div class="profil-sub">MITGLIED${kunde.kundennummer ? ' · NR. '+kunde.kundennummer : ''}</div>
      <div class="profil-grid">
        ${items.map(([l,v]) => `<div class="profil-item"><div class="profil-item-lbl">${l}</div><div class="profil-item-val">${v}</div></div>`).join('')}
      </div>
    </div>
  </div>
  <div class="sec">
    <div class="card" style="padding:14px 16px;text-align:center">
      <div style="font:400 12px/1.6 var(--font);color:var(--text3);margin-bottom:14px">Für Änderungen an deinen Daten wende dich bitte direkt an dein fitbox Studio.</div>
      <button class="btn-danger" onclick="doLogout()">Abmelden</button>
    </div>
  </div>`;

  show('profil', html);
}

// ── LOGOUT ───────────────────────────────────────────────────
function doLogout() {
  sessionStorage.removeItem('kunde_email');
  sessionStorage.removeItem('kunde_verified');
  location.replace('kunde_login.html');
}
document.getElementById('btn-logout').addEventListener('click', doLogout);

// ── START ─────────────────────────────────────────────────────
init();
</script>
</body>
</html>
