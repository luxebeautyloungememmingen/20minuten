<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Feedback – fitbox Studio OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#2f8615;--brand-dark:#236010;--brand-acc:#95c11f;
  --brand-soft:#eef7e9;--brand-line:#d4eacc;
  --bg:#f5f7f4;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e4e9e2;
  --shadow:0 2px 10px rgba(16,40,12,.07);--shadow-md:0 6px 22px rgba(16,40,12,.11);
  --radius:14px;--font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
  --ok:#166534;--ok-bg:#dcfce7;--ok-line:#86efac;
  --warn-mid:#d97706;--warn-bg:#fef3c7;--warn-line:#fcd34d;
  --bad:#991b1b;--bad-bg:#fee2e2;--bad-line:#fca5a5;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;display:flex;flex-direction:column}

/* TOPBAR (Standard) */
.topbar-outer{background:linear-gradient(135deg,#2f8615 0%,#256a10 100%);box-shadow:0 2px 12px rgba(0,0,0,.15);position:sticky;top:0;z-index:100;flex-shrink:0;}
.topbar{max-width:none;margin:0;height:46px;display:flex;align-items:center;flex-wrap:nowrap;padding:0 18px;gap:14px;overflow:hidden;}
.tb-pagetitle{color:#fff;font-weight:700;font-size:14px;letter-spacing:-.2px;display:flex;align-items:center;gap:8px;flex-shrink:0;white-space:nowrap;}
.tb-pagetitle-icon{font-size:16px;}
.tb-divider{width:1px;height:18px;background:rgba(255,255,255,.2);}
.tb-stats{display:flex;align-items:center;gap:14px;font-size:12px;color:rgba(255,255,255,.85);font-weight:500;}
.tb-stat{display:flex;align-items:center;gap:5px;white-space:nowrap;}
.tb-stat-num{font-weight:700;color:#fff;}
.tb-stat-dot{width:5px;height:5px;border-radius:50%;background:#95c11f;display:inline-block;}
.topbar-spacer{flex:1}
.topbar-btn{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.22);color:#fff;font:700 12px/1 var(--font);padding:6px 12px;border-radius:8px;cursor:pointer;appearance:none;white-space:nowrap;}
.topbar-btn:hover{background:rgba(255,255,255,.25)}

/* SCROLL AREA */
.page{flex:1;overflow-y:auto;padding:20px}
.page::-webkit-scrollbar{width:6px}
.page::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}

/* HEADER ROW */
.page-header{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.page-title{font-size:20px;font-weight:900;letter-spacing:-.02em}
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* CHIPS / PILLS */
.chip-group{display:flex;gap:6px;flex-wrap:wrap}
.chip{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--muted);padding:6px 13px;border-radius:999px;font:700 12px/1 var(--font);cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--brand);color:var(--brand)}
.chip.active{background:var(--brand);color:#fff;border-color:var(--brand)}

/* SECTION */
.sec-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--line)}

/* OVERVIEW GRID */
.overview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.ov-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.ov-icon{font-size:22px;margin-bottom:6px}
.ov-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.ov-val{font-size:30px;font-weight:900;line-height:1;color:var(--text)}
.ov-val.green{color:var(--brand)}
.ov-val.amber{color:var(--warn-mid)}
.ov-val.red{color:var(--bad)}
.ov-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* STAR DISPLAY */
.stars{display:flex;gap:2px;margin-top:4px}
.star{font-size:16px;line-height:1}
.star.full{color:#f59e0b}
.star.empty{color:#d1d5db}
.star.half{position:relative;color:#d1d5db}
.star.half::after{content:'★';position:absolute;left:0;top:0;width:50%;overflow:hidden;color:#f59e0b}

/* INTENSITY PILLS */
.int-bars{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.int-bar{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:8px;font-size:11px;font-weight:700}
.int-bar.perfekt{background:var(--ok-bg);color:var(--ok)}
.int-bar.hoch{background:var(--warn-bg);color:var(--warn-mid)}
.int-bar.niedrig{background:var(--bad-bg);color:var(--bad)}

/* TRAINER GRID */
.trainer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:20px}
.trainer-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s}
.trainer-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--brand-line)}
.trainer-card.selected{border-color:var(--brand);box-shadow:0 0 0 2px var(--brand-line)}
.trainer-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.trainer-av{width:42px;height:42px;border-radius:50%;background:var(--brand-soft);border:2px solid var(--brand-line);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:var(--brand);flex-shrink:0}
.trainer-name{font-size:14px;font-weight:800}
.trainer-count{font-size:11px;color:var(--muted);margin-top:2px}
.trainer-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.metric-mini{background:#f9fafb;border:1px solid var(--line);border-radius:10px;padding:8px 10px}
.metric-mini-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.metric-mini-val{font-size:17px;font-weight:900;line-height:1.2;color:var(--text);margin-top:2px}
.metric-mini-stars{display:flex;gap:1px;margin-top:2px}
.mini-star{font-size:11px}

/* KOMMENTARE */
.comment-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.comment-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.comment-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.comment-av{width:30px;height:30px;border-radius:50%;background:var(--brand-soft);border:1.5px solid var(--brand-line);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:var(--brand);flex-shrink:0}
.comment-trainer{font-size:13px;font-weight:700}
.comment-date{font-size:11px;color:var(--muted);margin-left:auto;font-family:var(--mono)}
.comment-text{font-size:13px;color:var(--text);line-height:1.5;font-style:italic;padding:10px 12px;background:#f9fafb;border-radius:8px;border-left:3px solid var(--brand-line)}
.comment-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700}
.badge.green{background:var(--ok-bg);color:var(--ok)}
.badge.amber{background:var(--warn-bg);color:var(--warn-mid)}
.badge.red{background:var(--bad-bg);color:var(--bad)}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(245,247,244,.8);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:200}
.loading-overlay.show{display:flex}
.loading-card{background:var(--card);border-radius:14px;padding:12px 20px;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:10px;font-weight:800;font-size:13px}
.spinner{width:16px;height:16px;border-radius:50%;border:2.5px solid rgba(0,0,0,.1);border-top-color:var(--brand);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* SKELETON */
.skel{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:skel 1.4s infinite;border-radius:8px}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;font-style:italic}

/* RESPONSIVE */
@media(max-width:900px){.overview-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.overview-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<script>
if(window.self!==window.top){
  document.documentElement.classList.add('in-iframe');
  document.addEventListener('DOMContentLoaded',function(){
    document.body.classList.add('in-iframe');
    document.body.style.background='#f5f7f4';
    var to=document.querySelector('.topbar-outer');
    if(to){ to.style.width='100%'; }
  });
}
</script>
<script>
(function(){
  var SK='fitbox_session';var TM=8*60*60*1000;var s;
  try{var r=localStorage.getItem(SK)||sessionStorage.getItem(SK);s=JSON.parse(r);if(s&&!localStorage.getItem(SK))localStorage.setItem(SK,r);}catch(e){}
  if(!s||!s.access_token||s.expires_at<Date.now()){
    if(window.self!==window.top){try{window.top.location.replace('login.html');}catch(e){window.location.replace('login.html');}}
    else{window.location.replace('login.html');}
    throw new Error('AUTH');
  }
  window._fbSession=s;window._fbToken=s.access_token;
  var _t;
  function resetTimer(){clearTimeout(_t);_t=setTimeout(function(){localStorage.removeItem(SK);sessionStorage.removeItem(SK);window.location.replace('login.html?msg='+encodeURIComponent('Automatisch abgemeldet (8h Inaktivität).'));},TM);}
  ['mousemove','mousedown','keydown','scroll','touchstart','click'].forEach(function(ev){document.addEventListener(ev,resetTimer,{passive:true});});
  resetTimer();
})();
</script>

<!-- TOPBAR -->
<div class="topbar-outer"><div class="topbar">
  <span class="tb-pagetitle"><span class="tb-pagetitle-icon">⭐</span> Feedback Studios</span>
  <span class="tb-divider"></span>
  <div class="tb-stats">
    <span class="tb-stat" id="stat-datum">–</span>
    <span class="tb-stat"><span class="tb-stat-dot"></span><span class="tb-stat-num" id="stat-uhrzeit">–:–</span></span>
  </div>
  <div class="topbar-spacer"></div>
</div></div>

<script>
(function(){
  function pad(n){return n<10?'0'+n:n;}
  function tick(){
    var now=new Date();
    var months=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
    var weekdays=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
    var dEl=document.getElementById('stat-datum');
    var tEl=document.getElementById('stat-uhrzeit');
    if(dEl) dEl.textContent=weekdays[now.getDay()]+', '+now.getDate()+'. '+months[now.getMonth()];
    if(tEl) tEl.textContent=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  }
  document.addEventListener('DOMContentLoaded',function(){tick();setInterval(tick,1000);});
})();
</script>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-card"><div class="spinner"></div><span id="loadingTxt">Lade Daten …</span></div>
</div>

<div class="page">

  <!-- FILTER -->
  <div class="page-header">
    <div class="controls">
      <!-- Studio Picker -->
      <div class="chip-group" id="studioBar">
        <div class="skel" style="width:110px;height:32px;border-radius:999px"></div>
        <div class="skel" style="width:110px;height:32px;border-radius:999px"></div>
      </div>
      <!-- Zeit Filter -->
      <div class="chip-group" id="zeitBar">
        <button class="chip" data-range="week">Diese Woche</button>
        <button class="chip active" data-range="month">Dieser Monat</button>
        <button class="chip" data-range="last_month">Letzter Monat</button>
        <button class="chip" data-range="all">Gesamt</button>
      </div>
    </div>
  </div>

  <!-- OVERVIEW KPIS -->
  <div class="sec-title">Studio-Übersicht</div>
  <div class="overview-grid" id="overviewGrid">
    <div class="ov-card"><div class="skel" style="height:80px"></div></div>
    <div class="ov-card"><div class="skel" style="height:80px"></div></div>
    <div class="ov-card"><div class="skel" style="height:80px"></div></div>
    <div class="ov-card"><div class="skel" style="height:80px"></div></div>
  </div>

  <!-- TRAINER EINZELWERTUNGEN -->
  <div class="sec-title">Trainer Einzelwertungen <span id="trainerCount" style="font-size:10px;text-transform:none;letter-spacing:0;font-weight:700;color:var(--muted)"></span></div>
  <div class="trainer-grid" id="trainerGrid">
    <div class="trainer-card"><div class="skel" style="height:120px"></div></div>

  </div>

  <!-- KOMMENTARE -->
  <div class="sec-title">Kommentare <span id="commentCount" style="font-size:10px;text-transform:none;letter-spacing:0;font-weight:700;color:var(--muted)"></span></div>

</div><!-- /page -->

<script>
const SUPA_URL='https://jypbyywxfjniafuygxci.supabase.co';
const SUPA_KEY='sb_publishable_ue_bdtrmkW4NP76h114wqQ__pIkA-YU';

function getSb(){
  const s=window._fbSession||JSON.parse(localStorage.getItem('fitbox_session')||'null');
  const tok=s?.access_token||'';
  return supabase.createClient(SUPA_URL,SUPA_KEY,{
    global:{headers:{Authorization:'Bearer '+tok}},
    auth:{persistSession:false,autoRefreshToken:false}
  });
}

let selectedStudioId='';
let selectedRange='month';
let studios=[];

/* LOADING */
function showLoading(t){document.getElementById('loadingTxt').textContent=t||'Lade Daten …';document.getElementById('loadingOverlay').classList.add('show');}
function hideLoading(){document.getElementById('loadingOverlay').classList.remove('show');}

/* DATE RANGE */
function getDateRange(range){
  const now=new Date();
  let from,to=now.toISOString();
  if(range==='week'){
    const d=now.getDay()||7;
    const mon=new Date(now);mon.setDate(now.getDate()-d+1);mon.setHours(0,0,0,0);
    from=mon.toISOString();
  } else if(range==='month'){
    const m=new Date(now.getFullYear(),now.getMonth(),1);
    from=m.toISOString();
  } else if(range==='last_month'){
    const lm=new Date(now.getFullYear(),now.getMonth()-1,1);
    const lme=new Date(now.getFullYear(),now.getMonth(),0,23,59,59);
    from=lm.toISOString();to=lme.toISOString();
  } else {
    from='2020-01-01T00:00:00Z';
  }
  return{from,to};
}

/* STARS RENDER */
function renderStars(avg,size=16){
  if(avg===null||avg===undefined) return '<span style="color:var(--muted);font-size:11px">–</span>';
  const full=Math.floor(avg),half=avg-full>=0.25&&avg-full<0.75?1:0,empty=5-full-half;
  let h='<div class="stars">';
  for(let i=0;i<full;i++) h+=`<span class="star full" style="font-size:${size}px">★</span>`;
  if(half) h+=`<span class="star half" style="font-size:${size}px">★</span>`;
  for(let i=0;i<empty;i++) h+=`<span class="star empty" style="font-size:${size}px">★</span>`;
  h+='</div>';
  return h;
}

function starColor(avg){
  if(avg===null) return '';
  if(avg>=4.5) return 'green';
  if(avg>=3.5) return 'amber';
  return 'red';
}

function ini(fn,ln){return((fn||'')[0]||'').toUpperCase()+((ln||'')[0]||'').toUpperCase()||'?';}

/* MAIN LOAD */
async function loadAll(){
  showLoading('Feedbacks werden geladen …');
  const sb=getSb();
  const{from,to}=getDateRange(selectedRange);

  try{
    // Alle Antworten für das Studio im Zeitraum
    const{data:answers,error}=await sb
      .from('feedback_answers')
      .select('id,employee_id,session_id,question_id,answer_value,created_at')
      .eq('studio_id',selectedStudioId)
      .gte('created_at',from)
      .lte('created_at',to)
      .order('created_at',{ascending:false});

    if(error) throw error;

    // Fragen laden
    const{data:questions}=await sb
      .from('feedback_questions')
      .select('id,question_text,question_type,sort_order')
      .eq('studio_id',selectedStudioId)
      .eq('is_active',true)
      .order('sort_order');

    // Mitarbeiter laden (alle im Studio)
    const empIds=[...new Set((answers||[]).map(a=>a.employee_id).filter(Boolean))];
    let empMap=new Map();
    if(empIds.length>0){
      const{data:emps}=await sb.from('employees').select('id,first_name,last_name').in('id',empIds);
      (emps||[]).forEach(e=>empMap.set(e.id,e));
    }

    renderAll(answers||[],questions||[],empMap);

  }catch(err){
    console.error(err);
    document.getElementById('overviewGrid').innerHTML=`<div class="ov-card" style="grid-column:1/-1"><div class="empty">Fehler beim Laden: ${err.message}</div></div>`;
  }finally{
    hideLoading();
  }
}

function renderAll(answers,questions,empMap){
  // Fragen-Map
  const qMap=new Map(questions.map(q=>[q.id,q]));

  // Frage-Typen identifizieren
  const qTraining=questions.find(q=>q.question_type==='rating_star'&&q.sort_order===1);
  const qTrainer=questions.find(q=>q.question_type==='rating_star'&&q.sort_order===3);
  const qStudio=questions.find(q=>q.question_type==='rating_star'&&q.sort_order===4);
  const qIntensity=questions.find(q=>q.question_type==='intensity');
  const qText=questions.find(q=>q.question_type==='text');

  // Sessions gruppieren (eine Session = eine Feedback-Runde)
  const sessions=new Map();
  for(const a of answers){
    if(!sessions.has(a.session_id)) sessions.set(a.session_id,{
      session_id:a.session_id,employee_id:a.employee_id,created_at:a.created_at,answers:[]
    });
    sessions.get(a.session_id).answers.push(a);
  }
  const sessionList=[...sessions.values()];

  // OVERVIEW
  const ratingsTraining=answers.filter(a=>a.question_id===qTraining?.id&&a.answer_value).map(a=>parseFloat(a.answer_value)).filter(n=>!isNaN(n));
  const ratingsTrainer=answers.filter(a=>a.question_id===qTrainer?.id&&a.answer_value).map(a=>parseFloat(a.answer_value)).filter(n=>!isNaN(n));
  const ratingsStudio=answers.filter(a=>a.question_id===qStudio?.id&&a.answer_value).map(a=>parseFloat(a.answer_value)).filter(n=>!isNaN(n));
  const intensities=answers.filter(a=>a.question_id===qIntensity?.id&&a.answer_value).map(a=>a.answer_value);

  const avg=arr=>arr.length?Math.round((arr.reduce((s,v)=>s+v,0)/arr.length)*10)/10:null;
  const avgTraining=avg(ratingsTraining);
  const avgTrainer=avg(ratingsTrainer);
  const avgStudio=avg(ratingsStudio);

  const intCounts={perfekt:0,hoch:0,niedrig:0};
  intensities.forEach(v=>{if(v==='perfekt')intCounts.perfekt++;else if(v==='zu hoch'||v==='hoch')intCounts.hoch++;else if(v==='zu niedrig'||v==='niedrig')intCounts.niedrig++;});

  document.getElementById('overviewGrid').innerHTML=`
    <div class="ov-card">
      <div class="ov-icon">📋</div>
      <div class="ov-label">Feedbacks gesamt</div>
      <div class="ov-val green">${sessionList.length}</div>
      <div class="ov-sub">Bewertungsrunden</div>
    </div>
    <div class="ov-card">
      <div class="ov-icon">🏋️</div>
      <div class="ov-label">Ø Training</div>
      <div class="ov-val ${starColor(avgTraining)}">${avgTraining!==null?avgTraining.toFixed(1):'–'}</div>
      ${renderStars(avgTraining,14)}
    </div>
    <div class="ov-card">
      <div class="ov-icon">🧑‍💼</div>
      <div class="ov-label">Ø Trainer</div>
      <div class="ov-val ${starColor(avgTrainer)}">${avgTrainer!==null?avgTrainer.toFixed(1):'–'}</div>
      ${renderStars(avgTrainer,14)}
    </div>
    <div class="ov-card">
      <div class="ov-icon">🏠</div>
      <div class="ov-label">Ø Sauberkeit</div>
      <div class="ov-val ${starColor(avgStudio)}">${avgStudio!==null?avgStudio.toFixed(1):'–'}</div>
      ${renderStars(avgStudio,14)}
    </div>
    <div class="ov-card" style="grid-column:1/-1">
      <div class="ov-label" style="margin-bottom:6px">Intensität (${intensities.length} Nennungen)</div>
      <div class="int-bars">
        <div class="int-bar perfekt">✓ Perfekt <strong style="margin-left:4px">${intCounts.perfekt}</strong></div>
        <div class="int-bar hoch">↑ Zu hoch <strong style="margin-left:4px">${intCounts.hoch}</strong></div>
        <div class="int-bar niedrig">↓ Zu niedrig <strong style="margin-left:4px">${intCounts.niedrig}</strong></div>
      </div>
    </div>
  `;

  // TRAINER EINZELWERTUNGEN
  // Gruppieren nach employee_id
  const trainerData=new Map();
  for(const sess of sessionList){
    const empId=sess.employee_id;
    if(!empId) continue;
    if(!trainerData.has(empId)) trainerData.set(empId,{
      empId,sessions:[],ratingTraining:[],ratingTrainer:[],ratingStudio:[],intensity:[],comments:[]
    });
    const td=trainerData.get(empId);
    td.sessions.push(sess);
    for(const a of sess.answers){
      const q=qMap.get(a.question_id);if(!q)continue;
      const v=parseFloat(a.answer_value);
      if(q.id===qTraining?.id&&!isNaN(v))td.ratingTraining.push(v);
      if(q.id===qTrainer?.id&&!isNaN(v))td.ratingTrainer.push(v);
      if(q.id===qStudio?.id&&!isNaN(v))td.ratingStudio.push(v);
      if(q.id===qIntensity?.id&&a.answer_value)td.intensity.push(a.answer_value);
      if(q.id===qText?.id&&a.answer_value&&a.answer_value.trim())td.comments.push({text:a.answer_value,date:sess.created_at});
    }
  }

  const trainerList=[...trainerData.values()].sort((a,b)=>{
    const avgA=avg(a.ratingTrainer)??0;
    const avgB=avg(b.ratingTrainer)??0;
    return avgB-avgA;
  });

  document.getElementById('trainerCount').textContent=trainerList.length?`· ${trainerList.length} Trainer`:'';

  if(trainerList.length===0){
    document.getElementById('trainerGrid').innerHTML='<div class="empty" style="grid-column:1/-1">Keine Trainerdaten im gewählten Zeitraum</div>';
  } else {
    document.getElementById('trainerGrid').innerHTML=trainerList.map(td=>{
      const emp=empMap.get(td.empId);
      const name=emp?`${emp.first_name} ${emp.last_name}`:'Unbekannt';
      const avTrain=avg(td.ratingTrainer);
      const avTraining=avg(td.ratingTraining);
      const avStudio=avg(td.ratingStudio);
      const intPerfekt=td.intensity.filter(v=>v==='perfekt').length;
      return `<div class="trainer-card">
        <div class="trainer-top">
          <div class="trainer-av">${ini(emp?.first_name,emp?.last_name)}</div>
          <div>
            <div class="trainer-name">${name}</div>
            <div class="trainer-count">${td.sessions.length} Bewertung${td.sessions.length!==1?'en':''}</div>
          </div>
          ${avTrain!==null?`<div style="margin-left:auto;text-align:right"><div style="font-size:22px;font-weight:900;color:${avTrain>=4.5?'var(--brand)':avTrain>=3.5?'var(--warn-mid)':'var(--bad)'}">${avTrain.toFixed(1)}</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em">Trainer</div></div>`:''}
        </div>
        <div class="trainer-metrics">
          <div class="metric-mini">
            <div class="metric-mini-lbl">🏋️ Training</div>
            <div class="metric-mini-val" style="color:${starColor(avTraining)?'var(--'+starColor(avTraining)+')':'var(--text)'}">${avTraining!==null?avTraining.toFixed(1):'–'}</div>
            <div class="metric-mini-stars">${renderStars(avTraining,11)}</div>
          </div>
          <div class="metric-mini">
            <div class="metric-mini-lbl">🧑‍💼 Trainer-Note</div>
            <div class="metric-mini-val" style="color:${starColor(avTrain)?'var(--'+starColor(avTrain)+')':'var(--text)'}">${avTrain!==null?avTrain.toFixed(1):'–'}</div>
            <div class="metric-mini-stars">${renderStars(avTrain,11)}</div>
          </div>
          <div class="metric-mini">
            <div class="metric-mini-lbl">🏠 Sauberkeit</div>
            <div class="metric-mini-val" style="color:${starColor(avStudio)?'var(--'+starColor(avStudio)+')':'var(--text)'}">${avStudio!==null?avStudio.toFixed(1):'–'}</div>
            <div class="metric-mini-stars">${renderStars(avStudio,11)}</div>
          </div>
          <div class="metric-mini">
            <div class="metric-mini-lbl">💪 Intensität ok</div>
            <div class="metric-mini-val" style="color:var(--brand)">${td.intensity.length?Math.round((intPerfekt/td.intensity.length)*100)+'%':'–'}</div>
            <div style="font-size:10px;color:var(--muted)">${intPerfekt} / ${td.intensity.length} perfekt</div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // KOMMENTARE
  const allComments=[];
  for(const td of trainerList){
    const emp=empMap.get(td.empId);
    for(const c of td.comments){
      allComments.push({...c,emp,empId:td.empId,
        ratingTrainer:td.sessions.find(s=>s.created_at===c.date||true)});
    }
  }
  // Alle Text-Antworten nochmal direkt aus answers holen (vollständiger)
  const textAnswers=answers.filter(a=>a.question_id===qText?.id&&a.answer_value&&a.answer_value.trim());

  document.getElementById('commentCount').textContent=textAnswers.length?`· ${textAnswers.length} Kommentar${textAnswers.length!==1?'e':''}`:'';

  if(textAnswers.length===0){
    document.getElementById('commentList').innerHTML='<div class="empty">Keine Kommentare im gewählten Zeitraum</div>';
  } else {
    document.getElementById('commentList').innerHTML=textAnswers.map(a=>{
      const emp=empMap.get(a.employee_id);
      const name=emp?`${emp.first_name} ${emp.last_name}`:'Trainer';
      const dateStr=new Date(a.created_at).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
      // Bewertungen für diese Session holen
      const sessAnswers=answers.filter(x=>x.session_id===a.session_id);
      const trainerRating=sessAnswers.find(x=>x.question_id===qTrainer?.id)?.answer_value;
      const trainingRating=sessAnswers.find(x=>x.question_id===qTraining?.id)?.answer_value;
      return `<div class="comment-card">
        <div class="comment-header">
          <div class="comment-av">${ini(emp?.first_name,emp?.last_name)}</div>
          <div class="comment-trainer">${name}</div>
          ${trainerRating?`<span class="badge ${parseFloat(trainerRating)>=4?'green':parseFloat(trainerRating)>=3?'amber':'red'}">Trainer: ${trainerRating}★</span>`:''}
          ${trainingRating?`<span class="badge ${parseFloat(trainingRating)>=4?'green':parseFloat(trainingRating)>=3?'amber':'red'}">Training: ${trainingRating}★</span>`:''}
          <span class="comment-date">${dateStr}</span>
        </div>
        <div class="comment-text">"${a.answer_value}"</div>
      </div>`;
    }).join('');
  }
}

/* STUDIOS LADEN */
async function loadStudios(){
  const sb=getSb();
  const{data,error}=await sb.from('studios').select('id,name,sort_order').eq('is_active',true).order('sort_order').order('name');
  if(error||!data?.length) return;
  studios=data;

  // Primary Studio aus Session
  const sess=window._fbSession;
  let primaryId='';
  if(sess?.user?.id){
    try{
      const{data:empData}=await sb.from('employees').select('id').eq('auth_user_id',sess.user.id).limit(1);
      if(empData?.[0]){
        const{data:stData}=await sb.from('employee_studios').select('studio_id,is_primary').eq('employee_id',empData[0].id).eq('is_active',true).order('is_primary',{ascending:false}).limit(1);
        if(stData?.[0]) primaryId=stData[0].studio_id;
      }
    }catch(e){console.warn(e);}
  }

  selectedStudioId=primaryId||studios[0]?.id||'';

  const bar=document.getElementById('studioBar');
  bar.innerHTML=studios.map(s=>`
    <button class="chip${s.id===selectedStudioId?' active':''}" data-studio="${s.id}">${s.name}</button>
  `).join('');

  bar.querySelectorAll('.chip').forEach(btn=>{
    btn.addEventListener('click',()=>{
      selectedStudioId=btn.dataset.studio;
      bar.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      loadAll();
    });
  });
}

/* ZEITFILTER */
document.getElementById('zeitBar').addEventListener('click',e=>{
  const btn=e.target.closest('[data-range]');
  if(!btn) return;
  selectedRange=btn.dataset.range;
  document.querySelectorAll('#zeitBar .chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadAll();
});

/* INIT */
(async function(){
  showLoading('Studio OS wird gestartet …');
  await loadStudios();
  await loadAll();
})();
</script>
