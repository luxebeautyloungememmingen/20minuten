  // Vorhandene Submission-Reason ggf. einfüllen
  if (submission.reason_not_done) {
    const txtEl = document.getElementById('cleaning-reason');
    if (txtEl) txtEl.value = submission.reason_not_done;
  }
}

function renderCleaningTaskRow(task, item, prevDoneByShift) {
  const isDone = item?.is_done || false;
  const isPrev = !!prevDoneByShift && !isDone;
  const prevLabel = isPrev && (SHIFT_LABELS[prevDoneByShift]?.label || prevDoneByShift);

  // Click auf die ganze Row togglet (außer auf den Übernehmen-Button)
  // event.stopPropagation() im Übernehmen-Button-onclick verhindert Doppel-Trigger
  const rowClickable = !isPrev; // bei "previous done" nicht klickbar, da nur "Übernehmen" möglich
  return `
    <div class="cleaning-task-row ${isDone ? 'done' : ''} ${isPrev ? 'prev-done' : ''} ${rowClickable ? 'clickable' : ''}" data-task-id="${task.id}" ${rowClickable ? `onclick="toggleCleaningTask('${task.id}')"` : ''}>
      <button class="cleaning-checkbox ${isDone ? 'checked' : ''} ${isPrev ? 'prev' : ''}" type="button" tabindex="-1" aria-hidden="true">
        ${isDone ? '✓' : isPrev ? '↗' : ''}
      </button>
      <div class="cleaning-task-text">
        <div class="ctt-main">${escapeHtml(task.task_text)}</div>
        ${isPrev ? `<div class="ctt-prev-hint">Bereits von ${prevLabel} erledigt</div>` : ''}
        ${task.area_code ? `<div class="ctt-area">📍 ${escapeHtml(task.area_code)}</div>` : ''}
      </div>
      ${isPrev ? `<button class="cleaning-take-over" onclick="event.stopPropagation(); takeOverCleaningTask('${task.id}')" type="button" title="Ich übernehme">↺</button>` : ''}
    </div>
  `;
}

async function toggleCleaningTask(taskId) {
  const state = window._reinigungState;
  if (!state) return;
  const item = state.itemMap[taskId];
  if (!item) return;

  // Vorherige Schicht-Markierung erlaubt kein Toggle direkt — sondern "übernehmen"
  // Aber: wenn item.is_done = true → toggle erlaubt
  const wasPreviouslyDone = state.previousDone[taskId];
  if (wasPreviouslyDone && !item.is_done) {
    return showToast('Tippe ↺ um die Aufgabe zu übernehmen', 'info');
  }

  const newDone = !item.is_done;
  const today = new Date().toISOString().slice(0, 10);

  // Optimistic UI Update
  const row = document.querySelector(`.cleaning-task-row[data-task-id="${taskId}"]`);
  const cb = row?.querySelector('.cleaning-checkbox');
  if (cb) {
    cb.classList.toggle('checked', newDone);
    cb.textContent = newDone ? '✓' : '';
    row.classList.toggle('done', newDone);
  }

  // DB-Update — source_shift_code aus state.ctx (saubere Quelle), nicht aus DOM
  const currentShift = state?.ctx?.currentShift || 'single';
  const { error } = await sb.from('cleaning_submission_items').update({
    is_done: newDone,
    source_shift_code: newDone ? currentShift : null
  }).eq('id', item.id);

  if (error) {
    // Rollback
    if (cb) {
      cb.classList.toggle('checked', !newDone);
      cb.textContent = !newDone ? '✓' : '';
      row.classList.toggle('done', !newDone);
    }
    return showToast('Fehler: ' + error.message, 'error');
  }

  // State updaten
  item.is_done = newDone;

  // Count neu berechnen
  await recalcCleaningCount();
}

async function takeOverCleaningTask(taskId) {
  const state = window._reinigungState;
  if (!state) return;
  const item = state.itemMap[taskId];
  if (!item) return;

  // Als erledigt markieren mit source_shift_code = aktueller Schicht
  const { error } = await sb.from('cleaning_submission_items').update({
    is_done: true,
    done_by_previous_shift: false
  }).eq('id', item.id);

  if (error) return showToast('Fehler: ' + error.message, 'error');

  item.is_done = true;
  delete state.previousDone[taskId];

  // Re-Render (einfacher als manuelles DOM-Update bei Status-Change)
  await renderReinigungContent(document.getElementById('detail-content'), state.ctx);
}

async function recalcCleaningCount() {
  const state = window._reinigungState;
  if (!state) return;

  let done = 0;
  state.myTasks.forEach(t => {
    const i = state.itemMap[t.id];
    if (i?.is_done || state.previousDone[t.id]) done++;
  });
  const total = state.myTasks.length;
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);

  // Hero updaten
  const valEl = document.querySelector('.cleaning-hero-value');
  if (valEl) valEl.innerHTML = `${done}<span class="unit">/ ${total}</span>`;
  const fillEl = document.querySelector('.cleaning-hero-progress-fill');
  if (fillEl) fillEl.style.width = `${pct}%`;
  const subEl = document.querySelector('.cleaning-hero-sub');
  const isDone = done === total && total > 0;
  if (subEl) subEl.textContent = isDone ? 'Top! Alle Aufgaben erledigt 🎉' : `${pct}% erledigt · ${total - done} übrig`;
  const titleEl = document.querySelector('.urlaub-section-title');
  if (titleEl && titleEl.textContent.includes('Deine Aufgaben')) {
    const sLabel = SHIFT_LABELS[state.myTasks[0]?.responsible_shift_code] || SHIFT_LABELS.single;
    titleEl.textContent = `${sLabel.icon} Deine Aufgaben (${done}/${total})`;
  }

  // DB-Submission updaten (done_count + percent)
  await sb.from('cleaning_shift_submissions').update({
    done_count: done,
    total_tasks: total,
    completion_percent: pct
  }).eq('id', state.submissionId);

  // Bei 100% → Success-Box neu rendern, sonst nur Count
  const heroEl = document.querySelector('.cleaning-hero');
  if (heroEl) {
    if (isDone) heroEl.classList.add('complete');
    else heroEl.classList.remove('complete');
  }
  const heroIcon = document.querySelector('.cleaning-hero-icon');
  if (heroIcon) heroIcon.textContent = isDone ? '✅' : '🧹';

  // Quick-Card auf Heute auch updaten
  refreshReinigungsBadge(done, total);

  // Bei 100% Erfolgsnachricht
  if (isDone) {
    // Confetti-Toast
    showToast('🎉 Alle Aufgaben erledigt!', 'success');
  }
}

async function saveCleaningReason() {
  const state = window._reinigungState;
  if (!state) return;
  const txt = document.getElementById('cleaning-reason').value.trim() || null;
  const { error } = await sb.from('cleaning_shift_submissions').update({
    reason_not_done: txt
  }).eq('id', state.submissionId);
  if (error) return showToast('Fehler: ' + error.message, 'error');
  showToast('Anmerkung gespeichert ✓', 'success');
}

let inboxCurrentTab = 'urlaub';
let inboxData = { urlaub: [], krank: [], schule: [], fahrtkosten: [], nachricht: [] };

async function renderInboxPage(content) {

  let urlaubQuery = sb.from('employee_absences')
    .select('absence_id, employee_id, date_from, date_to, comment, requested_at, employees:employees!employee_absences_employee_id_fkey(display_name, first_name, last_name)')

    .select('absence_id, employee_id, date_from, date_to, comment, requested_at, employees:employees!employee_absences_employee_id_fkey(display_name, first_name, last_name)')
    .eq('absence_type', 'sick')
    .eq('status', 'requested')
    .order('requested_at', { ascending: false });
  if (studioFilter) krankQuery = krankQuery.eq('studio_id', studioFilter);

  let schuleQuery = sb.from('employee_absences')
    .select('absence_id, employee_id, date_from, date_to, comment, requested_at, employees:employees!employee_absences_employee_id_fkey(display_name, first_name, last_name)')
    .eq('absence_type', 'school_exam')
    .eq('status', 'requested')
    .order('date_from', { ascending: true });
  if (studioFilter) schuleQuery = schuleQuery.eq('studio_id', studioFilter);

  let fahrtQuery = sb.from('fahrtkosten_eintraege')

    .eq('status', 'eingereicht')
    .order('datum', { ascending: false });
  if (studioFilter) fahrtQuery = fahrtQuery.eq('studio_id', studioFilter);

  let payoutQuery = sb.from('fahrtkosten_eintraege')

    .eq('status', 'genehmigt')
    .order('genehmigt_am', { ascending: false });

  // 5. Nachrichten ungelesen
  let msgQuery = sb.from('employee_messages')
    .select('id, from_employee_id, subject, message, category, priority, is_read, created_at, employees:employees!employee_messages_from_employee_id_fkey(display_name, first_name, last_name)')
    .eq('is_read', false)
    .neq('from_employee_id', currentSession.employee_id)
    .order('created_at', { ascending: false });

  const [urlaubRes, krankRes, schuleRes, fahrtRes, payoutRes, msgRes] = await Promise.all([

  ]);

  inboxData.krank = krankRes.data || [];
  inboxData.schule = schuleRes.data || [];
  inboxData.fahrtkosten = fahrtRes.data || [];
  inboxData.auszahlen = payoutRes.data || [];
  inboxData.nachricht = msgRes.data || [];

}

function renderInboxView(content) {
  const counts = {
    urlaub: inboxData.urlaub.length,
    krank: inboxData.krank.length,
    schule: inboxData.schule.length,
    fahrtkosten: inboxData.fahrtkosten.length,
    auszahlen: inboxData.auszahlen.length,
    nachricht: inboxData.nachricht.length
  };
  // Hauptzähler: nur was wirklich Aktion braucht (auszahlen NICHT mitzählen)
  const total = counts.urlaub + counts.krank + counts.schule + counts.fahrtkosten + counts.nachricht;

  // Hero-Status
  let heroText;
  if (total === 0) heroText = 'Alles bearbeitet · super Job! 🎉';
  else if (total === 1) heroText = '<strong>1 Anliegen</strong> wartet auf dich';
  else heroText = `<strong>${total} Anliegen</strong> warten auf dich`;

  // Auszahlungs-Hinweis (nur wenn was offen ist)
  let payoutHint = '';
  if (counts.auszahlen > 0) {
    const sum = inboxData.auszahlen.reduce((s, f) => s + Number(f.betrag_eur || 0), 0);
    payoutHint = ` · <span style="opacity:0.85">💰 ${counts.auszahlen} ${counts.auszahlen === 1 ? 'Auszahlung' : 'Auszahlungen'} (${sum.toFixed(2).replace('.', ',')} €) offen</span>`;
  }

  content.innerHTML = `
    <div class="inbox-hero">
      <div class="inbox-hero-bg"></div>
      <div class="inbox-hero-content">
        <div class="inbox-hero-icon">📥</div>
        <div class="inbox-hero-text">
          <div class="inbox-hero-label">INBOX · STUDIOLEITUNG</div>
          <div class="inbox-hero-value">${total}</div>
          <div class="inbox-hero-explain">${heroText}${payoutHint}</div>
        </div>
      </div>
    </div>

    <div class="inbox-tabs">
      ${renderInboxTab('urlaub', '🏖️', 'Urlaub', counts.urlaub)}
      ${renderInboxTab('krank', '🤒', 'Krank', counts.krank)}
      ${renderInboxTab('schule', '🎓', 'Schule', counts.schule)}
      ${renderInboxTab('fahrtkosten', '🚗', 'Fahrt', counts.fahrtkosten)}
      ${renderInboxTab('nachricht', '💬', 'Msg', counts.nachricht)}
      ${renderInboxTab('auszahlen', '💰', 'Auszahlen', counts.auszahlen, 'soft')}
    </div>

    <div id="inbox-content"></div>
  `;

  renderInboxTabContent();
}

function renderInboxTab(key, icon, label, count, variant) {
  const active = inboxCurrentTab === key ? 'active' : '';
  const softCls = variant === 'soft' ? 'soft' : '';
  const badge = count > 0 ? `<span class="inbox-tab-badge ${softCls}">${count}</span>` : '';
  return `
    <button class="inbox-tab ${active} ${softCls}" onclick="switchInboxTab('${key}')" type="button">
      <span class="icon">${icon}</span>
      <span class="label">${label}</span>
      ${badge}
    </button>
  `;
}

function switchInboxTab(tab) {
  inboxCurrentTab = tab;
  document.querySelectorAll('.inbox-tab').forEach(t => t.classList.remove('active'));
  event.currentTarget.classList.add('active');
  renderInboxTabContent();
}

function renderInboxTabContent() {
  const wrap = document.getElementById('inbox-content');
  if (!wrap) return;

  const items = inboxData[inboxCurrentTab] || [];
  if (items.length === 0) {
    wrap.innerHTML = `
      <div class="inbox-empty">
        <div class="icon">✅</div>
        <div class="title">Nichts offen</div>
        <div class="sub">Keine offenen ${getCatLabel(inboxCurrentTab)} im Moment.</div>
      </div>
    `;
    return;
  }

  let html;
  if (inboxCurrentTab === 'urlaub') html = items.map(renderInboxUrlaubItem).join('');
  else if (inboxCurrentTab === 'krank') html = items.map(renderInboxKrankItem).join('');
  else if (inboxCurrentTab === 'schule') html = items.map(renderInboxSchuleItem).join('');
  else if (inboxCurrentTab === 'fahrtkosten') html = items.map(renderInboxFahrtItem).join('');
  else if (inboxCurrentTab === 'auszahlen') {
    // Sammel-Aktion Header oben einfügen
    const total = items.reduce((s, f) => s + Number(f.betrag_eur || 0), 0);
    const header = `
      <div class="payout-header">
        <div class="payout-header-info">
          <div class="payout-header-title">💰 ${items.length} ${items.length === 1 ? 'Fahrt' : 'Fahrten'} bereit zur Auszahlung</div>
          <div class="payout-header-sub">Gesamt: <strong>${total.toFixed(2).replace('.', ',')} €</strong></div>
        </div>
        <button class="inbox-btn paid" onclick="inboxMarkAllFahrtPaid()" type="button">💰 Alle als ausgezahlt</button>
      </div>
    `;
    html = header + items.map(renderInboxAuszahlenItem).join('');
  }
  else if (inboxCurrentTab === 'nachricht') html = items.map(renderInboxMsgItem).join('');

  wrap.innerHTML = html;
}

function getCatLabel(key) {
  return { urlaub:'Urlaubsanträge', krank:'Krankmeldungen', schule:'Schul-/Prüfungstermine', fahrtkosten:'Fahrtkosten', auszahlen:'Auszahlungen', nachricht:'Nachrichten' }[key] || key;
}

function getEmpName(employees) {
  if (!employees) return 'Unbekannt';
  return employees.display_name || `${employees.first_name || ''} ${employees.last_name || ''}`.trim() || 'Unbekannt';
}

function formatDateShort(s) {
  return new Date(s).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function calcDays(from, to) {
  const dFrom = new Date(from), dTo = new Date(to);
  return Math.floor((dTo - dFrom) / 86400000) + 1;
}

async function inboxMarkAllFahrtPaid() {

  try {

    showToast(`✅ ${items.length} Auszahlung${items.length === 1 ? '' : 'en'} erledigt`, 'success');
    await loadInboxView(document.querySelector('.view-content'));

function renderInboxMsgItem(m) {
  const name = getEmpName(m.employees);
  const reqAgo = formatRelative(m.created_at);
  const catMap = {
    'frage': ['❓', 'Frage'], 'problem': ['⚠️', 'Problem'], 'idee': ['💡', 'Idee'],
    'feedback': ['💬', 'Feedback'], 'urlaub_extra': ['🏖️', 'Urlaub extra'],
    'stempelkorrektur': ['⏰', 'Zeit-Korrektur'], 'defekt': ['🔧', 'Defekt'],
    'sonstiges': ['📋', 'Sonstiges']
  };
  const [catIcon, catLabel] = catMap[m.category] || ['📋', m.category || 'Sonstiges'];
  const prioMap = {
    'urgent': ['🔴', 'Dringend', 'urgent'],
    'high': ['🟠', 'Hoch', 'high'],
    'normal': ['', '', ''],
    'low': ['🟢', 'Niedrig', 'low']
  };
  const [prioIcon, prioLabel, prioCls] = prioMap[m.priority] || ['', '', ''];

  // Foto-URL aus Message extrahieren (defekt-Kategorie hat sie inline)
  const photoUrl = extractPhotoUrl(m.message);
  // Text ohne die URL für saubere Anzeige
  const cleanMessage = photoUrl ? m.message.replace(photoUrl, '').replace(/📸 Foto:\s*$/m, '').trim() : m.message;

  // Icon je nach Kategorie
  let itemIcon = '💬';
  if (m.category === 'defekt') itemIcon = '🔧';
  else if (m.category === 'stempelkorrektur') itemIcon = '⏰';

  return `
    <div class="inbox-item ${m.category === 'defekt' ? 'defekt-item' : ''}">
      <div class="inbox-item-top">
        <div class="inbox-item-icon msg">${itemIcon}</div>
        <div class="inbox-item-main">
          <div class="inbox-item-name">${escapeHtml(name)}</div>
          <div class="inbox-item-meta">
            <span class="inbox-cat-tag">${catIcon} ${catLabel}</span>
            ${prioIcon ? `<span class="inbox-prio-tag ${prioCls}">${prioIcon} ${prioLabel}</span>` : ''}
          </div>
          <div class="inbox-item-time">${reqAgo}</div>
        </div>
      </div>
      ${m.subject ? `<div class="inbox-msg-subject">${escapeHtml(m.subject)}</div>` : ''}
      ${photoUrl ? `
        <div class="inbox-photo-wrap" onclick="openPhotoLightbox('${escapeAttr(photoUrl)}')">
          <img src="${escapeAttr(photoUrl)}" alt="Foto" loading="lazy">
          <div class="inbox-photo-zoom">🔍 Tippen für Vollbild</div>
        </div>
      ` : ''}
      <div class="inbox-msg-text">${escapeHtml(cleanMessage)}</div>
      <div class="inbox-item-actions">
        <button class="inbox-btn approve" onclick="inboxMarkMsgRead('${m.id}')">✓ Gelesen markieren</button>
      </div>
    </div>
  `;
}

// Extrahiert eine Foto-URL aus dem Nachrichtentext (Supabase storage URL)
function extractPhotoUrl(text) {
  if (!text) return null;
  const match = text.match(/(https?:\/\/[^\s]+\/storage\/v1\/object\/public\/media\/defekte\/[^\s]+\.(jpg|jpeg|png|webp|gif))/i);
  return match ? match[1] : null;
}

// Foto-Lightbox: Klick auf Foto öffnet Vollbild
function openPhotoLightbox(url) {
  // Existierende Lightbox entfernen
  const existing = document.getElementById('photo-lightbox');
  if (existing) existing.remove();

  const lb = document.createElement('div');
  lb.id = 'photo-lightbox';
  lb.className = 'photo-lightbox';
  lb.innerHTML = `
    <div class="photo-lightbox-backdrop" onclick="this.parentElement.remove()"></div>
    <div class="photo-lightbox-content">
      <button class="photo-lightbox-close" onclick="document.getElementById('photo-lightbox').remove()">✕</button>
      <img src="${escapeAttr(url)}" alt="Foto-Vollbild">
      <a href="${escapeAttr(url)}" target="_blank" rel="noopener" class="photo-lightbox-link">🔗 In neuem Tab öffnen</a>
    </div>
  `;
  document.body.appendChild(lb);
  setTimeout(() => lb.classList.add('open'), 10);
}

async function inboxRejectAbsence(id, type) {

  const { data: existing } = await sb.from('employee_absences')
    .select('comment')
    .eq('absence_id', id)
    .maybeSingle();

  const oldComment = existing?.comment || '';
  const newComment = reason
    ? (oldComment ? oldComment + '\n---\nAblehnung: ' + reason : 'Ablehnung: ' + reason)

  const { error } = await sb.from('employee_absences')
    .update({ status: 'rejected', approved_at: new Date().toISOString(), approved_by: currentSession.employee_id, comment: newComment })
    .eq('absence_id', id);
  if (error) return showToast('Fehler: ' + error.message, 'error');

  reloadInbox();

// ===== DETAIL: URLAUB =====
async function renderUrlaubPage(content) {
  const year = new Date().getFullYear();
  const { data: vac } = await sb.from('employee_vacation_accounts')
    .select('vacation_days_entitlement, carryover_days, manual_adjustment_days')
    .eq('employee_id', currentSession.employee_id)
    .eq('year', year).maybeSingle();

  const { data: taken } = await sb.from('employee_absences')
    .select('date_from, date_to')
    .eq('employee_id', currentSession.employee_id)
    .eq('absence_type', 'vacation')
    .eq('status', 'approved')
    .gte('date_from', `${year}-01-01`)
    .lte('date_to', `${year}-12-31`);

  // Offene + zukünftige Urlaubsanträge (auch genehmigte in der Zukunft)
  const todayStr = new Date().toISOString().slice(0, 10);
  const { data: pendingList } = await sb.from('employee_absences')
    .select('absence_id, date_from, date_to, status, comment, requested_at')
    .eq('employee_id', currentSession.employee_id)
    .eq('absence_type', 'vacation')
    .or(`status.eq.requested,and(status.eq.approved,date_to.gte.${todayStr})`)
    .order('date_from', { ascending: true })
    .limit(20);

  const baseEntitlement = vac ? Number(vac.vacation_days_entitlement || 0) : 0;
  const carryover = vac ? Number(vac.carryover_days || 0) : 0;
  const manualAdj = vac ? Number(vac.manual_adjustment_days || 0) : 0;
  const total = baseEntitlement + carryover + manualAdj;

  const takenDays = (taken || []).reduce((sum, v) => {
    const from = new Date(v.date_from), to = new Date(v.date_to);
    return sum + Math.floor((to - from) / 86400000) + 1;
  }, 0);

  // Beantragte (noch nicht genehmigte) Tage
  const requestedDays = (pendingList || [])
    .filter(p => p.status === 'requested')
    .reduce((sum, v) => {
      const from = new Date(v.date_from), to = new Date(v.date_to);
      return sum + Math.floor((to - from) / 86400000) + 1;
    }, 0);

  const rest = total - takenDays;
  const restAfterRequest = rest - requestedDays;
  const usedPct = total > 0 ? Math.round((takenDays / total) * 100) : 0;

  const today = new Date().toISOString().slice(0, 10);

  // Pending Items rendern
  let pendingHtml = '';
  if (pendingList && pendingList.length > 0) {
    pendingHtml = `
      <div class="urlaub-pending-section">
        <div class="urlaub-section-title">📋 Deine Urlaubsanträge</div>
        ${pendingList.map(p => renderPendingUrlaubItem(p, todayStr)).join('')}
      </div>
    `;
  }

function calculateUrlaubDays() {
  const from = document.getElementById('urlaub-from').value;
  const to = document.getElementById('urlaub-to').value;
  const preview = document.getElementById('urlaub-days-preview');
  const cntEl = document.getElementById('urlaub-days-count');
  const infoEl = document.getElementById('urlaub-days-info');

  if (!from || !to) {
    preview.style.display = 'none';
    return;
  }
  if (to < from) {
    preview.style.display = 'block';
    preview.classList.add('error');
    cntEl.textContent = '⚠️ Ungültiger Zeitraum';
    infoEl.textContent = '"Bis" darf nicht vor "Von" liegen';
    return;
  }

  const dFrom = new Date(from);
  const dTo = new Date(to);
  const days = Math.floor((dTo - dFrom) / 86400000) + 1;

  // Werktage zählen (Mo-Fr)
  let workDays = 0;
  for (let d = new Date(dFrom); d <= dTo; d.setDate(d.getDate() + 1)) {
    const wd = d.getDay();
    if (wd >= 1 && wd <= 5) workDays++;
  }

  preview.style.display = 'block';
  preview.classList.remove('error');
  cntEl.textContent = `${days} ${days === 1 ? 'Tag' : 'Tage'}`;
  infoEl.textContent = `davon ${workDays} ${workDays === 1 ? 'Werktag' : 'Werktage'} · ${dFrom.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit'})} – ${dTo.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit'})}`;
}

function renderPendingUrlaubItem(p, todayStr) {
  const fromStr = new Date(p.date_from).toLocaleDateString('de-DE',{day:'2-digit', month:'2-digit', year:'numeric'});
  const toStr = new Date(p.date_to).toLocaleDateString('de-DE',{day:'2-digit', month:'2-digit', year:'numeric'});
  const range = p.date_from === p.date_to ? fromStr : `${fromStr} – ${toStr}`;
  const dFrom = new Date(p.date_from); const dTo = new Date(p.date_to);
  const days = Math.floor((dTo - dFrom) / 86400000) + 1;

  let statusBadge, sideTag = '';
  const isActive = p.status === 'approved' && p.date_from <= todayStr && p.date_to >= todayStr;
  const isFuture = p.date_from > todayStr;

  if (p.status === 'requested') {
    statusBadge = `<span class="urlaub-status-badge pending">⏳ Wartet auf Antwort</span>`;
  } else if (isActive) {
    statusBadge = `<span class="urlaub-status-badge active">📍 Du hast gerade Urlaub</span>`;
  } else if (isFuture) {
    const diff = Math.ceil((dFrom - new Date(todayStr)) / 86400000);
    statusBadge = `<span class="urlaub-status-badge approved">✅ Genehmigt</span>`;
    sideTag = `<span class="urlaub-side-tag">in ${diff} ${diff === 1 ? 'Tag' : 'Tagen'}</span>`;
  } else {
    statusBadge = `<span class="urlaub-status-badge approved">✅ Genehmigt</span>`;
  }

  const canCancel = p.status === 'requested' || (p.status === 'approved' && isFuture);

  return `
    <div class="urlaub-pending-item ${p.status}${isActive ? ' is-active' : ''}">
      <div class="urlaub-pending-info">
        <div class="urlaub-pending-line1">
          ${statusBadge}
          ${sideTag}
        </div>
        <div class="urlaub-pending-range">${range} · <span class="urlaub-pending-days">${days} ${days === 1 ? 'Tag' : 'Tage'}</span></div>
        ${p.comment ? `<div class="urlaub-pending-comment">${escapeHtml(p.comment)}</div>` : ''}
      </div>
      ${canCancel ? `<button class="urlaub-cancel-btn" onclick="cancelUrlaubAntrag('${p.absence_id}', '${p.status}')" title="Antrag stornieren">✕</button>` : ''}
    </div>
  `;
}

async function cancelUrlaubAntrag(id, currentStatus) {
  const msg = currentStatus === 'approved'
    ? 'Genehmigten Urlaub wirklich stornieren?'
    : 'Urlaubsantrag wirklich zurückziehen?';
  if (!confirm(msg)) return;
  const { error } = await sb.from('employee_absences').update({ status: 'cancelled' }).eq('absence_id', id);
  if (error) return showToast('Fehler: ' + error.message, 'error');
  showToast('Antrag storniert ✓', 'success');
  renderUrlaubPage(document.getElementById('detail-content'));
}

async function submitUrlaub(e) {
  e.preventDefault();
  const from = document.getElementById('urlaub-from').value;
  const to = document.getElementById('urlaub-to').value;
  const comment = document.getElementById('urlaub-comment').value.trim() || null;
  if (!from || !to) return showToast('Bitte beide Daten wählen', 'error');
  if (to < from) return showToast('"Bis" darf nicht vor "Von" liegen', 'error');

  const btn = document.getElementById('urlaub-submit');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Sende…';

  const { error } = await sb.from('employee_absences').insert({
    employee_id: currentSession.employee_id,
    studio_id: currentStudioId,
    absence_type: 'vacation',
    date_from: from,
    date_to: to,
    status: 'requested',
    comment
  });

  btn.disabled = false; btn.innerHTML = '🏖️ Urlaubsantrag stellen';
  if (error) return showToast('Fehler: ' + error.message, 'error');
  showToast('Urlaubsantrag eingereicht ✓', 'success');
  // Seite neu laden um die neue Anfrage in der Liste zu sehen
  renderUrlaubPage(document.getElementById('detail-content'));
}

    'requested': ['pending', '⏳ Wartet'],
    'approved':  ['approved', '✅ Bestätigt'],
    'rejected':  ['rejected', '❌ Abgelehnt'],
    'cancelled': ['cancelled', '↩️ Storniert']
  };
  const [cls, label] = statusMap[p.status] || ['', p.status];

  let sideTag = '';
  if (isActive) sideTag = '<span class="urlaub-side-tag">📍 heute</span>';
  else if (isFuture && p.status === 'approved') {
    const diff = Math.ceil((dFrom - new Date(todayStr)) / 86400000);
    sideTag = `<span class="urlaub-side-tag">in ${diff} ${diff === 1 ? 'Tag' : 'Tagen'}</span>`;
  }

  const canCancel = p.status === 'requested' || (p.status === 'approved' && isFuture);

  return `
    <div class="urlaub-pending-item ${cls}${isActive ? ' is-active' : ''}">
      <div class="urlaub-pending-info">
        <div class="urlaub-pending-line1">
          <span class="urlaub-status-badge ${cls}">${label}</span>
          ${sideTag}
        </div>
        <div class="urlaub-pending-range">${range} · <span class="urlaub-pending-days">${days} ${days === 1 ? 'Tag' : 'Tage'}</span></div>
        ${p.comment ? `<div class="urlaub-pending-comment">${escapeHtml(p.comment)}</div>` : ''}
      </div>
      ${canCancel ? `<button class="urlaub-cancel-btn" onclick="cancelSchuleAntrag('${p.absence_id}', '${p.status}')" title="Storno">✕</button>` : ''}
    </div>
  `;
}

async function cancelSchuleAntrag(id, currentStatus) {
  const msg = currentStatus === 'approved'
    ? 'Termin wirklich stornieren?'
    : 'Meldung wirklich zurückziehen?';
  if (!confirm(msg)) return;
  const { error } = await sb.from('employee_absences').update({ status: 'cancelled' }).eq('absence_id', id);
  if (error) return showToast('Fehler: ' + error.message, 'error');
  showToast('Storniert ✓', 'success');
  renderSchulePage(document.getElementById('detail-content'));
}

async function submitSchule(e) {

  const from = document.getElementById('schule-from').value;

    studio_id: currentStudioId,

  });

  renderSchulePage(document.getElementById('detail-content'));
}

function calculateFahrtBetrag() {
  const kmInput = document.getElementById('fahrt-km');
  const preview = document.getElementById('fahrt-betrag-preview');
  const valEl = document.getElementById('fahrt-betrag-value');
  const infoEl = document.getElementById('fahrt-betrag-info');
  if (!kmInput || !preview) return;
  const km = parseFloat(kmInput.value);
  if (!km || km <= 0) {
    preview.style.display = 'none';
    return;
  }
  const kmGesamt = km * 2;
  const betrag = kmGesamt * 0.30;
  preview.style.display = 'flex';
  valEl.textContent = betrag.toFixed(2).replace('.', ',') + ' €';
  infoEl.textContent = `${kmGesamt.toFixed(1)} km gesamt · Hin und zurück`;
}

// ===== DETAIL: STUNDEN =====
async function renderStundenPage(content) {
  // Saldo holen
  const { data: bal } = await sb.from('v_time_account_balance')
    .select('balance_hours, balance_minutes, first_record_date, last_record_date')
    .eq('employee_id', currentSession.employee_id)
    .maybeSingle();

  // Zeitfenster: 6 Monate rückwärts + komplette aktuelle Woche + nächste Woche
  const todayD = new Date(); todayD.setHours(0,0,0,0);
  const fromDate = new Date(todayD.getFullYear(), todayD.getMonth() - 5, 1);
  const toDate = new Date(todayD); toDate.setDate(todayD.getDate() + 14);
  const fromStr = fromDate.toISOString().slice(0, 10);
  const toStr = toDate.toISOString().slice(0, 10);
  const todayStr = todayD.toISOString().slice(0, 10);

  const { data: days } = await sb.from('v_time_daily_overview')
    .select('*')
    .eq('employee_id', currentSession.employee_id)
    .gte('work_date', fromStr)
    .lte('work_date', toStr)
    .order('work_date', { ascending: true });

  // === Saldo-Story ===
  const balanceH = bal ? Number(bal.balance_hours || 0) : 0;
  const sign = balanceH > 0 ? '+' : '';
  const balDisplay = `${sign}${balanceH.toFixed(1)}`;

  let storyText = '';
  if (balanceH > 10) {
    storyText = `Du hast <strong>${balanceH.toFixed(1)} Stunden</strong> mehr gearbeitet als geplant. Top!`;
  } else if (balanceH > 0) {
    storyText = `Du bist <strong>${balanceH.toFixed(1)} Stunden</strong> im Plus. Alles im grünen Bereich.`;
  } else if (balanceH === 0) {
    storyText = `Genau im Soll. Punktgenau gearbeitet.`;
  } else if (balanceH > -5) {
    storyText = `Du liegst <strong>${Math.abs(balanceH).toFixed(1)} Stunden</strong> unter dem Soll. Kein Drama, gleicht sich aus.`;
  } else {
    storyText = `Du liegst <strong>${Math.abs(balanceH).toFixed(1)} Stunden</strong> unter dem Soll. Sprich am besten kurz mit der Studioleitung.`;
  }

  // === Diese Woche / Diesen Monat ausrechnen ===
  const today = todayD; // schon oben definiert
  const wkDay = (today.getDay() + 6) % 7; // 0=Mo
  const wkStart = new Date(today); wkStart.setDate(today.getDate() - wkDay);
  const wkStartStr = wkStart.toISOString().slice(0, 10);
  const wkEnd = new Date(wkStart); wkEnd.setDate(wkStart.getDate() + 6);
  const wkEndStr = wkEnd.toISOString().slice(0, 10);
  const moStart = new Date(today.getFullYear(), today.getMonth(), 1);
  const moStartStr = moStart.toISOString().slice(0, 10);
  const moEnd = new Date(today.getFullYear(), today.getMonth()+1, 0);
  const moEndStr = moEnd.toISOString().slice(0, 10);

  let wkSoll = 0, wkIst = 0, moSoll = 0, moIst = 0;
  (days || []).forEach(d => {
    const dt = d.work_date;
    // Aktuelle Woche (Mo–So) — Ist nur bis heute, Soll komplett
    if (dt >= wkStartStr && dt <= wkEndStr) {
      wkSoll += Number(d.final_target_hours || 0);
      if (dt <= todayStr) wkIst += Number(d.fulfilled_hours || 0);
    }
    // Aktueller Monat — Ist nur bis heute, Soll komplett
    if (dt >= moStartStr && dt <= moEndStr) {
      moSoll += Number(d.final_target_hours || 0);
      if (dt <= todayStr) moIst += Number(d.fulfilled_hours || 0);
    }
  });

  const wkPct = wkSoll > 0 ? Math.min(100, Math.round((wkIst / wkSoll) * 100)) : 0;
  const moPct = moSoll > 0 ? Math.min(100, Math.round((moIst / moSoll) * 100)) : 0;

  // === Tage nach Monat → Woche gruppieren ===
  const monthGroups = groupByMonth(days || []);

  content.innerHTML = `
    <div class="hours-hero">
      <div class="hours-hero-label">Aktueller Stundensaldo</div>
      <div class="hours-hero-value">${balDisplay}<span class="unit">h</span></div>
      <div class="hours-hero-explain">${storyText}</div>
      ${bal?.first_record_date ? `<div class="hours-hero-since">Erfasst seit ${new Date(bal.first_record_date).toLocaleDateString('de-DE', {day:'2-digit', month:'long', year:'numeric'})}${bal?.last_record_date ? ' · Letzter Eintrag: ' + new Date(bal.last_record_date).toLocaleDateString('de-DE') : ''}</div>` : ''}
    </div>

    <div class="hours-week-stats">
      <div class="hours-week-card">
        <div class="lbl">Diese Woche</div>
        <div class="val">${wkIst.toFixed(1)}<span style="font-size:13px;font-weight:600;color:var(--text-muted)"> / ${wkSoll.toFixed(1)}h</span></div>
        <div class="sub">${wkPct}% vom Soll</div>

      </div>
      <div class="hours-week-card">
        <div class="lbl">Diesen Monat</div>
        <div class="val">${moIst.toFixed(1)}<span style="font-size:13px;font-weight:600;color:var(--text-muted)"> / ${moSoll.toFixed(1)}h</span></div>
        <div class="sub">${moPct}% vom Soll</div>
        <div class="progress-bar"><div class="fill" style="width:${moPct}%"></div></div>

  // Auto-Scroll zur aktuellen Woche (oder heute) nach dem Rendern
  setTimeout(() => {

}

const MONTH_NAMES = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

function groupByMonth(days) {
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = today.toISOString().slice(0, 10);
  const currentMonthKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;

  // Erst Tage nach Monat (YYYY-MM) bucketen
  const monthBuckets = {};
  days.forEach(d => {
    const key = d.work_date.slice(0, 7); // YYYY-MM
    if (!monthBuckets[key]) monthBuckets[key] = [];
    monthBuckets[key].push(d);
  });

  // Pro Monat: nach Wochen weiter gruppieren
  return Object.keys(monthBuckets).sort().reverse().map(monthKey => {
    const monthDays = monthBuckets[monthKey].sort((a, b) => a.work_date.localeCompare(b.work_date));
    const [yr, mo] = monthKey.split('-').map(Number);
    const monthLabel = `${MONTH_NAMES[mo - 1]} ${yr}`;

    // Monats-Summary - nur vergangene Tage zählen
    let mSoll = 0, mIst = 0, hasPast = false, hasFuture = false;
    monthDays.forEach(d => {
      const isFuture = d.work_date > todayStr;
      if (!isFuture) {
        mSoll += Number(d.final_target_hours || 0);
        mIst += Number(d.fulfilled_hours || 0);
        hasPast = true;
      } else {
        hasFuture = true;
      }
    });
    const mDiff = mIst - mSoll;

    // Wochen innerhalb des Monats berechnen
    const weeks = groupDaysByWeek(monthDays);

    const isCurrentMonth = monthKey === currentMonthKey;
    const isFutureMonth = !hasPast && hasFuture;

    return {
      monthKey,
      monthLabel,
      monthDays,
      weeks,
      mSoll, mIst, mDiff,
      hasPast, hasFuture,
      isCurrentMonth,
      isFutureMonth
    };
  });
}

function groupDaysByWeek(days) {
  function getWeekKey(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const target = new Date(d.valueOf());
    const dayNr = (d.getDay() + 6) % 7;
    target.setDate(target.getDate() - dayNr + 3);
    const firstThursday = target.valueOf();
    target.setMonth(0, 1);
    if (target.getDay() !== 4) {
      target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
    }
    const week = 1 + Math.ceil((firstThursday - target) / 604800000);
    return `${d.getFullYear()}-W${String(week).padStart(2, '0')}`;
  }

  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = today.toISOString().slice(0, 10);

  const wkBuckets = {};
  days.forEach(d => {
    const key = getWeekKey(d.work_date);
    if (!wkBuckets[key]) wkBuckets[key] = [];
    wkBuckets[key].push(d);
  });

  return Object.keys(wkBuckets).sort().map(wkKey => {
    const sorted = wkBuckets[wkKey].sort((a, b) => a.work_date.localeCompare(b.work_date));
    const weekNum = parseInt(wkKey.split('W')[1], 10);
    const firstDay = new Date(sorted[0].work_date + 'T00:00:00');
    const monDay = new Date(firstDay);
    monDay.setDate(firstDay.getDate() - ((firstDay.getDay() + 6) % 7));
    const sunDay = new Date(monDay);
    sunDay.setDate(monDay.getDate() + 6);

    let soll = 0, ist = 0, hasFutureOnly = true;
    sorted.forEach(d => {
      const isFuture = d.work_date > todayStr;
      if (!isFuture) {
        soll += Number(d.final_target_hours || 0);
        ist += Number(d.fulfilled_hours || 0);
        hasFutureOnly = false;
      }
    });
    const diff = ist - soll;

    const isFutureWeek = hasFutureOnly;
    const isCurrentWeek = sorted.some(d => d.work_date === todayStr) ||
                          (monDay <= today && today <= sunDay);

    return {
      weekNum, year: firstDay.getFullYear(),
      monDay, sunDay,
      days: sorted, soll, ist, diff,
      isFutureWeek, isCurrentWeek
    };
  });
}

function renderMonthGroup(mg) {
  // Summary
  let summaryHtml;
  if (mg.isFutureMonth) {
    summaryHtml = `<div class="month-summary planned">geplant</div>`;
  } else if (Math.abs(mg.mDiff) < 0.05) {
    summaryHtml = `<div class="month-summary zero">±0h</div>`;
  } else if (mg.mDiff > 0) {
    summaryHtml = `<div class="month-summary pos">+${mg.mDiff.toFixed(1)}h</div>`;
  } else {
    summaryHtml = `<div class="month-summary neg">${mg.mDiff.toFixed(1)}h</div>`;
  }

  // Aktueller Monat ist default offen, andere zu
  const isOpen = mg.isCurrentMonth;
  const openClass = isOpen ? 'open' : '';

  const subText = mg.isFutureMonth
    ? `${mg.monthDays.reduce((s,d)=>s+Number(d.final_target_hours||0),0).toFixed(1)}h geplant`
    : `${mg.mIst.toFixed(1)}h / ${mg.mSoll.toFixed(1)}h${mg.hasFuture ? ' · läuft' : ''}`;

  return `
    <div class="hours-month ${openClass}${mg.isCurrentMonth ? ' current' : ''}">
      <button class="hours-month-header" onclick="toggleMonth(this)" type="button">
        <div class="month-toggle">
          <span class="chevron">▶</span>
          <div>
            <div class="month-title">${mg.monthLabel}${mg.isCurrentMonth ? ' <span class="badge-current">aktuell</span>' : ''}</div>
            <div class="month-sub">${subText}</div>
          </div>
        </div>
        ${summaryHtml}
      </button>
      <div class="hours-month-body">
        ${mg.weeks.map(wk => renderWeekGroup(wk)).join('')}
      </div>
    </div>
  `;
}

function toggleMonth(btn) {
  const monthEl = btn.closest('.hours-month');
  monthEl.classList.toggle('open');
}

function renderWeekGroup(wg) {
  const fmt = (d) => `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.`;

  // Zukunfts-Wochen: kein Diff anzeigen, nur "geplant"
  let summaryHtml;
  if (wg.isFutureWeek) {
    const plannedTotal = wg.days.reduce((sum, d) => sum + Number(d.final_target_hours || 0), 0);
    summaryHtml = `<div class="summary planned">${plannedTotal.toFixed(1)}h geplant</div>`;
  } else {
    const diffSign = wg.diff > 0 ? '+' : '';
    const diffCls = wg.diff > 0.1 ? 'pos' : wg.diff < -0.1 ? 'neg' : 'zero';
    const diffText = Math.abs(wg.diff) < 0.05 ? '±0h' : `${diffSign}${wg.diff.toFixed(1)}h`;
    summaryHtml = `<div class="summary ${diffCls}">${diffText}</div>`;
  }

  // Range-Text: Zukunftswoche zeigt nur geplante Soll-Stunden
  let rangeText;
  if (wg.isFutureWeek) {
    rangeText = `${fmt(wg.monDay)} – ${fmt(wg.sunDay)} · noch nicht erfasst`;
  } else {
    rangeText = `${fmt(wg.monDay)} – ${fmt(wg.sunDay)} · ${wg.ist.toFixed(1)}h / ${wg.soll.toFixed(1)}h`;
  }

  const groupClasses = ['hours-week-group'];
  if (wg.isCurrentWeek) groupClasses.push('current');

  return `
    <div class="${groupClasses.join(' ')}">
      <div class="hours-week-header">
        <div>
          <div class="kw">KW ${wg.weekNum} · ${wg.year}${wg.isCurrentWeek ? ' · diese Woche' : ''}</div>
          <div class="range">${rangeText}</div>
        </div>
        ${summaryHtml}
      </div>
      ${wg.days.map(d => renderDayItem(d)).join('')}
    </div>
  `;
}

const DOW_NAMES = ['So','Mo','Di','Mi','Do','Fr','Sa'];

function renderDayItem(d) {
  const date = new Date(d.work_date + 'T00:00:00');
  const dow = DOW_NAMES[date.getDay()];
  const isWeekend = date.getDay() === 0 || date.getDay() === 6;
  const today = new Date(); today.setHours(0,0,0,0);
  const isToday = date.getTime() === today.getTime();
  const isFuture = date.getTime() > today.getTime();

  const ist = Number(d.actual_hours || 0);
  const soll = Number(d.final_target_hours || 0);
  const fulfilled = Number(d.fulfilled_hours || 0);
  const delta = Number(d.delta_hours || 0);

  // Status-Pill bestimmen (Zukunft hat eigene Logik)
  const statusInfo = getDayStatusInfo(d, isWeekend, isFuture);

  // Times-Block: Echte Zeiten wenn vorhanden
  let timesHtml = '';
  if (isFuture && !d.has_absence && !d.has_holiday) {
    // Zukunftstage ohne Abwesenheit/Feiertag
    if (soll > 0) {
      timesHtml = `<div class="hours-day-times muted">Eingeplant · ${soll.toFixed(1)}h vorgesehen</div>`;
    } else {
      timesHtml = `<div class="hours-day-times muted">${isWeekend ? 'Wochenende' : 'Kein Arbeitstag'}</div>`;
    }
  } else if (d.clock_in && d.clock_out) {
    const ci = String(d.clock_in).slice(0, 5);
    const co = String(d.clock_out).slice(0, 5);
    const breakStr = d.break_minutes > 0 ? ` <span class="muted">· ${d.break_minutes}min Pause</span>` : '';
    timesHtml = `<div class="hours-day-times">${ci} → ${co}${breakStr} <span class="muted">= ${ist.toFixed(1)}h</span></div>`;
  } else if (d.has_absence && d.absence_type) {
    const absLabel = absenceLabel(d.absence_type);
    timesHtml = `<div class="hours-day-times muted">${absLabel}${fulfilled > 0 ? ` · ${fulfilled.toFixed(1)}h gutgeschrieben` : ''}</div>`;
  } else if (d.has_holiday) {
    timesHtml = `<div class="hours-day-times muted">Feiertag · ${fulfilled > 0 ? fulfilled.toFixed(1) + 'h gutgeschrieben' : 'frei'}</div>`;
  } else if (soll === 0) {
    timesHtml = `<div class="hours-day-times muted">${isWeekend ? 'Wochenende' : 'Kein Arbeitstag'}</div>`;
  } else {
    timesHtml = `<div class="hours-day-times muted">Keine Zeit erfasst</div>`;
  }

  // Soll-Anzeige
  let targetHtml = '';
  if (soll > 0 && !isFuture) {
    targetHtml = `<div class="hours-day-target">Soll: ${soll.toFixed(1)}h</div>`;
  }

  // Differenz-Anzeige (NUR für vergangene Tage und heute mit Daten)
  let diffHtml = '';
  if (isFuture) {
    // Zukunft: nichts oder Soll-Hinweis
    if (soll > 0) {
      diffHtml = `<div class="hours-day-diff future">${soll.toFixed(1)}h<span class="lbl">geplant</span></div>`;
    }
  } else if (soll > 0 || ist > 0) {
    const absDelta = Math.abs(delta);
    if (absDelta < 0.05) {
      diffHtml = `<div class="hours-day-diff zero">±0h<span class="lbl">passt</span></div>`;
    } else if (delta > 0) {
      diffHtml = `<div class="hours-day-diff pos">+${delta.toFixed(1)}h<span class="lbl">plus</span></div>`;
    } else {
      diffHtml = `<div class="hours-day-diff neg">${delta.toFixed(1)}h<span class="lbl">minus</span></div>`;
    }
  }

  // Klassen für Day
  const classes = ['hours-day'];
  if (isToday) classes.push('today');
  else if (isFuture) classes.push('future');
  else if (isWeekend && !d.has_absence) classes.push('weekend');
  if (d.has_absence) classes.push('absence');
  if (d.has_holiday) classes.push('holiday');

  // "Korrektur anfragen" nur für Vergangene Tage (nicht Zukunft)
  // Auch wenn keine Zeiten erfasst sind, kann eine Korrektur sinnvoll sein (z.B. "Ich hatte vergessen einzustempeln")
  let correctionBtnHtml = '';
  if (!isFuture && !d.has_holiday && !d.has_absence) {
    const dataJson = JSON.stringify({
      work_date: d.work_date,
      clock_in: d.clock_in,
      clock_out: d.clock_out,
      break_minutes: d.break_minutes,
      actual_hours: ist,
      final_target_hours: soll
    }).replace(/"/g, '&quot;');
    correctionBtnHtml = `<button class="hours-day-correct-btn" onclick='openZeitKorrektur(${dataJson})' type="button" title="Zeit-Korrektur anfragen">⏰</button>`;
  }

  return `
    <div class="${classes.join(' ')}">
      <div class="hours-day-date">
        <div class="dow">${dow}</div>
        <div class="num">${date.getDate()}</div>
      </div>
      <div class="hours-day-info">
        <div class="hours-day-line1">
          <span class="hours-day-status ${statusInfo.cls}">${statusInfo.icon} ${statusInfo.label}</span>
          ${targetHtml}
        </div>
        ${timesHtml}
      </div>
      <div class="hours-day-right">
        ${diffHtml}
        ${correctionBtnHtml}
      </div>
    </div>
  `;
}

// ===== ZEIT-KORREKTUR ANFRAGEN =====

  const date = new Date(dayData.work_date + 'T00:00:00');

  const ciCurrent = dayData.clock_in ? String(dayData.clock_in).slice(0, 5) : '';
  const coCurrent = dayData.clock_out ? String(dayData.clock_out).slice(0, 5) : '';
  const breakCurrent = dayData.break_minutes || 0;

  const hasTimes = !!(ciCurrent && coCurrent);

  modal = document.createElement('div');
  modal.id = 'zeit-korrektur-modal';
  modal.className = 'fu-modal';
  modal.innerHTML = `
    <div class="fu-modal-backdrop" onclick="closeZeitKorrektur()"></div>

      </div>

      <div class="fu-modal-body">
        <div class="zk-day-info">
          <div class="zk-day-label">${escapeHtml(dateStr)}</div>
        </div>

        ${hasTimes ? `
          <div class="zk-current">
            <div class="zk-section-title">📍 Aktuell erfasst</div>
            <div class="zk-current-times">
              <div class="zk-time-cell">

              </div>
              <div class="zk-arrow">→</div>
              <div class="zk-time-cell">
                <div class="lbl">Ausgestempelt</div>
                <div class="val">${coCurrent}</div>
              </div>
            </div>
            ${breakCurrent > 0 ? `<div class="zk-break-info">Pause: ${breakCurrent} Min</div>` : ''}

        ` : `
          <div class="zk-no-times">

        `}

        <div class="zk-new-section">
          <div class="zk-section-title">✏️ Korrektur-Vorschlag</div>

          <div class="urlaub-date-grid" style="grid-template-columns:1fr auto 1fr;margin-bottom:10px">
            <div class="urlaub-date-cell">
              <label>Sollte sein: Eingestempelt</label>

            </div>
            <div class="urlaub-arrow">→</div>
            <div class="urlaub-date-cell">
              <label>Sollte sein: Ausgestempelt</label>
              <input type="time" id="zk-clock-out" value="${coCurrent}">
            </div>
          </div>

          <div class="msg-field-group" style="margin-bottom:10px">
            <label>Pause in Min</label>
            <input type="number" id="zk-break" min="0" step="5" value="${breakCurrent}" placeholder="0">
          </div>
        </div>

        <div class="msg-field-group">
          <label>Grund / Erklärung <span class="req">*</span></label>
          <textarea id="zk-reason" required rows="3" placeholder="z.B. Vergessen einzustempeln, Pause vergessen einzutragen, Kollege hat mich versehentlich ausgestempelt..."></textarea>
        </div>

        <div class="zk-priority-row">
          <label>An wen?</label>

function closeZeitKorrektur(e) {
  if (e && e.preventDefault) { e.preventDefault(); e.stopPropagation(); }
  const modal = document.getElementById('zeit-korrektur-modal');
  if (!modal) return;
  modal.classList.remove('open');
  setTimeout(() => modal.remove(), 300);
}

async function submitZeitKorrektur(workDate, hadTimes) {
  const ci = document.getElementById('zk-clock-in').value;
  const co = document.getElementById('zk-clock-out').value;
  const breakMin = parseInt(document.getElementById('zk-break').value || '0', 10);
  const reason = document.getElementById('zk-reason').value.trim();
  const empfaengerType = document.querySelector('#zk-empfaenger .msg-chip.active')?.dataset.val || 'admin_sl';

  if (!reason) return showToast('Bitte Grund eingeben', 'error');
  if (!ci || !co) return showToast('Bitte Ein- und Ausstempelzeit angeben', 'error');
  if (co <= ci) return showToast('Ausstempelzeit muss nach Einstempelzeit liegen', 'error');

  // Stunden ausrechnen
  const [ciH, ciM] = ci.split(':').map(Number);
  const [coH, coM] = co.split(':').map(Number);
  const totalMin = (coH * 60 + coM) - (ciH * 60 + ciM) - breakMin;
  const totalH = (totalMin / 60).toFixed(1);

  const date = new Date(workDate + 'T00:00:00');
  const dateLabel = date.toLocaleDateString('de-DE', { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' });

  // Strukturierten Nachrichtentext bauen
  const subject = `Zeit-Korrektur ${date.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })}`;

  const messageParts = [
    `📅 Datum: ${dateLabel}`,
    ``,
    `⏰ Korrektur-Vorschlag:`,
    `   • Eingestempelt: ${ci}`,
    `   • Ausgestempelt: ${co}`,
    `   • Pause: ${breakMin} Min`,
    `   • Arbeitszeit: ${totalH}h`,
    ``,
    `📝 Grund:`,
    reason,
    ``,
    `———`,
    hadTimes ? `(Status: Korrektur einer bestehenden Erfassung)` : `(Status: Nachträgliche Erfassung — keine Stempelzeit vorhanden)`
  ];
  const message = messageParts.join('\n');

  const btn = document.getElementById('zk-submit-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Sende…';

  const { error } = await sb.from('employee_messages').insert({
    from_employee_id: currentSession.employee_id,
    studio_id: currentStudioId,
    subject,
    message,
    category: 'stempelkorrektur',
    priority: 'high'
  });

  btn.disabled = false; btn.innerHTML = '📤 Korrektur-Anfrage senden';
  if (error) return showToast('Fehler: ' + error.message, 'error');

  showToast('✓ Anfrage gesendet · Push an Admin', 'success');
  closeZeitKorrektur();
}

function getDayStatusInfo(d, isWeekend, isFuture) {
  // ZUKUNFT zuerst behandeln
  if (isFuture) {
    if (d.has_absence && d.absence_type) {
      const m = {
        'vacation':   { icon: '🏖️', label: 'Urlaub geplant',  cls: 'planned' },
        'sick':       { icon: '🤒', label: 'Krank',           cls: 'absent' },
        'school_exam':{ icon: '🎓', label: 'Schule/Prüfung',  cls: 'planned' },
        'paid_leave': { icon: '💼', label: 'Sonderurlaub',    cls: 'planned' },
        'unpaid_leave':{icon: '📋', label: 'Unbezahlt',       cls: 'planned' }
      };
      return m[d.absence_type] || { icon: '📋', label: 'Geplant', cls: 'planned' };
    }
    if (d.has_holiday) {
      return { icon: '🎌', label: 'Feiertag', cls: 'holiday' };
    }
    if (isWeekend && Number(d.final_target_hours || 0) === 0) {
      return { icon: '🌙', label: 'Wochenende', cls: 'weekend' };
    }
    if (Number(d.final_target_hours || 0) > 0) {
      return { icon: '📅', label: 'Geplant', cls: 'planned' };
    }
    return { icon: '🌙', label: 'Frei', cls: 'weekend' };
  }

  // Vergangenheit/Heute: alte Logik
  if (d.has_absence && d.absence_type) {
    const m = {
      'vacation':   { icon: '🏖️', label: 'Urlaub',         cls: 'absent' },
      'sick':       { icon: '🤒', label: 'Krank',          cls: 'absent' },
      'school_exam':{ icon: '🎓', label: 'Schule/Prüfung', cls: 'absent' },
      'paid_leave': { icon: '💼', label: 'Sonderurlaub',   cls: 'absent' },
      'unpaid_leave':{icon: '📋', label: 'Unbezahlt',      cls: 'absent' }
    };
    return m[d.absence_type] || { icon: '📋', label: 'Abwesend', cls: 'absent' };
  }
  if (d.has_holiday) {
    return { icon: '🎌', label: 'Feiertag', cls: 'holiday' };
  }
  if (isWeekend && Number(d.final_target_hours || 0) === 0 && Number(d.actual_hours || 0) === 0) {
    return { icon: '🌙', label: 'Wochenende', cls: 'weekend' };
  }
  // Status-Code mapping
  const s = d.day_status || 'open';
  const m = {
    'ok':              { icon: '✅', label: 'OK',              cls: 'ok' },
    'verified':        { icon: '✅', label: 'Geprüft',         cls: 'verified' },
    'open':            { icon: '📋', label: 'Offen',           cls: 'open' },
    'no_work_day':     { icon: '🌙', label: 'Frei',            cls: 'weekend' },
    'absent':          { icon: '📋', label: 'Abwesend',        cls: 'absent' },
    'holiday':         { icon: '🎌', label: 'Feiertag',        cls: 'holiday' },
    'review_required': { icon: '⚠️', label: 'Klärung nötig',   cls: 'review' }
  };
  return m[s] || { icon: '📋', label: s, cls: 'open' };
}

// ===== DETAIL: ANWESENHEITEN =====
async function renderAnwesenheitenPage(content) {
  const { data: history } = await sb.from('employee_absences')
    .select('absence_id, absence_type, date_from, date_to, status, comment, requested_at, approved_at')
    .eq('employee_id', currentSession.employee_id)
    .order('date_from', { ascending: false })
    .limit(100);

  // Wenn gar nix da → Empty State
  if (!history || history.length === 0) {
    content.innerHTML = `
      <div class="detail-intro">
        <div class="title">📅 Meine Abwesenheiten</div>
        <div class="desc">Alle deine Anträge, Krankmeldungen und Schul-Tage im Überblick.</div>
      </div>
      <div class="empty-state">
        <div class="icon">📭</div>
        <div>Noch keine Einträge</div>
      </div>
    `;
    return;
  }

  // Stats: laufende & beantragte zählen
  const todayStr = new Date().toISOString().slice(0, 10);
  let openCount = 0, activeCount = 0;
  history.forEach(a => {
    if (a.status === 'requested') openCount++;
    if (a.status === 'approved' && a.date_from <= todayStr && a.date_to >= todayStr) activeCount++;
  });

  // Nach Kategorie gruppieren
  const catDef = [
    { key: 'vacation',           icon: '🏖️', label: 'Urlaub',          color: '#2f8615' },
    { key: 'sick',               icon: '🤒', label: 'Krankmeldungen',  color: '#e89028' },
    { key: 'school_exam',        icon: '🎓', label: 'Schule / Prüfung',color: '#2563eb' },
    { key: 'overtime_reduction', icon: '⏱️', label: 'Überstundenabbau',color: '#6b7066' },
    { key: 'paid_leave',         icon: '💼', label: 'Sonderurlaub',    color: '#7e22ce' },
    { key: 'unpaid_leave',       icon: '📋', label: 'Unbezahlt',       color: '#6b7066' }
  ];

  const grouped = {};
  history.forEach(a => {
    const key = a.absence_type;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(a);
  });

  // Kategorien aufbauen - nur die mit Einträgen
  const cats = catDef.filter(c => grouped[c.key] && grouped[c.key].length > 0);
  // Weitere unbekannte Typen ans Ende
  Object.keys(grouped).forEach(k => {
    if (!catDef.find(c => c.key === k)) {
      cats.push({ key: k, icon: '📋', label: k, color: '#6b7066' });
    }
  });

  // Status-Box oben (wenn was läuft oder beantragt)
  let statusBoxHtml = '';
  if (openCount > 0 || activeCount > 0) {
    const parts = [];
    if (activeCount > 0) parts.push(`<span class="abw-stat-pill active">📍 ${activeCount} laufend</span>`);
    if (openCount > 0) parts.push(`<span class="abw-stat-pill pending">⏳ ${openCount} wartet auf Antwort</span>`);
    statusBoxHtml = `<div class="abw-stats-row">${parts.join('')}</div>`;
  }

  content.innerHTML = `
    <div class="detail-intro">
      <div class="title">📅 Meine Abwesenheiten</div>
      <div class="desc">Alle deine Anträge, Krankmeldungen und Schul-Tage im Überblick.</div>
    </div>
    ${statusBoxHtml}
    ${cats.map(c => renderAbwesenheitCategory(c, grouped[c.key], todayStr)).join('')}
  `;
}

function renderAbwesenheitCategory(cat, items, todayStr) {
  // Sortieren: aktiv > beantragt > Datum DESC
  items = items.slice().sort((a, b) => {
    const aActive = a.status === 'approved' && a.date_from <= todayStr && a.date_to >= todayStr;
    const bActive = b.status === 'approved' && b.date_from <= todayStr && b.date_to >= todayStr;
    if (aActive !== bActive) return aActive ? -1 : 1;
    if (a.status === 'requested' && b.status !== 'requested') return -1;
    if (b.status === 'requested' && a.status !== 'requested') return 1;
    return b.date_from.localeCompare(a.date_from);
  });

  // Stats für Header
  let openCnt = 0, activeCnt = 0, approvedCnt = 0;
  items.forEach(a => {
    if (a.status === 'requested') openCnt++;
    else if (a.status === 'approved') {
      approvedCnt++;
      if (a.date_from <= todayStr && a.date_to >= todayStr) activeCnt++;
    }
  });

  // Default offen wenn was läuft oder wartet
  const hasOpen = openCnt > 0 || activeCnt > 0;
  const openClass = hasOpen ? 'open' : '';

  // Header-Sub-Text
  const subParts = [];
  if (activeCnt > 0) subParts.push(`${activeCnt} läuft gerade`);
  if (openCnt > 0) subParts.push(`${openCnt} offen`);
  if (subParts.length === 0) subParts.push(`${items.length} Einträge gesamt`);
  const subText = subParts.join(' · ');

  // Status-Badge rechts im Header
  let headerBadge = '';
  if (openCnt > 0) {
    headerBadge = `<span class="abw-cat-badge pending">${openCnt} wartet</span>`;
  } else if (activeCnt > 0) {
    headerBadge = `<span class="abw-cat-badge active">📍 läuft</span>`;
  } else {
    headerBadge = `<span class="abw-cat-count">${items.length}</span>`;
  }

  return `
    <div class="abw-category ${openClass}" data-cat="${cat.key}" style="--cat-color: ${cat.color}">
      <button class="abw-cat-header" onclick="toggleAbwCategory(this)" type="button">
        <div class="abw-cat-toggle">
          <span class="chevron">▶</span>
          <div class="abw-cat-icon">${cat.icon}</div>
          <div class="abw-cat-info">
            <div class="abw-cat-label">${cat.label}</div>
            <div class="abw-cat-sub">${subText}</div>
          </div>
        </div>
        ${headerBadge}
      </button>
      <div class="abw-cat-body">
        ${items.map(a => renderAbwesenheitItem(a, todayStr)).join('')}
      </div>
    </div>
  `;
}

function toggleAbwCategory(btn) {
  btn.closest('.abw-category').classList.toggle('open');
}

function renderAbwesenheitItem(a, todayStr) {
  const typeMap = {
    'vacation':           ['🏖️', 'Urlaub'],
    'sick':               ['🤒', 'Krank'],
    'school_exam':        ['🎓', 'Schule/Prüfung'],
    'overtime_reduction': ['⏱️', 'Überstundenabbau'],
    'paid_leave':         ['💼', 'Sonderurlaub'],
    'unpaid_leave':       ['📋', 'Unbezahlt']
  };
  const [icon, typeLabel] = typeMap[a.absence_type] || ['📋', a.absence_type];
  const statusMap = {
    'approved':  ['approved', 'Genehmigt'],
    'requested': ['pending',  'Wartet'],
    'rejected':  ['rejected', 'Abgelehnt'],
    'cancelled': ['cancelled','Storniert']
  };
  const [statusCls, statusLabel] = statusMap[a.status] || ['', a.status];

  // Daten
  const dFrom = new Date(a.date_from);
  const dTo = new Date(a.date_to);
  const fromStr = dFrom.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit', year:'numeric'});
  const toStr = dTo.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit', year:'numeric'});
  const range = a.date_from === a.date_to ? fromStr : `${fromStr} – ${toStr}`;

  // Dauer in Tagen
  const days = Math.floor((dTo - dFrom) / 86400000) + 1;
  const dauer = days === 1 ? '1 Tag' : `${days} Tage`;

  // Läuft gerade?
  const isActive = a.status === 'approved' && a.date_from <= todayStr && a.date_to >= todayStr;
  // In Zukunft?
  const isFuture = a.date_from > todayStr;

  let timeIndicator = '';
  if (isActive) {
    timeIndicator = `<span class="abw-time-tag active">📍 läuft gerade</span>`;
  } else if (isFuture && a.status === 'approved') {
    const diff = Math.ceil((dFrom - new Date(todayStr)) / 86400000);
    timeIndicator = `<span class="abw-time-tag future">in ${diff} ${diff === 1 ? 'Tag' : 'Tagen'}</span>`;
  } else if (isFuture && a.status === 'requested') {
    timeIndicator = `<span class="abw-time-tag pending">zukünftig</span>`;
  }

  return `
    <div class="abw-item ${statusCls}${isActive ? ' is-active' : ''}">
      <div class="abw-item-main">
        <div class="abw-item-icon">${icon}</div>
        <div class="abw-item-info">
          <div class="abw-item-title">${typeLabel} · <span class="abw-item-dauer">${dauer}</span></div>
          <div class="abw-item-range">${range}</div>
          ${a.comment ? `<div class="abw-item-comment">${escapeHtml(a.comment)}</div>` : ''}
        </div>
      </div>
      <div class="abw-item-side">
        <span class="abw-status-badge ${statusCls}">${statusLabel}</span>
        ${timeIndicator}
      </div>
    </div>
  `;
}

// ===== PUSH =====
async function checkPushStatus() {
  const el = document.getElementById('push-status');
  if (!('Notification' in window) || !('serviceWorker' in navigator) || !('PushManager' in window)) {
    el.textContent = 'Nicht unterstützt'; return;
  }
  if (Notification.permission === 'denied') { el.textContent = 'Blockiert · In Einstellungen aktivieren'; return; }
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if (sub && Notification.permission === 'granted') el.textContent = 'Aktiviert ✓';
    else el.textContent = 'Tippen zum Aktivieren';
  } catch (e) { el.textContent = 'Tippen zum Aktivieren'; }
}

async function togglePushSubscription() {
  if (!('Notification' in window) || !('serviceWorker' in navigator) || !('PushManager' in window)) {
    showToast('Push wird nicht unterstützt', 'error'); return;
  }

  try {
    const reg = await navigator.serviceWorker.ready;
    const existing = await reg.pushManager.getSubscription();

    if (existing && Notification.permission === 'granted') {
      if (!confirm('Benachrichtigungen deaktivieren?')) return;
      await existing.unsubscribe();
      await sb.from('push_subscriptions').delete().eq('endpoint', existing.endpoint);
      showToast('Deaktiviert ✓', 'success');
      checkPushStatus();
      return;
    }

    if (Notification.permission !== 'granted') {
      const result = await Notification.requestPermission();
      if (result !== 'granted') { showToast('Berechtigung verweigert', 'error'); checkPushStatus(); return; }
    }

    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });

    const subJson = sub.toJSON();
    const { error } = await sb.from('push_subscriptions').upsert({
      employee_id: currentSession.employee_id,
      studio_id: currentStudioId,
      endpoint: subJson.endpoint,
      p256dh_key: subJson.keys.p256dh,
      auth_key: subJson.keys.auth,
      user_agent: navigator.userAgent.slice(0, 500),
      device_label: detectDeviceLabel(),
      is_active: true,
      last_used_at: new Date().toISOString(),
      failure_count: 0
    }, { onConflict: 'endpoint' });

    if (error) throw error;
    showToast('Benachrichtigungen aktiviert ✓', 'success');
    checkPushStatus();
  } catch (err) {
    showToast('Fehler: ' + err.message, 'error');
  }
}

function detectDeviceLabel() {
  const ua = navigator.userAgent;
  if (/iPhone/.test(ua)) return 'iPhone';
  if (/iPad/.test(ua)) return 'iPad';
  if (/Android/.test(ua)) return /Mobile/.test(ua) ? 'Android Phone' : 'Android Tablet';
  if (/Mac OS/.test(ua)) return 'Mac';
  if (/Windows/.test(ua)) return 'Windows PC';
  return 'Browser';
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = window.atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

// ===== UTILS =====
function showToast(message, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast show ' + type;
  setTimeout(() => toast.classList.remove('show'), 2800);
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function escapeAttr(str) {
  if (!str) return '';
  return String(str).replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

function formatRelative(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'gerade eben';
  if (diff < 3600) return `vor ${Math.floor(diff/60)} Min`;
  if (diff < 86400) return `vor ${Math.floor(diff/3600)} Std`;
  if (diff < 604800) return `vor ${Math.floor(diff/86400)} Tagen`;
  return d.toLocaleDateString('de-DE');
}

// ===== APP VERSION & UPDATE-SYSTEM =====
const APP_VERSION = '2026-05-12-v3'; // Diese Zahl bei jedem Release anpassen
let _registeredSW = null;
let _waitingSW = null;
let _updateCheckInterval = null;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' });
      _registeredSW = reg;

      // 1) Wenn schon ein Update wartet → Banner zeigen
      if (reg.waiting) {
        _waitingSW = reg.waiting;
        showUpdateBanner();
      }

      // 2) Neuen SW erkennen während er installiert wird
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        if (!newWorker) return;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // Neuer SW ist installiert UND es gibt schon einen aktiven (= Update!)
            _waitingSW = newWorker;
            showUpdateBanner();
          }
        });
      });

      // 3) Wenn der neue SW aktiv wird → Seite reloaden
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });

      // 4) Regelmäßig auf Updates prüfen (alle 60 Sekunden wenn App offen)
      if (_updateCheckInterval) clearInterval(_updateCheckInterval);
      _updateCheckInterval = setInterval(() => {
        if (document.visibilityState === 'visible' && _registeredSW) {
          _registeredSW.update().catch(() => {});
        }
      }, 60000);
    } catch (err) {
      console.log('SW Register Fehler:', err);
    }
  });
}

function showUpdateBanner() {
  if (document.getElementById('update-banner')) return; // schon angezeigt

  const banner = document.createElement('div');
  banner.id = 'update-banner';
  banner.className = 'update-banner';
  banner.innerHTML = `
    <div class="update-banner-content">
      <span class="update-banner-icon">🚀</span>
      <div class="update-banner-text">
        <div class="update-banner-title">Neue Version verfügbar</div>
        <div class="update-banner-sub">Tippe zum Aktualisieren</div>
      </div>
      <button class="update-banner-btn" onclick="applyAppUpdate()">Aktualisieren</button>
      <button class="update-banner-dismiss" onclick="dismissUpdateBanner()" title="Später">✕</button>
    </div>
  `;
  document.body.appendChild(banner);
  setTimeout(() => banner.classList.add('show'), 50);
}

function dismissUpdateBanner() {
  const b = document.getElementById('update-banner');
  if (b) { b.classList.remove('show'); setTimeout(() => b.remove(), 300); }
}

async function applyAppUpdate() {
  // Service Worker mitteilen: "Du darfst aktivieren"
  if (_waitingSW) {
    _waitingSW.postMessage({ type: 'SKIP_WAITING' });
    // controllerchange triggert dann automatisch Reload
  } else {
    // Fallback: Hard-Reload mit Cache-Bypass
    hardReloadApp();
  }
}

async function hardReloadApp() {
  // Alle Caches leeren + Reload
  if ('caches' in window) {
    try {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    } catch (e) {}
  }
  // Unregister SW damit beim nächsten Mal sauber neu registriert wird
  if ('serviceWorker' in navigator) {
    try {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    } catch (e) {}
  }
  // Reload mit Cache-Bypass
  window.location.reload();
}
