async function loadTodayPT() {
  const today = new Date();
  const start = new Date(today); start.setHours(0,0,0,0);
  const end = new Date(today); end.setHours(23,59,59,999);

  const { data, error } = await sb
    .from('pt_session_overview_v')
    .select('id, contact_name, scheduled_at, status_code, status_label, phone, trainer_name')
    .eq('studio_id', currentStudioId)
    .gte('scheduled_at', start.toISOString())
    .lte('scheduled_at', end.toISOString())
    .order('scheduled_at', { ascending: true });

  const listEl = document.getElementById('today-pt-list');
  const countEl = document.getElementById('today-pt-count');

  if (error) { listEl.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><div>Fehler</div></div>`; countEl.textContent = '0'; return; }
  countEl.textContent = data?.length || 0;
  if (!data || data.length === 0) { listEl.innerHTML = '<div class="empty-state"><div class="icon">✨</div><div>Keine PT-Termine heute</div></div>'; return; }

  const now = new Date();
  listEl.innerHTML = data.map(pt => {
    const time = new Date(pt.scheduled_at);
    const timeStr = time.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    const minutesUntil = Math.floor((time - now) / 60000);
    let cls = 'task-item', timeCls = '', timeLabel = timeStr;
    if (minutesUntil < 0) { cls += ' info'; timeLabel = 'vorbei'; }
    else if (minutesUntil <= 30) { cls += ' urgent'; timeCls = 'urgent'; timeLabel = minutesUntil <= 0 ? 'JETZT' : `in ${minutesUntil}min`; }
    else if (minutesUntil <= 120) { cls += ' warning'; timeCls = 'warning'; }
    const trainerTag = pt.trainer_name ? `<span class="trainer-tag">${escapeHtml(pt.trainer_name.split(' ')[0])}</span>` : '';
    return `<div class="${cls}" onclick="location.href='pt_lead_detail.html?id=${pt.id}'"><div class="task-icon">💪</div><div class="task-content"><div class="title">${escapeHtml(pt.contact_name || 'Unbekannt')}${trainerTag}</div><div class="desc">${timeStr} Uhr${pt.status_label ? ' · ' + escapeHtml(pt.status_label) : ''}</div></div><div class="task-time ${timeCls}">${timeLabel}</div></div>`;
  }).join('');
}

async function loadTodayFollowups() {
  const now = new Date();
  const startToday = new Date(now); startToday.setHours(0,0,0,0);
  const endToday = new Date(now); endToday.setHours(23,59,59,999);

  // ALLE offenen Follow-Ups des Tages (inkl. überfällig) im aktuellen Studio – direkt aus pt_followups
  const { data: rawFollowups, error } = await sb
    .from('pt_followups')
    .select(`
      id, lead_id, due_at, status_key, note,
      pt_leads!inner ( first_name, last_name, is_active, status_key )
    `)
    .eq('studio_id', currentStudioId)
    .eq('status_key', 'open')
    .lte('due_at', endToday.toISOString())
    .eq('pt_leads.is_active', true)
    .not('pt_leads.status_key', 'in', '("lost","abschluss")')
    .order('due_at', { ascending: true })
    .limit(50);

  const listEl = document.getElementById('today-followup-list');
  const countEl = document.getElementById('today-followup-count');

  if (error) { listEl.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><div>${escapeHtml(error.message)}</div></div>`; countEl.textContent = '0'; return; }

  // Trainer-Info optional (neueste Session pro Lead) für die Anzeige
  const leadIds = [...new Set((rawFollowups || []).map(f => f.lead_id))];
  const trainerByLead = new Map();
  if (leadIds.length > 0) {
    const { data: sessions } = await sb
      .from('pt_sessions')
      .select('lead_id, scheduled_at, trainer:employees(first_name, last_name, display_name)')
      .in('lead_id', leadIds)
      .order('scheduled_at', { ascending: false });
    for (const s of sessions || []) {
      if (!trainerByLead.has(s.lead_id) && s.trainer) {
        const t = s.trainer;
        trainerByLead.set(s.lead_id, (t.display_name?.trim() || `${t.first_name||''} ${t.last_name||''}`.trim()) || null);
      }
    }
  }

  const data = (rawFollowups || []).map(f => ({
    id: f.lead_id, // Click-Target: Lead-Detail-Seite (war vorher Session-ID, aber Detail-Seite erwartet lead_id)
    lead_id: f.lead_id,
    contact_name: `${f.pt_leads?.first_name || ''} ${f.pt_leads?.last_name || ''}`.trim() || 'Unbekannt',
    next_followup_at: f.due_at,
    next_followup_status: f.status_key,
    next_followup_note: f.note,
    trainer_name: trainerByLead.get(f.lead_id) || null
  }));

  countEl.textContent = data.length || 0;
  if (data.length === 0) { listEl.innerHTML = '<div class="empty-state"><div class="icon">✅</div><div>Alle Follow-Ups erledigt!</div></div>'; return; }

  listEl.innerHTML = data.map(f => {
    const due = new Date(f.next_followup_at);
    const isOverdue = due < now;
    const isUrgent = due < now;
    const cls = 'task-item' + (isUrgent ? ' urgent' : (due < endToday ? ' warning' : ''));
    const timeCls = isUrgent ? 'urgent' : 'warning';
    let timeLabel;
    if (isOverdue) {
      const mins = Math.floor((now - due) / 60000);
      timeLabel = mins < 60 ? `${mins}m` : mins < 1440 ? `${Math.floor(mins/60)}h` : `${Math.floor(mins/1440)}d`;
    } else {
      timeLabel = due.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
    }
    const icon = getStatusIcon(f.next_followup_status);
    const trainerTag = f.trainer_name ? `<span class="trainer-tag">${escapeHtml(f.trainer_name.split(' ')[0])}</span>` : '';
    const note = f.next_followup_note ? ` · ${escapeHtml(f.next_followup_note.slice(0, 50))}` : '';
    return `<div class="${cls}" onclick="location.href='pt_lead_detail.html?id=${f.id}'"><div class="task-icon">${icon}</div><div class="task-content"><div class="title">${escapeHtml(f.contact_name || 'Unbekannt')}${trainerTag}</div><div class="desc">${escapeHtml((f.next_followup_status||'').replace(/_/g,' '))}${note}</div></div><div class="task-time ${timeCls}">${timeLabel}</div></div>`;
  }).join('');
}

function getStatusIcon(status) {
  if (!status) return '📋';
  const s = status.toLowerCase();
  if (s.includes('anruf')) return '📞';
  if (s.includes('wa') || s.includes('whats')) return '💬';
  if (s.includes('termin')) return '📅';
  if (s.includes('mail')) return '✉️';
  return '📋';
}

// ===== AUFGABEN =====
async function refreshAufgabenBadge() {
  // Anzahl überfälliger offener Follow-Ups direkt aus pt_followups holen.
  // Filter: Lead ist aktiv und nicht lost/abschluss (sonst wären erledigte/verlorene Leads dabei).
  const now = new Date();
  const { data, error } = await sb
    .from('pt_followups')
    .select('id, lead_id, pt_leads!inner(is_active, status_key)')
    .eq('studio_id', currentStudioId)
    .eq('status_key', 'open')
    .lte('due_at', now.toISOString())
    .eq('pt_leads.is_active', true)
    .not('pt_leads.status_key', 'in', '("lost","abschluss")');

  const badge = document.getElementById('tasks-badge');
  const count = !error && data ? data.length : 0;
  if (count > 0) { badge.textContent = count > 99 ? '99+' : count; badge.style.display = ''; }
  else { badge.style.display = 'none'; }
}

async function loadAufgabenView() {
  const contentEl = document.getElementById('aufgaben-content');
  contentEl.innerHTML = '<div class="loading-row"><span class="spinner dark"></span> Lade Aufgaben…</div>';

  const now = new Date();
  const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate() + 1); tomorrow.setHours(23,59,59,999);

  // Direkter Read aus pt_followups + JOIN auf pt_leads (und optional pt_sessions).
  // Filter: nur offene Follow-Ups, due bis morgen, Lead aktiv und nicht lost/abschluss.
  const { data: rawFollowups, error } = await sb
    .from('pt_followups')
    .select(`
      id,
      lead_id,
      session_id,
      due_at,
      status_key,
      note,
      pt_leads!inner (
        id, first_name, last_name, phone, email, is_active, status_key,
        source:lookup_items!pt_leads_source_id_fkey ( label ),
        goal:lookup_items!pt_leads_goal_id_fkey ( label )
      )
    `)
    .eq('studio_id', currentStudioId)
    .eq('status_key', 'open')
    .lte('due_at', tomorrow.toISOString())
    .eq('pt_leads.is_active', true)
    .not('pt_leads.status_key', 'in', '("lost","abschluss")')
    .order('due_at', { ascending: true });

  if (error) {
    contentEl.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><div>${escapeHtml(error.message)}</div></div>`;
    return;
  }

  // Optionale Session-Details (PT-Termin, Trainer, Lead-Status-Label) per Batch nachladen.
  const leadIds = [...new Set((rawFollowups || []).map(f => f.lead_id))];
  let sessionMap = new Map();
  if (leadIds.length > 0) {
    const { data: sessions } = await sb
      .from('pt_sessions')
      .select(`
        id, lead_id, scheduled_at,
        trainer:employees ( first_name, last_name, display_name ),
        status:lookup_items!pt_sessions_status_id_fkey ( code, label )
      `)
      .in('lead_id', leadIds)
      .order('scheduled_at', { ascending: false });

    // Jeweils nur die jüngste Session pro Lead behalten (für Anzeige Trainer / PT-Termin).
    for (const s of sessions || []) {
      if (!sessionMap.has(s.lead_id)) sessionMap.set(s.lead_id, s);
    }
  }

  // Activity-Counts per Batch
  let activityMap = new Map();
  if (leadIds.length > 0) {
    const { data: acts } = await sb
      .from('pt_activities')
      .select('lead_id')
      .in('lead_id', leadIds);
    for (const a of acts || []) activityMap.set(a.lead_id, (activityMap.get(a.lead_id) || 0) + 1);
  }

  // Mapping auf das bestehende Render-Modell (gleiche Feldnamen wie früher aus pt_session_overview_v)
  const followups = (rawFollowups || []).map(f => {
    const l = f.pt_leads || {};
    const s = sessionMap.get(f.lead_id);
    const trainer = s?.trainer;
    const trainerName = trainer
      ? (trainer.display_name?.trim() || `${trainer.first_name || ''} ${trainer.last_name || ''}`.trim())
      : null;
    return {
      // IDs
      followup_id: f.id,
      id: s?.id || null,                    // pt_session_id (falls vorhanden) – für getFollowupIdBySession-Fallback
      lead_id: f.lead_id,
      // Kontaktdaten
      contact_name: `${l.first_name || ''} ${l.last_name || ''}`.trim() || 'Unbekannt',
      first_name: l.first_name,
      last_name: l.last_name,
      phone: l.phone,
      email: l.email,
      // Followup
      next_followup_at: f.due_at,
      next_followup_status: f.status_key,
      next_followup_note: f.note,
      // Session-Info (optional)
      scheduled_at: s?.scheduled_at || null,
      trainer_name: trainerName,
      status_code: s?.status?.code || null,
      status_label: s?.status?.label || null,
      // Lookup-Labels
      source_label: l.source?.label || null,
      goal_label: l.goal?.label || null,
      // Stats
      activity_count: activityMap.get(f.lead_id) || 0
    };
  });

  // Hero & Stats
  const overdue = [], todayList = [], tomorrowList = [];
  const todayEnd = new Date(now); todayEnd.setHours(23,59,59,999);

  for (const f of followups) {
    const due = new Date(f.next_followup_at);
    if (due < now) overdue.push(f);
    else if (due <= todayEnd) todayList.push(f);
    else tomorrowList.push(f);
  }

  const total = followups.length;

  // Story-Text
  let storyText = '';
  if (total === 0) {
    storyText = 'Alle Follow-Ups sind erledigt. Mega Arbeit!';
  } else if (overdue.length > 0) {
    storyText = `<strong>${overdue.length}</strong> ${overdue.length === 1 ? 'Follow-Up wartet überfällig' : 'Follow-Ups warten überfällig'} auf dich.`;
  } else if (todayList.length > 0) {
    storyText = `<strong>${todayList.length}</strong> ${todayList.length === 1 ? 'Follow-Up heute' : 'Follow-Ups heute'} · alles im grünen Bereich.`;
  } else {
    storyText = `${tomorrowList.length} ${tomorrowList.length === 1 ? 'Follow-Up' : 'Follow-Ups'} morgen.`;
  }

  let html = `
    <div class="aufgaben-hero ${overdue.length > 0 ? 'urgent' : todayList.length > 0 ? 'warning' : 'ok'}">
      <div class="aufgaben-hero-bg"></div>
      <div class="aufgaben-hero-content">
        <div class="aufgaben-hero-icon">${total === 0 ? '✅' : overdue.length > 0 ? '🔥' : '🎯'}</div>
        <div class="aufgaben-hero-text">
          <div class="aufgaben-hero-label">FOLLOW-UPS</div>
          <div class="aufgaben-hero-value">${total}<span class="unit">${total === 1 ? 'Aufgabe' : 'Aufgaben'}</span></div>
          <div class="aufgaben-hero-explain">${storyText}</div>
        </div>
      </div>
    </div>

    <div class="aufgaben-stats-row">
      ${overdue.length > 0 ? `<div class="aufgaben-stat-card urgent" onclick="document.getElementById('overdue-section')?.scrollIntoView({behavior:'smooth'})">
        <div class="num">${overdue.length}</div>
        <div class="lbl">Überfällig</div>
      </div>` : ''}
      <div class="aufgaben-stat-card today">
        <div class="num">${todayList.length}</div>
        <div class="lbl">Heute</div>
      </div>
      <div class="aufgaben-stat-card future">
        <div class="num">${tomorrowList.length}</div>
        <div class="lbl">Morgen</div>
      </div>
    </div>
  `;

  if (total === 0) {
    html += `
      <div class="aufgaben-empty">
        <div class="icon">🎉</div>
        <div class="title">Alles erledigt!</div>
        <div class="sub">Keine offenen Follow-Ups · genieß die Pause</div>
      </div>
    `;
  } else {
    if (overdue.length > 0) {
      html += `<div id="overdue-section" class="aufgaben-section-title urgent">
        <span class="icon">🔥</span>
        <span>Überfällig</span>
        <span class="count urgent">${overdue.length}</span>
      </div>`;
      html += overdue.map(f => renderFollowupCard(f, 'urgent')).join('');
    }
    if (todayList.length > 0) {
      html += `<div class="aufgaben-section-title warning">
        <span class="icon">⏰</span>
        <span>Heute</span>
        <span class="count warning">${todayList.length}</span>
      </div>`;
      html += todayList.map(f => renderFollowupCard(f, 'warning')).join('');
    }
    if (tomorrowList.length > 0) {
      html += `<div class="aufgaben-section-title">
        <span class="icon">📅</span>
        <span>Morgen</span>
        <span class="count">${tomorrowList.length}</span>
      </div>`;
      html += tomorrowList.map(f => renderFollowupCard(f, '')).join('');
    }
  }

  contentEl.innerHTML = html;
}

function renderFollowupCard(f, severity) {
  const due = new Date(f.next_followup_at);
  const now = new Date();
  const dueStr = due.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

  // Zeitlabel
  let timeLabel;
  if (due < now) {
    const overdueMins = Math.floor((now - due) / 60000);
    if (overdueMins < 60) timeLabel = `${overdueMins} min<br><span class="suffix">überfällig</span>`;
    else if (overdueMins < 1440) timeLabel = `${Math.floor(overdueMins/60)} h<br><span class="suffix">überfällig</span>`;
    else timeLabel = `${Math.floor(overdueMins/1440)} d<br><span class="suffix">überfällig</span>`;
  } else {
    timeLabel = `${dueStr}<br><span class="suffix">Uhr</span>`;
  }

  // Status-Icon (was wurde bisher gemacht)
  const statusIcon = getStatusIcon(f.next_followup_status);

  // Activity-Anzahl
  const activityBadge = f.activity_count > 0
    ? `<span class="aufgaben-act-badge">${f.activity_count}× Kontakt</span>`
    : '<span class="aufgaben-act-badge new">Neu</span>';

  // PT-Termin Info
  let ptInfo = '';
  if (f.scheduled_at) {
    const ptDate = new Date(f.scheduled_at);
    const ptStr = ptDate.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit' });
    const ptTime = ptDate.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
    ptInfo = `<span class="aufgaben-pt">📅 PT ${ptStr} ${ptTime}</span>`;
  }

  // Trainer
  const trainerTag = f.trainer_name
    ? `<span class="aufgaben-trainer">👤 ${escapeHtml(f.trainer_name.split(' ')[0])}</span>`
    : '';

  // Notiz
  const note = f.next_followup_note
    ? `<div class="aufgaben-note">💬 ${escapeHtml(f.next_followup_note)}</div>`
    : '';

  return `
    <div class="aufgaben-card ${severity}" onclick='openFollowupDetail(${JSON.stringify(f).replace(/'/g, "&#39;")})'>
      <div class="aufgaben-card-time ${severity}">${timeLabel}</div>
      <div class="aufgaben-card-body">
        <div class="aufgaben-card-name">${statusIcon} ${escapeHtml(f.contact_name || 'Unbekannt')}</div>
        <div class="aufgaben-card-meta">
          ${activityBadge}
          ${ptInfo}
          ${trainerTag}
        </div>
        ${note}
      </div>
      <div class="aufgaben-card-arrow">›</div>
    </div>
  `;
}

// ===== FOLLOWUP-DETAIL MODAL =====
let currentFollowup = null;

async function openFollowupDetail(f) {
  currentFollowup = f;

  // Letzte Activities holen für Kontakt-Historie
  const { data: activities } = await sb
    .from('pt_activities')
    .select('id, activity_type, activity_text, created_at')
    .eq('lead_id', f.lead_id)
    .order('created_at', { ascending: false })
    .limit(10);

  // Modal aufbauen
  let modal = document.getElementById('followup-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'followup-modal';
    modal.className = 'fu-modal';
    document.body.appendChild(modal);
  }

  const due = new Date(f.next_followup_at);
  const dueStr = due.toLocaleString('de-DE', { weekday: 'long', day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
  const isOverdue = due < new Date();

  const phone = f.phone ? f.phone.replace(/\s/g, '') : '';
  const phoneNice = f.phone || '–';

  modal.innerHTML = `
    <div class="fu-modal-backdrop" onclick="closeFollowupDetail()"></div>
    <div class="fu-modal-card">
      <div class="fu-modal-header">
        <div class="fu-modal-name">${escapeHtml(f.contact_name || 'Unbekannt')}</div>
        <button type="button" class="fu-modal-close" onclick="closeFollowupDetail()" aria-label="Schließen">✕</button>
      </div>

      <div class="fu-modal-body">
        <!-- Due Info -->
        <div class="fu-due ${isOverdue ? 'overdue' : ''}">
          <span class="fu-due-icon">${isOverdue ? '🔥' : '⏰'}</span>
          <div>
            <div class="fu-due-label">${isOverdue ? 'Überfällig seit' : 'Fällig'}</div>
            <div class="fu-due-time">${dueStr}</div>
          </div>
        </div>

        <!-- Quick Actions: Anrufen / WhatsApp -->
        ${phone ? `
          <div class="fu-quick-actions">
            <a href="tel:${phone}" class="fu-action call">
              <span class="icon">📞</span>
              <span class="text">Anrufen</span>
              <span class="sub">${escapeHtml(phoneNice)}</span>
            </a>
            <a href="https://wa.me/${phone.replace(/[^0-9]/g, '')}" target="_blank" class="fu-action wa">
              <span class="icon">💬</span>
              <span class="text">WhatsApp</span>
              <span class="sub">Direkt schreiben</span>
            </a>
          </div>
        ` : '<div class="fu-no-phone">⚠️ Keine Telefonnummer hinterlegt</div>'}

        <!-- Lead Info -->
        <div class="fu-section">
          <div class="fu-section-title">📋 Lead-Info</div>
          <div class="fu-info-grid">
            ${f.status_label ? `<div class="fu-info-row"><span class="key">Status</span><span class="val">${escapeHtml(f.status_label)}</span></div>` : ''}
            ${f.scheduled_at ? `<div class="fu-info-row"><span class="key">PT-Termin</span><span class="val">${new Date(f.scheduled_at).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}</span></div>` : ''}
            ${f.trainer_name ? `<div class="fu-info-row"><span class="key">Trainer</span><span class="val">${escapeHtml(f.trainer_name)}</span></div>` : ''}
            ${f.source_label ? `<div class="fu-info-row"><span class="key">Quelle</span><span class="val">${escapeHtml(f.source_label)}</span></div>` : ''}
            ${f.goal_label ? `<div class="fu-info-row"><span class="key">Ziel</span><span class="val">${escapeHtml(f.goal_label)}</span></div>` : ''}
            ${f.email ? `<div class="fu-info-row"><span class="key">E-Mail</span><span class="val">${escapeHtml(f.email)}</span></div>` : ''}
          </div>
        </div>

        ${f.next_followup_note ? `
          <div class="fu-section">
            <div class="fu-section-title">💬 Letzte Notiz</div>
            <div class="fu-note-box">${escapeHtml(f.next_followup_note)}</div>
          </div>
        ` : ''}

        <!-- Aktionen -->
        <div class="fu-section">
          <div class="fu-section-title">✏️ Was ist passiert?</div>
          <div class="fu-action-grid">
            <button class="fu-action-btn success" onclick="markFollowupContact('anruf_erreicht')">
              <span class="icon">📞✅</span>
              <span>Erreicht</span>
            </button>
            <button class="fu-action-btn warning" onclick="markFollowupContact('anruf_nicht_erreicht')">
              <span class="icon">📞❌</span>
              <span>Nicht erreicht</span>
            </button>
            <button class="fu-action-btn info" onclick="markFollowupContact('whatsapp')">
              <span class="icon">💬</span>
              <span>WhatsApp gesendet</span>
            </button>
            <button class="fu-action-btn neutral" onclick="markFollowupContact('mail')">
              <span class="icon">📧</span>
              <span>E-Mail gesendet</span>
            </button>
          </div>
        </div>

        <!-- Activity History -->
        ${activities && activities.length > 0 ? `
          <div class="fu-section">
            <div class="fu-section-title">📜 Kontakt-Historie</div>
            <div class="fu-history">
              ${activities.map(a => renderActivityRow(a)).join('')}
            </div>
          </div>
        ` : ''}

        <!-- Folgetermin verschieben -->
        <div class="fu-section">
          <div class="fu-section-title">📅 Nächsten Kontakt verschieben</div>
          <div class="fu-reschedule-grid">
            <button class="fu-resched-btn" onclick="rescheduleFollowup(1)">+1 Tag</button>
            <button class="fu-resched-btn" onclick="rescheduleFollowup(2)">+2 Tage</button>
            <button class="fu-resched-btn" onclick="rescheduleFollowup(3)">+3 Tage</button>
            <button class="fu-resched-btn" onclick="rescheduleFollowup(7)">+1 Woche</button>
          </div>
        </div>

        <!-- Abschließen -->
        <div class="fu-section">
          <button class="fu-close-btn" onclick="closeFollowup()">
            ✅ Follow-Up abschließen (kein weiterer Kontakt nötig)
          </button>
        </div>
      </div>
    </div>
  `;

  setTimeout(() => modal.classList.add('open'), 10);
}

function closeFollowupDetail(e) {
  // iOS Safari Touch-Event-Fix: stoppe Event-Propagation
  if (e && e.preventDefault) { e.preventDefault(); e.stopPropagation(); }
  const modal = document.getElementById('followup-modal');
  if (modal) {
    modal.classList.remove('open');
    setTimeout(() => { if (modal.parentNode) modal.parentNode.removeChild(modal); }, 300);
  }
  currentFollowup = null;
}

function renderActivityRow(a) {
  const typeMap = {
    'call':     ['📞',  'Anruf'],
    'whatsapp': ['💬',  'WhatsApp'],
    'note':     ['📝',  'Notiz'],
    'system':   ['⚙️',  'System'],
    'mail':     ['📧',  'E-Mail'],
    'sms':      ['📱',  'SMS'],
    'walkin':   ['🚶',  'Walk-in']
  };
  const [icon, label] = typeMap[a.activity_type] || ['📋', a.activity_type];
  const whenStr = formatRelative(a.created_at);
  return `
    <div class="fu-history-row">
      <div class="fu-h-icon">${icon}</div>
      <div class="fu-h-content">
        <div class="fu-h-label">${label}</div>
        ${a.activity_text ? `<div class="fu-h-note">${escapeHtml(a.activity_text)}</div>` : ''}
        <div class="fu-h-time">${whenStr}</div>
      </div>
    </div>
  `;
}

async function markFollowupContact(kind) {
  if (!currentFollowup) return;
  const note = prompt('Notiz (optional):') || '';

  // kind → activity_type mapping
  const typeMap = {
    'anruf_erreicht':      'call',
    'anruf_nicht_erreicht':'call',
    'whatsapp':            'whatsapp',
    'mail':                'note',
    'note':                'note'
  };
  const activity_type = typeMap[kind] || 'note';

  // Activity-Text-Prefix
  const textPrefix = {
    'anruf_erreicht':      '✅ Erreicht',
    'anruf_nicht_erreicht':'❌ Nicht erreicht',
    'whatsapp':            '💬 WhatsApp gesendet',
    'mail':                '📧 E-Mail gesendet'
  };
  const activity_text = (textPrefix[kind] || kind) + (note ? ' — ' + note : '');

  const { error } = await sb.from('pt_activities').insert({
    lead_id: currentFollowup.lead_id,
    session_id: currentFollowup.id,
    studio_id: currentStudioId,
    activity_type,
    activity_text,
    created_by: currentSession.employee_id
  });

  if (error) return showToast('Fehler: ' + error.message, 'error');

  // Wenn "erreicht" → Followup als done markieren
  if (kind === 'anruf_erreicht') {
    const fuId = currentFollowup.followup_id || await getFollowupIdBySession(currentFollowup.id);
    if (fuId) {
      await sb.from('pt_followups')
        .update({ status_key: 'done', done_at: new Date().toISOString(), done_by: currentSession.employee_id })
        .eq('id', fuId);
    }
    showToast('Erreicht ✓ Follow-Up abgeschlossen', 'success');
  } else {
    showToast('Aktivität gespeichert ✓', 'success');
  }

  closeFollowupDetail();
  loadAufgabenView();
  refreshAufgabenBadge();
}

async function getFollowupIdBySession(sessionId) {
  const { data } = await sb.from('pt_followups')
    .select('id')
    .eq('session_id', sessionId)
    .eq('status_key', 'open')
    .maybeSingle();
  return data?.id;
}

async function rescheduleFollowup(days) {
  if (!currentFollowup) return;
  const newDate = new Date();
  newDate.setDate(newDate.getDate() + days);
  newDate.setHours(10, 0, 0, 0);

  // Followup-ID direkt aus dem Datenobjekt, Fallback auf Session-Lookup
  const fuId = currentFollowup.followup_id || await getFollowupIdBySession(currentFollowup.id);
  if (!fuId) return showToast('Follow-Up nicht gefunden', 'error');

  const { error } = await sb.from('pt_followups')
    .update({ due_at: newDate.toISOString() })
    .eq('id', fuId);

  if (error) return showToast('Fehler: ' + error.message, 'error');
  showToast(`Verschoben auf ${newDate.toLocaleDateString('de-DE')} ✓`, 'success');
  closeFollowupDetail();
  loadAufgabenView();
  refreshAufgabenBadge();
}

async function closeFollowup() {
  if (!currentFollowup) return;
  if (!confirm('Follow-Up abschließen? Es wird kein weiterer Kontakt geplant.')) return;

  const fuId = currentFollowup.followup_id || await getFollowupIdBySession(currentFollowup.id);
  if (!fuId) return showToast('Follow-Up nicht gefunden', 'error');

  const { error } = await sb.from('pt_followups')
    .update({ status_key: 'done', done_at: new Date().toISOString(), done_by: currentSession.employee_id })
    .eq('id', fuId);

  if (error) return showToast('Fehler: ' + error.message, 'error');
  showToast('Follow-Up abgeschlossen ✓', 'success');
  closeFollowupDetail();
  loadAufgabenView();
  refreshAufgabenBadge();
}

// ===== SCHICHTEN =====
function getWeekRange(offset = 0) {
  const now = new Date();
  const day = now.getDay() || 7;
  const monday = new Date(now);
  monday.setDate(now.getDate() - day + 1 + offset * 7);
  monday.setHours(0, 0, 0, 0);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
  return { from: monday, to: sunday };
}

function getISOWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

async function loadSchichtenView() {
  const { from, to } = getWeekRange(weekOffset);
  const fromStr = from.toISOString().slice(0, 10);
  const toStr = to.toISOString().slice(0, 10);
  const todayStr = new Date().toISOString().slice(0, 10);

  const label = weekOffset === 0 ? 'Diese Woche'
    : weekOffset === 1 ? 'Nächste Woche'
    : weekOffset === -1 ? 'Letzte Woche'
    : `KW ${getISOWeek(from)} · ${from.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})} – ${to.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})}`;
  document.getElementById('week-label').textContent = label;

  const listEl = document.getElementById('shifts-list');
  listEl.innerHTML = '<div class="loading-row"><span class="spinner dark"></span> Lade Schichten…</div>';

  const { data, error } = await sb
    .from('v_shift_assignments_detailed')
    .select('shift_assignment_id, shift_date, shift_name, shift_code, effective_start_time, effective_end_time, studio_id, studio_name, studio_code, status, conflicting_absence_status, conflicting_absence_type')
    .eq('employee_id', currentSession.employee_id)
    .gte('shift_date', fromStr)
    .lte('shift_date', toStr)
    .order('shift_date', { ascending: true });

  if (error) { listEl.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><div>${escapeHtml(error.message)}</div></div>`; return; }
  if (!data || data.length === 0) { listEl.innerHTML = '<div class="empty-state"><div class="icon">📅</div><div>Keine Schichten diese Woche</div></div>'; return; }

  const days = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  listEl.innerHTML = data.map(s => {
    const date = new Date(s.shift_date + 'T00:00:00');
    const isToday = s.shift_date === todayStr;
    const isPast = s.shift_date < todayStr;
    const isAbsent = s.conflicting_absence_status === 'approved';
    const showStudio = availableStudios.length > 1;
    const studioLabel = showStudio ? `<span class="studio-tag">${s.studio_code}</span>` : '';
    const cls = ['shift-item'];
    if (isToday) cls.push('today');
    if (isPast && !isToday) cls.push('past');
    if (isAbsent) cls.push('absent');
    let badge = '';
    if (isAbsent) badge = `<span class="shift-badge absent">${s.conflicting_absence_type || 'Abwesend'}</span>`;
    else if (isToday) badge = '<span class="shift-badge today">Heute</span>';
    return `<div class="${cls.join(' ')}"><div class="shift-date"><div class="day">${days[date.getDay()]}</div><div class="num">${date.getDate()}</div></div><div class="shift-info"><div class="time">${s.effective_start_time?.slice(0,5) || '--'}–${s.effective_end_time?.slice(0,5) || '--'}</div><div class="type">${s.shift_name || '—'}${studioLabel}</div></div>${badge}</div>`;
  }).join('');
}

function changeWeek(delta) { weekOffset += delta; loadSchichtenView(); }

async function loadActiveAufgabenForMe() {
  // Aufgaben holen die für diesen Mitarbeiter relevant sind
  const todayStr = new Date().toISOString().slice(0, 10);

  const { data: tasks } = await sb.from('mitarbeiter_aufgaben')
    .select('*')
    .eq('studio_id', currentStudioId)
    .eq('erledigt', false)
    .or(`zugewiesen_an.is.null,zugewiesen_an.eq.${currentSession.employee_id}`)
    .or(`aktiv_von.is.null,aktiv_von.lte.${todayStr}`)
    .order('prioritaet', { ascending: false })
    .order('faellig_am', { ascending: true, nullsFirst: false })
    .order('created_at', { ascending: false });

  if (!tasks) return [];

  // Aktuelle Berlin-Zeit als HH:MM:SS Vergleichswert
  const now = new Date();
  const berlinTimeStr = now.toLocaleTimeString('de-DE', {
    timeZone: 'Europe/Berlin',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false
  });

  // Filter:
  // - aktiv_bis muss in der Zukunft sein (Datum)
  // - aktiv_zeit_von/bis muss aktuell sein (Tageszeit, falls gesetzt)
  const filtered = tasks.filter(t => {
    if (t.aktiv_bis && t.aktiv_bis < todayStr) return false;
    if (t.aktiv_zeit_von && berlinTimeStr < t.aktiv_zeit_von) return false;
    if (t.aktiv_zeit_bis && berlinTimeStr > t.aktiv_zeit_bis) return false;
    return true;
  });

  // Snooze-Status für jede Aufgabe holen
  const ids = filtered.map(t => t.id);
  if (ids.length === 0) return [];

  const { data: snoozes } = await sb.from('mitarbeiter_aufgaben_snooze')
    .select('aufgabe_id, snooze_bis')
    .eq('employee_id', currentSession.employee_id)
    .in('aufgabe_id', ids);

  const snoozeMap = {};
  (snoozes || []).forEach(s => {
    if (new Date(s.snooze_bis) > now) {
      snoozeMap[s.aufgabe_id] = s.snooze_bis;
    }
  });

  // Aufgaben markieren ob snoozed
  return filtered.map(t => ({
    ...t,
    is_snoozed: !!snoozeMap[t.id],
    snooze_bis: snoozeMap[t.id] || null
  }));
}

// Hilfsfunktion: Aufgabe ist zwar aktiv aber gerade außerhalb der Tageszeit
async function loadOffTimeAufgabenForInfo() {
  const todayStr = new Date().toISOString().slice(0, 10);

  const { data: tasks } = await sb.from('mitarbeiter_aufgaben')
    .select('id, titel, beschreibung, prioritaet, aktiv_zeit_von, aktiv_zeit_bis, aktiv_bis, intervall_minuten, zugewiesen_an')
    .eq('studio_id', currentStudioId)
    .eq('erledigt', false)
    .or(`zugewiesen_an.is.null,zugewiesen_an.eq.${currentSession.employee_id}`)
    .or(`aktiv_von.is.null,aktiv_von.lte.${todayStr}`)
    .not('aktiv_zeit_von', 'is', null);

  if (!tasks) return [];

  const now = new Date();
  const berlinTimeStr = now.toLocaleTimeString('de-DE', {
    timeZone: 'Europe/Berlin',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });

  return tasks.filter(t => {
    if (t.aktiv_bis && t.aktiv_bis < todayStr) return false;
    const outsideTime = (t.aktiv_zeit_von && berlinTimeStr < t.aktiv_zeit_von) ||
                        (t.aktiv_zeit_bis && berlinTimeStr > t.aktiv_zeit_bis);
    return outsideTime;
  });
}

async function refreshTeamAufgabenBadge() {
  try {
    const tasks = await loadActiveAufgabenForMe();
    const active = tasks.filter(t => !t.is_snoozed);
    const badge = document.getElementById('aufgaben-menu-badge');
    const sub = document.getElementById('aufgaben-menu-sub');

    if (badge) {
      if (active.length > 0) {
        badge.textContent = active.length > 99 ? '99+' : active.length;
        badge.style.display = '';
      } else {
        badge.style.display = 'none';
      }
    }
    if (sub) {
      const total = tasks.length;
      if (total === 0) sub.textContent = 'Keine offenen Aufgaben';
      else if (active.length === 0) sub.textContent = `${total} ${total === 1 ? 'Aufgabe' : 'Aufgaben'} · geschnoozt`;
      else sub.textContent = `${active.length} aktiv${total > active.length ? ` · ${total - active.length} geschnoozt` : ''}`;
    }
    if (typeof syncMehrSectionBadges === 'function') syncMehrSectionBadges();
  } catch (e) {
    console.warn('Aufgaben-Badge fehlgeschlagen:', e);
  }
}

async function checkAndShowAufgabenPopup() {
  try {
    const tasks = await loadActiveAufgabenForMe();
    const active = tasks.filter(t => !t.is_snoozed);
    if (active.length === 0) return;

    // Pop-up zeigen
    showAufgabenPopup(active);
  } catch (e) {
    console.warn('Aufgaben-Popup fehlgeschlagen:', e);
  }
}

  if (modal) modal.remove();

  modal = document.createElement('div');
  modal.id = 'aufgaben-popup';
  modal.className = 'fu-modal';

  // Erste Aufgabe = primär anzeigen
  const t = tasks[0];
  const rest = tasks.length - 1;

  modal.innerHTML = `
    <div class="fu-modal-backdrop"></div>
    <div class="fu-modal-card aufgaben-popup-card">
      <div class="aufgaben-popup-header ${t.prioritaet || 'normal'}">
        <div class="aufgaben-popup-pill">📌 AUFGABE ${t.prioritaet === 'dringend' ? '🔴 DRINGEND' : t.prioritaet === 'hoch' ? '🟠 HOCH' : t.prioritaet === 'niedrig' ? '🟢 NIEDRIG' : '🔵 NORMAL'}</div>
        ${rest > 0 ? `<div class="aufgaben-popup-rest">+${rest} weitere</div>` : ''}
      </div>
      <div class="fu-modal-body">
        <div class="aufgaben-popup-title">${escapeHtml(t.titel)}</div>
        ${t.beschreibung ? `<div class="aufgaben-popup-desc">${escapeHtml(t.beschreibung)}</div>` : ''}

        <div class="aufgaben-popup-meta">
          ${t.intervall_minuten ? `<span class="aufg-meta-tag">⏰ Erinnerung alle ${t.intervall_minuten}min</span>` : ''}
          ${t.faellig_am ? `<span class="aufg-meta-tag">📅 Fällig: ${new Date(t.faellig_am).toLocaleDateString('de-DE')}</span>` : ''}
          ${t.aktiv_bis ? `<span class="aufg-meta-tag">⏳ Bis ${new Date(t.aktiv_bis).toLocaleDateString('de-DE')}</span>` : ''}
        </div>

        <div class="aufgaben-popup-actions">
          ${t.intervall_minuten ? '' : `
            <button class="aufgaben-action-btn primary" onclick="completeAufgabe('${t.id}')">
              <span class="icon">✅</span>
              <span>Erledigt</span>
            </button>
          `}
          ${t.intervall_minuten ? `
            <button class="aufgaben-action-btn primary" onclick="quickCompleteRecurringAufgabe('${t.id}')">
              <span class="icon">✅</span>
              <span>Jetzt erledigt</span>
            </button>
          ` : ''}
        </div>

        <div class="aufgaben-popup-snooze-title">⏰ Erst später erinnern:</div>
        <div class="aufgaben-popup-snooze-grid">
          <button class="aufgaben-snooze-btn" onclick="snoozeAufgabe('${t.id}', 30)">30 Min</button>
          <button class="aufgaben-snooze-btn" onclick="snoozeAufgabe('${t.id}', 120)">2 Std</button>
          <button class="aufgaben-snooze-btn" onclick="snoozeAufgabe('${t.id}', 'tomorrow')">Morgen</button>
        </div>

        <button class="aufgaben-popup-close-btn" onclick="closeAufgabenPopup()">
          Später nochmal anschauen
        </button>
      </div>
    </div>
  `;

  document.body.appendChild(modal);
  setTimeout(() => modal.classList.add('open'), 10);
}

function closeAufgabenPopup() {
  const modal = document.getElementById('aufgaben-popup');
  if (!modal) return;
  modal.classList.remove('open');
  setTimeout(() => modal.remove(), 300);
}

async function completeAufgabe(id) {
  const note = prompt('Notiz zur Erledigung (optional):') || null;
  const { error } = await sb.from('mitarbeiter_aufgaben').update({
    erledigt: true,
    erledigt_am: new Date().toISOString(),
    erledigt_von: currentSession.employee_id,
    erledigt_notiz: note
  }).eq('id', id);

  if (error) return showToast('Fehler: ' + error.message, 'error');
  showToast('Aufgabe erledigt ✓', 'success');
  closeAufgabenPopup();
  refreshTeamAufgabenBadge();

  // Nächste Aufgabe anzeigen falls vorhanden
  setTimeout(() => checkAndShowAufgabenPopup(), 300);
}

async function quickCompleteRecurringAufgabe(id) {
  // Bei Reminder-Aufgaben: nur snoozen für die Intervall-Dauer
  const { data: task } = await sb.from('mitarbeiter_aufgaben').select('intervall_minuten').eq('id', id).maybeSingle();
  const minutes = task?.intervall_minuten || 30;
  await snoozeAufgabe(id, minutes);
  showToast(`Erledigt ✓ Nächste Erinnerung in ${minutes} Min`, 'success');
}

async function snoozeAufgabe(id, mode) {
  let snoozeBis;
  if (mode === 'tomorrow') {
    snoozeBis = new Date();
    snoozeBis.setDate(snoozeBis.getDate() + 1);
    snoozeBis.setHours(8, 0, 0, 0);
  } else {
    snoozeBis = new Date();
    snoozeBis.setMinutes(snoozeBis.getMinutes() + Number(mode));
  }

  const { error } = await sb.from('mitarbeiter_aufgaben_snooze').upsert({
    aufgabe_id: id,
    employee_id: currentSession.employee_id,
    snooze_bis: snoozeBis.toISOString()
  }, { onConflict: 'aufgabe_id,employee_id' });

  if (error) return showToast('Fehler: ' + error.message, 'error');
  closeAufgabenPopup();
  refreshTeamAufgabenBadge();

  // Nächste Aufgabe anzeigen falls vorhanden
  setTimeout(() => checkAndShowAufgabenPopup(), 300);
}

// ===== PAGE: MEINE AUFGABEN =====
async function renderMeineAufgabenPage(content) {
  const tasks = await loadActiveAufgabenForMe();
  const offTime = await loadOffTimeAufgabenForInfo();

  // Eigene erledigte (letzte 7 Tage)
  const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
  const { data: doneList } = await sb.from('mitarbeiter_aufgaben')
    .select('id, titel, beschreibung, prioritaet, erledigt_am, erledigt_notiz')
    .eq('studio_id', currentStudioId)
    .eq('erledigt_von', currentSession.employee_id)
    .gte('erledigt_am', sevenDaysAgo.toISOString())
    .order('erledigt_am', { ascending: false })
    .limit(15);

  const active = tasks.filter(t => !t.is_snoozed);
  const snoozed = tasks.filter(t => t.is_snoozed);

  // Sub-Text
  let heroText;
  if (tasks.length === 0 && offTime.length === 0 && (doneList || []).length === 0) heroText = 'Keine Aufgaben · genieß deine Zeit 😎';
  else if (active.length === 0 && offTime.length > 0) heroText = `${offTime.length} ${offTime.length === 1 ? 'Aufgabe wartet' : 'Aufgaben warten'} außerhalb der Aktivzeit`;
  else if (active.length === 0) heroText = 'Alle Aufgaben geschnoozt';
  else if (active.length === 1) heroText = '<strong>1 Aufgabe</strong> wartet';
  else heroText = `<strong>${active.length} Aufgaben</strong> warten`;

  content.innerHTML = `
    <div class="aufgaben-hero ${active.length > 0 ? 'warning' : 'ok'}">
      <div class="aufgaben-hero-bg"></div>
      <div class="aufgaben-hero-content">
        <div class="aufgaben-hero-icon">📌</div>
        <div class="aufgaben-hero-text">
          <div class="aufgaben-hero-label">TEAM-AUFGABEN</div>
          <div class="aufgaben-hero-value">${active.length}<span class="unit">offen</span></div>
          <div class="aufgaben-hero-explain">${heroText}</div>
        </div>
      </div>
    </div>

    ${active.length > 0 ? `
      <div class="urlaub-pending-section">
        <div class="urlaub-section-title">📋 Offen</div>
        ${active.map(t => renderTeamAufgabeItem(t, false)).join('')}
      </div>
    ` : ''}

    ${snoozed.length > 0 ? `
      <div class="urlaub-pending-section">
        <div class="urlaub-section-title">⏰ Geschnoozt</div>
        ${snoozed.map(t => renderTeamAufgabeItem(t, true)).join('')}
      </div>
    ` : ''}

    ${offTime.length > 0 ? `
      <div class="urlaub-pending-section">
        <div class="urlaub-section-title">🌙 Außerhalb der Aktivzeit</div>
        ${offTime.map(t => renderOffTimeAufgabeItem(t)).join('')}
      </div>
    ` : ''}

    ${doneList && doneList.length > 0 ? `
      <div class="urlaub-pending-section">
        <div class="urlaub-section-title">✅ Erledigt (letzte 7 Tage)</div>
        ${doneList.map(t => renderDoneAufgabeItem(t)).join('')}
      </div>
    ` : ''}

    ${tasks.length === 0 && offTime.length === 0 && (doneList || []).length === 0 ? `
      <div class="aufgaben-empty">
        <div class="icon">🎉</div>
        <div class="title">Keine offenen Aufgaben</div>
        <div class="sub">Lehn dich zurück oder erstelle selbst eine.</div>
      </div>
    ` : ''}
  `;
}

function renderTeamAufgabeItem(t, isSnoozed) {
  const prioMap = {
    'dringend': ['🔴', 'Dringend', 'urgent'],
    'hoch':     ['🟠', 'Hoch', 'high'],
    'normal':   ['🔵', 'Normal', 'normal'],
    'niedrig':  ['🟢', 'Niedrig', 'low']
  };
  const [prioIcon, prioLabel, prioCls] = prioMap[t.prioritaet] || ['🔵', 'Normal', 'normal'];

  let snoozeBadge = '';
  if (isSnoozed && t.snooze_bis) {
    const snoozeBis = new Date(t.snooze_bis);
    const diffMin = Math.floor((snoozeBis - new Date()) / 60000);
    let timeText;
    if (diffMin < 60) timeText = `${diffMin} Min`;
    else if (diffMin < 1440) timeText = `${Math.floor(diffMin/60)} Std`;
    else timeText = `bis ${snoozeBis.toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'})}`;
    snoozeBadge = `<span class="aufg-snooze-badge">⏰ noch ${timeText}</span>`;
  }

  // Zeitfenster anzeigen wenn gesetzt
  const timeWindow = (t.aktiv_zeit_von || t.aktiv_zeit_bis)
    ? `<span class="aufg-meta-tag">🕘 ${(t.aktiv_zeit_von || '').slice(0,5)}–${(t.aktiv_zeit_bis || '').slice(0,5)}</span>`
    : '';

  return `
    <div class="team-aufg-item ${isSnoozed ? 'snoozed' : ''}">
      <div class="team-aufg-info">
        <div class="team-aufg-line1">
          <span class="inbox-prio-tag ${prioCls}">${prioIcon} ${prioLabel}</span>
          ${t.intervall_minuten ? `<span class="aufg-meta-tag">🔁 alle ${t.intervall_minuten}min</span>` : ''}
          ${timeWindow}
          ${snoozeBadge}
        </div>
        <div class="team-aufg-title">${escapeHtml(t.titel)}</div>
        ${t.beschreibung ? `<div class="team-aufg-desc">${escapeHtml(t.beschreibung)}</div>` : ''}
        <div class="team-aufg-meta">
          ${t.aktiv_bis ? `Gültig bis ${new Date(t.aktiv_bis).toLocaleDateString('de-DE')}` : ''}
          ${t.aktiv_bis && t.faellig_am ? ' · ' : ''}
          ${t.faellig_am ? `Fällig: ${new Date(t.faellig_am).toLocaleDateString('de-DE')}` : ''}
        </div>
      </div>
      <div class="team-aufg-actions">
        ${t.intervall_minuten
          ? `<button class="inbox-btn approve" onclick="quickCompleteRecurringAufgabe('${t.id}')">✅ Jetzt erledigt</button>`
          : `<button class="inbox-btn approve" onclick="completeAufgabe('${t.id}')">✅ Erledigt</button>`}
        ${!isSnoozed ? `<button class="inbox-btn reject" onclick="snoozeAufgabe('${t.id}', 30)">⏰ 30 Min</button>` : ''}
      </div>
    </div>
  `;
}

function renderOffTimeAufgabeItem(t) {
  const prioMap = {
    'dringend': ['🔴', 'Dringend', 'urgent'],
    'hoch':     ['🟠', 'Hoch', 'high'],
    'normal':   ['🔵', 'Normal', 'normal'],
    'niedrig':  ['🟢', 'Niedrig', 'low']
  };
  const [prioIcon, prioLabel, prioCls] = prioMap[t.prioritaet] || ['🔵', 'Normal', 'normal'];

  // Zeitfenster ermitteln und passenden Hinweis-Text bauen
  const vonStr = (t.aktiv_zeit_von || '').slice(0, 5);
  const bisStr = (t.aktiv_zeit_bis || '').slice(0, 5);
  let hint;
  const now = new Date();
  const berlinTimeStr = now.toLocaleTimeString('de-DE', {timeZone:'Europe/Berlin', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
  if (t.aktiv_zeit_von && berlinTimeStr < t.aktiv_zeit_von) {
    hint = `🌅 Wird ab ${vonStr} aktiv`;
  } else if (t.aktiv_zeit_bis && berlinTimeStr > t.aktiv_zeit_bis) {
    hint = `🌙 Heute vorbei · morgen wieder ab ${vonStr}`;
  } else {
    hint = `Aktivzeit ${vonStr}–${bisStr}`;
  }

  return `
    <div class="team-aufg-item snoozed" style="opacity:0.75">
      <div class="team-aufg-info">
        <div class="team-aufg-line1">
          <span class="inbox-prio-tag ${prioCls}">${prioIcon} ${prioLabel}</span>
          <span class="aufg-meta-tag">🕘 ${vonStr}–${bisStr}</span>
          ${t.intervall_minuten ? `<span class="aufg-meta-tag">🔁 alle ${t.intervall_minuten}min</span>` : ''}
        </div>
        <div class="team-aufg-title">${escapeHtml(t.titel)}</div>
        ${t.beschreibung ? `<div class="team-aufg-desc">${escapeHtml(t.beschreibung)}</div>` : ''}
        <div class="team-aufg-meta">${hint}</div>
      </div>
    </div>
  `;
}

function renderDoneAufgabeItem(t) {
  return `
    <div class="team-aufg-item done">
      <div class="team-aufg-info">
        <div class="team-aufg-title done">${escapeHtml(t.titel)}</div>
        <div class="team-aufg-meta">✅ ${formatRelative(t.erledigt_am)}${t.erledigt_notiz ? ' · ' + escapeHtml(t.erledigt_notiz) : ''}</div>

    </div>
  `;
}

async function submitAufgabe(e) {
  e.preventDefault();
  const titel = document.getElementById('aufg-titel').value.trim();
  if (!titel) return showToast('Bitte Titel eingeben', 'error');

  const beschreibung = document.getElementById('aufg-beschreibung').value.trim() || null;
  const zugewiesen_an = document.querySelector('#aufg-assignees .msg-chip.active')?.dataset.aid || null;
  const prioritaet = document.querySelector('#aufg-priorities .msg-chip.active')?.dataset.prio || 'normal';
  const intervallStr = document.querySelector('#aufg-intervall .msg-chip.active')?.dataset.int || '';
  const intervall_minuten = intervallStr ? Number(intervallStr) : null;
  const faellig_am = document.getElementById('aufg-faellig').value || null;
  const aktiv_von = document.getElementById('aufg-aktiv-von').value || null;
  const aktiv_bis = document.getElementById('aufg-aktiv-bis').value || null;
  const aktiv_zeit_von = document.getElementById('aufg-zeit-von').value || null;
  const aktiv_zeit_bis = document.getElementById('aufg-zeit-bis').value || null;

  const btn = document.getElementById('aufg-submit');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Erstelle…';

  const { error } = await sb.from('mitarbeiter_aufgaben').insert({
    studio_id: currentStudioId,
    titel,
    beschreibung,
    prioritaet,
    zugewiesen_an: zugewiesen_an || null,
    erstellt_von: currentSession.employee_id,
    faellig_am,
    aktiv_von,
    aktiv_bis,
    aktiv_zeit_von,
    aktiv_zeit_bis,
    intervall_minuten,
    erledigt: false
  });

  btn.disabled = false; btn.innerHTML = '📌 Aufgabe erstellen';
  if (error) return showToast('Fehler: ' + error.message, 'error');
  showToast('Aufgabe erstellt ✓', 'success');
  refreshTeamAufgabenBadge();
  setTimeout(() => openDetail('meine_aufgaben'), 600);
}

function getCleaningShiftKey() {

async function loadCleaningConfig() {

    .maybeSingle();

async function getActiveCleaningPlan() {

    .select('id, code, name')
    .eq('studio_id', currentStudioId)
    .eq('is_active', true)
    .maybeSingle();

async function loadCleaningTasks() {

async function getOrCreateDayRun() {
  const today = new Date().toISOString().slice(0, 10);

  // Existiert schon?
  const { data: existing } = await sb.from('cleaning_day_runs')
    .select('id, missing_shift_code, missing_shift_final, notes')
    .eq('studio_id', currentStudioId)
    .eq('run_date', today)

async function getOrCreateSubmission(dayRunId, shiftCode, totalTasks) {
  // Suche bestehende Submission für diesen Mitarbeiter + Schicht + Tag (is_latest = true)
  const today = new Date().toISOString().slice(0, 10);

  if (existing) return existing;

  // Neue Submission anlegen
  const { data: created, error } = await sb.from('cleaning_shift_submissions')

      studio_id: currentStudioId,
      run_date: today,
      shift_code: shiftCode,
      employee_id: currentSession.employee_id,

async function loadSubmissionItems(submissionId, allTasks) {
  // Submission-Items für diese Submission laden
  const { data } = await sb.from('cleaning_submission_items')
    .select('id, plan_item_id, is_done, done_by_previous_shift, source_shift_code')
    .eq('submission_id', submissionId);

  // Map: plan_item_id -> item
  const itemMap = {};
  (data || []).forEach(i => { itemMap[i.plan_item_id] = i; });

  // Fehlende Items für alle Plan-Items anlegen
  const missing = allTasks.filter(t => !itemMap[t.id]);
  if (missing.length > 0) {
    const inserts = missing.map(t => ({
      submission_id: submissionId,
      plan_item_id: t.id,
      is_done: false,
      done_by_previous_shift: false
    }));
    const { data: created } = await sb.from('cleaning_submission_items')
      .insert(inserts)
      .select('id, plan_item_id, is_done, done_by_previous_shift, source_shift_code');
    (created || []).forEach(i => { itemMap[i.plan_item_id] = i; });
  }

  return itemMap;
}

async function loadPreviousShiftDoneItems(currentShiftCode) {
  // Bei multi-Shift: hole Items die heute schon von anderen Schichten erledigt wurden
  const today = new Date().toISOString().slice(0, 10);
  const { data } = await sb.from('cleaning_submission_items')
    .select('plan_item_id, source_shift_code, submission:cleaning_shift_submissions!inner(run_date, studio_id, shift_code, is_latest)')
    .eq('is_done', true)
    .eq('submission.studio_id', currentStudioId)
    .eq('submission.run_date', today)
    .eq('submission.is_latest', true)
    .neq('submission.shift_code', currentShiftCode);

  const map = {};
  (data || []).forEach(i => {
    map[i.plan_item_id] = i.source_shift_code || i.submission?.shift_code;
  });
  return map;
}

async function loadBirthdayCard() {
  const wrap = document.getElementById('birthday-card-wrap');
  if (!wrap) return;

  // Alle aktiven Kollegen mit Geburtsdatum holen (in den Studios des aktuellen Users)
  // Sicht-Logik:
  //  - Admin: sieht alle aktiven Mitarbeiter
  //  - SL: sieht Mitarbeiter im eigenen Studio
  //  - Trainer/Mitarbeiter: sieht Kollegen aus den gemeinsamen Studios
  // RLS regelt das via employees_select Policy ohnehin -> wir bekommen automatisch
  // nur was wir sehen dürfen.

  const { data: emps, error } = await sb.from('employees')
    .select('id, display_name, geburtsdatum, mitarbeiter_typ')
    .eq('is_active', true)
    .not('geburtsdatum', 'is', null)
    .or('mitarbeiter_typ.eq.intern,mitarbeiter_typ.is.null'); // nur Intern + Legacy (null)

  if (error || !emps || emps.length === 0) {
    wrap.innerHTML = '';
    return;
  }

  // Berechne nächsten Geburtstag-Tag (Tage bis dahin, Alter den sie werden)
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  const enriched = emps.map(e => {
    const bd = new Date(e.geburtsdatum + 'T00:00:00');
    // Geburtstag dieses Jahr
    let thisYearBd = new Date(today.getFullYear(), bd.getMonth(), bd.getDate());
    if (thisYearBd < today) {
      // Schon vorbei → nächstes Jahr
      thisYearBd = new Date(today.getFullYear() + 1, bd.getMonth(), bd.getDate());
    }
    const daysUntil = Math.round((thisYearBd - today) / 86400000);
    const turningAge = thisYearBd.getFullYear() - bd.getFullYear();
    return {
      ...e,
      bd_month: bd.getMonth(),
      bd_day: bd.getDate(),
      days_until: daysUntil,
      turning_age: turningAge,
      next_bd: thisYearBd,
      is_self: e.id === currentSession.employee_id
    };
  });

  // Nur Geburtstage in den nächsten 7 Tagen (heute = 0, in 7 Tagen = 7)
  const upcoming = enriched.filter(e => e.days_until <= 7);
  upcoming.sort((a, b) => a.days_until - b.days_until);

  if (upcoming.length === 0) {
    wrap.innerHTML = ''; // nichts ansteht → keine Karte zeigen
    return;
  }

  // Aufteilen: heute / morgen / nächste 7 Tage
  const heute = upcoming.filter(e => e.days_until === 0);
  const rest = upcoming.filter(e => e.days_until > 0);

  // Render
  wrap.innerHTML = `
    <div class="birthday-card ${heute.length > 0 ? 'celebrating' : ''}">
      <div class="birthday-card-bg"></div>
      <div class="birthday-card-content">
        ${heute.length > 0 ? `
          <div class="birthday-celebrate-header">
            <div class="bd-confetti">🎉</div>
            <div class="bd-celebrate-title">
              <div class="bd-celebrate-label">${heute.some(e => e.is_self) ? 'Alles Gute zum Geburtstag!' : 'Heute Geburtstag'}</div>
              <div class="bd-celebrate-sub">${heute.map(e => e.is_self ? '🎂 Du!' : `🎂 ${escapeHtml(e.display_name)}`).join(' · ')}</div>
            </div>
            <div class="bd-confetti">🎂</div>
          </div>

          ${heute.filter(e => !e.is_self).length > 0 ? `
            <div class="bd-today-list">
              ${heute.filter(e => !e.is_self).map(e => `
                <div class="bd-today-row">
                  <div class="bd-today-name">🎉 ${escapeHtml(e.display_name)} wird heute <strong>${e.turning_age}</strong></div>
                  <div class="bd-today-hint">Gratulier mal! 🥳</div>
                </div>
              `).join('')}
            </div>
          ` : ''}
        ` : `
          <div class="birthday-upcoming-header">
            <span class="bd-icon">🎂</span>
            <div class="bd-upcoming-title">Bald Geburtstag</div>
          </div>
        `}

        ${rest.length > 0 ? `
          <div class="bd-upcoming-list">
            ${rest.map(e => renderBdRow(e)).join('')}
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

function renderBdRow(e) {
  let timeText;
  if (e.days_until === 1) timeText = 'morgen';
  else if (e.days_until <= 7) timeText = `in ${e.days_until} Tagen`;
  else timeText = e.next_bd.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });

  const dayMonth = String(e.bd_day).padStart(2, '0') + '.' + String(e.bd_month + 1).padStart(2, '0') + '.';

  return `
    <div class="bd-upcoming-row ${e.is_self ? 'is-self' : ''}">
      <div class="bd-upcoming-date">
        <div class="bd-upcoming-dm">${dayMonth}</div>
        <div class="bd-upcoming-when">${timeText}</div>
      </div>
      <div class="bd-upcoming-info">
        <div class="bd-upcoming-name">${e.is_self ? 'Du' : escapeHtml(e.display_name)}</div>
        <div class="bd-upcoming-age">wird <strong>${e.turning_age}</strong></div>
      </div>
      <div class="bd-cake">🎂</div>
    </div>
  `;
}

async function loadSlDashboard() {
  const wrap = document.getElementById('sl-dashboard-wrap');
  if (!wrap) return;

  // Nur für Admin/Studioleitung
  if (!isAdminOrLeader()) {
    wrap.innerHTML = '';
    return;
  }

  // 3 Bereiche parallel laden:
  // 1) Schichtplan heute (mit Konflikten)
  // 2) Inbox-Counts
  const todayStr = new Date().toISOString().slice(0, 10);

  // Schichten heute
  const shiftQuery = sb.from('v_shift_assignments_detailed')
    .select('shift_assignment_id, employee_id, display_name, shift_name, shift_code, shift_color, effective_start_time, effective_end_time, status, conflicting_absence_type, conflicting_absence_status')
    .eq('shift_date', todayStr)
    .eq('studio_id', currentStudioId)
    .order('effective_start_time', { ascending: true });

  // Inbox-Counts (Urlaubs-/Krank-/Schule-Anträge offen)
  const absencesQuery = sb.from('employee_absences')
    .select('absence_id, absence_type', { count: 'exact', head: false })
    .eq('studio_id', currentStudioId)
    .eq('status', 'requested');

  // Fahrtkosten offen
  const fahrtQuery = sb.from('fahrtkosten_eintraege')
    .select('eintrag_id', { count: 'exact', head: true })
    .eq('studio_id', currentStudioId)
    .eq('status', 'eingereicht');

  // Nachrichten ungelesen
  const msgQuery = sb.from('employee_messages')
    .select('id, category', { count: 'exact', head: false })
    .eq('studio_id', currentStudioId)
    .eq('is_read', false)
    .neq('from_employee_id', currentSession.employee_id);

  // Sofort gestempelte Mitarbeiter
  const presentQuery = sb.from('time_events')
    .select('employee_id, event_type, occurred_at, employees:employees!time_events_employee_id_fkey(display_name)')
    .eq('studio_id', currentStudioId)
    .gte('occurred_at', todayStr + 'T00:00:00')
    .order('occurred_at', { ascending: false })
    .limit(200);

  const [shiftRes, absRes, fahrtRes, msgRes, presentRes] = await Promise.all([
    shiftQuery, absencesQuery, fahrtQuery, msgQuery, presentQuery
  ]);

  const shifts = shiftRes.data || [];
  const absences = absRes.data || [];
  const msgs = msgRes.data || [];
  const events = presentRes.data || [];

  // Anwesenheit berechnen (aktueller Stempel-Status pro Mitarbeiter)
  const presenceMap = {};
  events.forEach(e => {
    if (!presenceMap[e.employee_id]) {
      presenceMap[e.employee_id] = { event_type: e.event_type, occurred_at: e.occurred_at, name: e.employees?.display_name || 'Unbekannt' };
    }
  });
  const presentEmployees = Object.entries(presenceMap)
    .filter(([_, p]) => p.event_type === 'clock_in' || p.event_type === 'break_end')
    .map(([id, p]) => ({ id, ...p }));
  const onBreakEmployees = Object.entries(presenceMap)
    .filter(([_, p]) => p.event_type === 'break_start')
    .map(([id, p]) => ({ id, ...p }));

  // Konflikte: Schichten heute mit approved absence
  const conflicts = shifts.filter(s => s.conflicting_absence_status === 'approved');

  // Anzahlen
  const absCount = absences.length;
  const fahrtCount = fahrtRes.count || 0;
  const msgCount = msgs.length;
  const inboxTotal = absCount + fahrtCount + msgCount;
  const conflictCount = conflicts.length;
  const shiftCount = shifts.length;
  const presentCount = presentEmployees.length + onBreakEmployees.length;

  // Studio-Name
  const studio = (currentSession.studios || []).find(s => s.id === currentStudioId);
  const studioName = studio?.name || 'Studio';

  // Default-Open Logic: wenn Konflikte oder >0 Inbox = aufmerksamkeitsbedürftig
  const hasAttention = conflictCount > 0 || inboxTotal > 0;
  const defaultOpenAttr = hasAttention ? 'open' : '';

  // Render
  wrap.innerHTML = `
    <details class="sl-dashboard" ${defaultOpenAttr}>
      <summary class="sl-dash-header">
        <div class="sl-dash-title">
          <span class="sl-dash-icon">📊</span>
          <div>
            <div class="sl-dash-label">Studio-Dashboard</div>
            <div class="sl-dash-sub">${escapeHtml(studioName)} · ${hasAttention ? '⚠️ braucht Aufmerksamkeit' : '✅ alles im Plan'}</div>
          </div>
        </div>
        <span class="sl-dash-chevron">▼</span>
      </summary>

      <div class="sl-dash-body">
        <!-- Stats Grid -->
        <div class="sl-stats-grid">
          <div class="sl-stat-card ${conflictCount > 0 ? 'alert' : ''}" onclick="${conflictCount > 0 ? `document.getElementById('sl-section-conflicts')?.scrollIntoView({behavior:'smooth'})` : ''}">
            <div class="sl-stat-icon">${conflictCount > 0 ? '⚠️' : '✅'}</div>
            <div class="sl-stat-num">${conflictCount}</div>
            <div class="sl-stat-lbl">Konflikte</div>
          </div>
          <div class="sl-stat-card ${inboxTotal > 0 ? 'pending' : ''}" onclick="openDetail('inbox')">
            <div class="sl-stat-icon">📥</div>
            <div class="sl-stat-num">${inboxTotal}</div>
            <div class="sl-stat-lbl">Inbox</div>
          </div>
          <div class="sl-stat-card">
            <div class="sl-stat-icon">📅</div>
            <div class="sl-stat-num">${shiftCount}</div>
            <div class="sl-stat-lbl">Schichten</div>
          </div>
        </div>

        ${conflictCount > 0 ? `
          <div class="sl-section" id="sl-section-conflicts">
            <div class="sl-section-title alert">⚠️ Konflikte heute (${conflictCount})</div>
            ${conflicts.map(c => renderSlConflict(c)).join('')}
          </div>
        ` : ''}

        ${inboxTotal > 0 ? `
          <div class="sl-section">
            <div class="sl-section-title">📥 Inbox-Übersicht</div>
            <div class="sl-inbox-grid">
              ${renderSlInboxStats(absences, fahrtCount, msgs)}
            </div>
            <button class="sl-go-inbox" onclick="openDetail('inbox')">📥 Inbox öffnen →</button>
          </div>
        ` : ''}

        <div class="sl-section">
          <div class="sl-section-title">📅 Schichtplan heute (${shiftCount})</div>
          ${shiftCount === 0
            ? '<div class="sl-empty">Keine Schichten für heute eingeplant</div>'
            : shifts.map(s => renderSlShift(s, presenceMap)).join('')}
        </div>

        ${presentCount > 0 ? `
          <div class="sl-section">
            <div class="sl-section-title">👥 Anwesend gerade (${presentCount})</div>
            ${presentEmployees.map(p => renderSlPresent(p, false)).join('')}
            ${onBreakEmployees.map(p => renderSlPresent(p, true)).join('')}
          </div>
        ` : ''}
      </div>
    </details>
  `;
}

function renderSlConflict(s) {
  const start = (s.effective_start_time || '').slice(0, 5);
  const end = (s.effective_end_time || '').slice(0, 5);
  const absMap = {
    'vacation': '🏖️ Urlaub',
    'sick': '🤒 Krank',
    'school_exam': '🎓 Schule',
    'paid_leave': '💼 Sonderurlaub',
    'unpaid_leave': '📋 Unbezahlt'
  };
  const absLabel = absMap[s.conflicting_absence_type] || s.conflicting_absence_type;

  return `
    <div class="sl-conflict-item">
      <div class="sl-conflict-icon">⚠️</div>
      <div class="sl-conflict-info">
        <div class="sl-conflict-name">${escapeHtml(s.display_name)}</div>
        <div class="sl-conflict-detail">
          <span class="sl-conflict-shift">${escapeHtml(s.shift_name)} · ${start}–${end}</span>
        </div>
        <div class="sl-conflict-reason">${absLabel} · niemand als Ersatz</div>
      </div>
    </div>
  `;
}

function renderSlInboxStats(absences, fahrtCount, msgs) {
  // Absences nach Typ gruppieren
  const absByType = {};
  absences.forEach(a => {
    absByType[a.absence_type] = (absByType[a.absence_type] || 0) + 1;
  });

  // Messages nach Typ
  const stempelkorrekturCount = msgs.filter(m => m.category === 'stempelkorrektur').length;
  const msgOthersCount = msgs.length - stempelkorrekturCount;

  const items = [];

  if (absByType.vacation) items.push({ icon: '🏖️', label: 'Urlaubsanträge', count: absByType.vacation });
  if (absByType.sick) items.push({ icon: '🤒', label: 'Krankmeldungen', count: absByType.sick });
  if (absByType.school_exam) items.push({ icon: '🎓', label: 'Schule/Prüfung', count: absByType.school_exam });
  if (absByType.overtime_reduction) items.push({ icon: '⏱️', label: 'Überstundenabbau', count: absByType.overtime_reduction });
  if (absByType.paid_leave) items.push({ icon: '💼', label: 'Sonderurlaub', count: absByType.paid_leave });
  if (absByType.unpaid_leave) items.push({ icon: '📋', label: 'Unbezahlt', count: absByType.unpaid_leave });
  if (fahrtCount > 0) items.push({ icon: '🚗', label: 'Fahrtkosten', count: fahrtCount });
  if (stempelkorrekturCount > 0) items.push({ icon: '⏰', label: 'Zeit-Korrekturen', count: stempelkorrekturCount });
  if (msgOthersCount > 0) items.push({ icon: '💬', label: 'Nachrichten', count: msgOthersCount });

  if (items.length === 0) return '<div class="sl-empty">Inbox ist leer</div>';

  return items.map(i => `
    <div class="sl-inbox-stat">
      <span class="ico">${i.icon}</span>
      <span class="lbl">${i.label}</span>
      <span class="cnt">${i.count}</span>
    </div>
  `).join('');
}

function renderSlShift(s, presenceMap) {
  const start = (s.effective_start_time || '').slice(0, 5);
  const end = (s.effective_end_time || '').slice(0, 5);
  const presence = presenceMap[s.employee_id];

  // Status
  let statusBadge = '';
  let rowCls = '';
  if (s.conflicting_absence_status === 'approved') {
    statusBadge = '<span class="sl-shift-badge conflict">⚠️ Konflikt</span>';
    rowCls = 'conflict';
  } else if (presence?.event_type === 'clock_in' || presence?.event_type === 'break_end') {
    statusBadge = '<span class="sl-shift-badge active">🟢 Da</span>';
    rowCls = 'active';
  } else if (presence?.event_type === 'break_start') {
    statusBadge = '<span class="sl-shift-badge break">☕ Pause</span>';
  } else if (presence?.event_type === 'clock_out') {
    statusBadge = '<span class="sl-shift-badge out">✓ Feierabend</span>';
  } else {
    // Nicht eingestempelt - prüfen ob Schicht noch in der Zukunft oder schon längst vorbei
    const now = new Date();
    const todayStr = now.toISOString().slice(0, 10);
    const shiftStart = new Date(todayStr + 'T' + (s.effective_start_time || '00:00:00'));
    const shiftEnd = new Date(todayStr + 'T' + (s.effective_end_time || '23:59:59'));

    if (now < shiftStart) {
      const diffMin = Math.floor((shiftStart - now) / 60000);
      if (diffMin < 60) statusBadge = `<span class="sl-shift-badge upcoming">in ${diffMin}min</span>`;
      else statusBadge = `<span class="sl-shift-badge upcoming">in ${Math.floor(diffMin/60)}h</span>`;
    } else if (now > shiftEnd) {
      statusBadge = '<span class="sl-shift-badge missed">verpasst</span>';
      rowCls = 'missed';
    } else {
      statusBadge = '<span class="sl-shift-badge waiting">⏳ noch nicht eingestempelt</span>';
      rowCls = 'waiting';
    }
  }

  return `
    <div class="sl-shift-row ${rowCls}" ${s.shift_color ? `style="border-left-color:${s.shift_color}"` : ''}>
      <div class="sl-shift-time">
        <div class="t1">${start}</div>
        <div class="t-sep">–</div>
        <div class="t2">${end}</div>
      </div>
      <div class="sl-shift-info">
        <div class="sl-shift-name">${escapeHtml(s.display_name)}</div>
        <div class="sl-shift-template">${escapeHtml(s.shift_name)}</div>
      </div>
      ${statusBadge}
    </div>
  `;
}

function renderSlPresent(p, isOnBreak) {
  const since = new Date(p.occurred_at);
  const now = new Date();
  const diffMin = Math.floor((now - since) / 60000);
  let timeText;
  if (diffMin < 60) timeText = `${diffMin} Min`;
  else timeText = `${Math.floor(diffMin/60)}h ${diffMin % 60}min`;

  const sinceStr = since.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

  return `
    <div class="sl-present-row ${isOnBreak ? 'on-break' : ''}">
      <div class="sl-present-icon">${isOnBreak ? '☕' : '🟢'}</div>
      <div class="sl-present-info">
        <div class="sl-present-name">${escapeHtml(p.name)}</div>
        <div class="sl-present-time">
          ${isOnBreak ? `Pause seit ${sinceStr}` : `seit ${sinceStr}`} <span class="muted">· ${timeText}</span>
        </div>
      </div>
    </div>
  `;
}

async function loadCleaningQuickCard() {
  const wrap = document.getElementById('cleaning-quick-card-wrap');
  if (!wrap) return;

  const config = await loadCleaningConfig();
  if (!config) {
    wrap.innerHTML = '';
    refreshReinigungsBadge(0, 0);
    return;
  }

  const { plan, tasks } = await loadCleaningTasks();
  if (!plan || tasks.length === 0) {
    wrap.innerHTML = '';
    refreshReinigungsBadge(0, 0);
    return;
  }

  // Schicht bestimmen
  const shiftMode = config.shift_mode || 'single';
  let shiftCode;
  if (shiftMode === 'single') {
    shiftCode = 'single';
  } else {
    shiftCode = getSavedCleaningShift();
  }

  // Wenn keine Schicht gewählt → kurzer Hinweis
  if (!shiftCode) {
    const todayTotal = tasks.length;
    wrap.innerHTML = `
      <div class="cleaning-quick-card no-shift" onclick="openDetail('reinigung')">
        <div class="cq-icon">🧹</div>
        <div class="cq-info">
          <div class="cq-title">Reinigung wartet</div>
          <div class="cq-sub">${todayTotal} Aufgaben heute · Schicht wählen</div>
        </div>
        <div class="cq-arrow">›</div>
      </div>
    `;
    refreshReinigungsBadge(0, todayTotal);
    return;
  }

  // Schicht-spezifische Tasks zählen
  const myTasks = tasks.filter(t => t.responsible_shift_code === shiftCode);
  if (myTasks.length === 0) {
    wrap.innerHTML = '';
    refreshReinigungsBadge(0, 0);
    return;
  }

  // Submission laden
  const dayRun = await getOrCreateDayRun();
  if (!dayRun) { wrap.innerHTML = ''; return; }

  const submission = await getOrCreateSubmission(dayRun.id, shiftCode, myTasks.length);
  if (!submission) { wrap.innerHTML = ''; return; }

  const itemMap = await loadSubmissionItems(submission.id, myTasks);
  const previousDone = await loadPreviousShiftDoneItems(shiftCode);

  // Count
  let done = 0;
  myTasks.forEach(t => {
    const i = itemMap[t.id];
    if (i?.is_done || previousDone[t.id]) done++;
  });
  const total = myTasks.length;
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  const sLabel = SHIFT_LABELS[shiftCode] || SHIFT_LABELS.single;

  const isDone = done === total && total > 0;

  wrap.innerHTML = `
    <div class="cleaning-quick-card ${isDone ? 'complete' : ''}" onclick="openDetail('reinigung')">
      <div class="cq-icon">${isDone ? '✅' : '🧹'}</div>
      <div class="cq-info">
        <div class="cq-title">${isDone ? 'Reinigung erledigt!' : 'Reinigung deiner Schicht'}</div>
        <div class="cq-sub">${sLabel.icon} ${sLabel.label} · ${done}/${total}${isDone ? ' · Top!' : ''}</div>
        <div class="cq-progress-bar"><div class="cq-progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="cq-arrow">›</div>
    </div>
  `;

  refreshReinigungsBadge(done, total);
}

function refreshReinigungsBadge(done, total) {
  const badge = document.getElementById('reinigung-menu-badge');
  const sub = document.getElementById('reinigung-menu-sub');
  if (!badge || !sub) return;

  const offen = total - done;
  if (offen > 0) {
    badge.textContent = offen > 99 ? '99+' : offen;
    badge.style.display = '';
    sub.textContent = `${done}/${total} erledigt · ${offen} offen`;
  } else if (total > 0) {
    badge.style.display = 'none';
    sub.textContent = `Alle ${total} erledigt ✓`;
  } else {
    badge.style.display = 'none';
    sub.textContent = 'Tagesaufgaben abhaken';
  }
  if (typeof syncMehrSectionBadges === 'function') syncMehrSectionBadges();
}

function handleDefektPhotoSelect(event) {
  const file = event.target.files?.[0];
  if (!file) return;

  // Validierung
  if (!file.type.startsWith('image/')) {
    showToast('Bitte ein Bild auswählen', 'error');
    return;
  }
  // Max 10 MB
  if (file.size > 10 * 1024 * 1024) {
    showToast('Foto zu groß (max. 10 MB)', 'error');
    return;
  }

  _defektPhotoBlob = file;

  // Preview anzeigen
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('defekt-photo-img').src = e.target.result;

async function submitDefekt() {
  if (!_defektPhotoBlob) return showToast('📸 Foto ist Pflicht — Kamera öffnen', 'error');

  const beschreibung = document.getElementById('defekt-beschreibung').value.trim();
  if (!beschreibung) return showToast('Bitte beschreiben was kaputt ist', 'error');

  const bereich = document.querySelector('#defekt-bereich .msg-chip.active')?.dataset.val || 'sonstiges';
  const dringlichkeit = document.querySelector('#defekt-dringlichkeit .msg-chip.active')?.dataset.val || 'bald';

  const btn = document.getElementById('defekt-submit-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Sende…';

  try {
    // 1) Foto hochladen
    const ext = (_defektPhotoBlob.type.split('/')[1] || 'jpg').replace('jpeg', 'jpg');
    const timestamp = Date.now();
    const safeName = (_defektPhotoBlob.name || 'defekt').replace(/[^a-zA-Z0-9._-]/g, '_').slice(0, 50);
    const path = `defekte/${currentStudioId}/${timestamp}_${safeName.split('.')[0]}.${ext}`;

    btn.innerHTML = '<span class="spinner"></span> Lade Foto…';
    const { error: uploadError } = await sb.storage.from('media').upload(path, _defektPhotoBlob, {
      contentType: _defektPhotoBlob.type,
      cacheControl: '3600',
      upsert: false
    });

    if (uploadError) {
      console.error('Upload fail:', uploadError);
      throw new Error('Foto-Upload fehlgeschlagen: ' + uploadError.message);
    }

    // Public URL holen
    const { data: urlData } = sb.storage.from('media').getPublicUrl(path);
    const photoUrl = urlData?.publicUrl;
    if (!photoUrl) throw new Error('Konnte URL nicht ermitteln');

    // 2) Nachricht an Admin/SL anlegen
    btn.innerHTML = '<span class="spinner"></span> Sende Nachricht…';

    const bereichMap = {
      'geraete': '💪 Geräte', 'sanitaer': '🚿 Sanitär', 'boden': '🟫 Boden/Wand',
      'strom': '💡 Licht/Strom', 'reinigung': '🧹 Reinigung', 'sonstiges': '📋 Sonstiges'
    };
    const dringMap = {
      'sofort': '🔴 SOFORT (Betriebsstörung)',
      'bald': '🟠 Bald (innerhalb Woche)',
      'ok': '🟢 Wenn Zeit ist'
    };

    const subject = `🔧 Defekt: ${bereichMap[bereich] || bereich}`;

    const messageBody = [
      `🏷️ Bereich: ${bereichMap[bereich] || bereich}`,
      `⚠️ Dringlichkeit: ${dringMap[dringlichkeit] || dringlichkeit}`,
      ``,
      `📝 Was ist das Problem?`,
      beschreibung,
      ``,
      `📸 Foto:`,
      photoUrl
    ].join('\n');

    // Priority je nach Dringlichkeit
    const priority = dringlichkeit === 'sofort' ? 'urgent' : (dringlichkeit === 'bald' ? 'high' : 'normal');

    const { error: insertError } = await sb.from('employee_messages').insert({
      from_employee_id: currentSession.employee_id,
      studio_id: currentStudioId,
      subject,
      message: messageBody,
      category: 'defekt',
      priority
    });

    if (insertError) throw insertError;

    btn.disabled = false; btn.innerHTML = '📤 Defekt melden';
    showToast('✓ Defekt gemeldet · Push an Admin', 'success');

    // Form zurücksetzen + Mehr-Menü öffnen
    setTimeout(() => switchView('mehr'), 800);

  } catch (err) {
    btn.disabled = false; btn.innerHTML = '📤 Defekt melden';
    showToast('Fehler: ' + err.message, 'error');
  }
}

async function renderReinigungContent(content, ctx) {

          </div>
        </div>

      <div class="cleaning-shift-grid">
        ${shiftCodes.map(code => {

              <div class="csp-label">${lab.label}</div>
              <div class="csp-count">${cnt} Aufgaben</div>

    `;

  }

  const itemMap = await loadSubmissionItems(submission.id, myTasks);

  const otherTasks = shiftMode === 'multi' ? tasks.filter(t => t.responsible_shift_code !== currentShift) : [];

  // Count

  myTasks.forEach(t => {

    if (i?.is_done || previousDone[t.id]) done++;
  });
  const total = myTasks.length;

  const isDone = done === total && total > 0;
  const sLabel = SHIFT_LABELS[currentShift] || SHIFT_LABELS.single;

  // State in window für Toggle-Funktion
  window._reinigungState = {
    submissionId: submission.id,
    itemMap,
    previousDone,
    myTasks,
    otherTasks,
    plan, ctx

    <div class="cleaning-hero ${isDone ? 'complete' : ''}">

      <div class="cleaning-hero-content">

        <div class="cleaning-hero-text">

          <div class="cleaning-hero-value">${done}<span class="unit">/ ${total}</span></div>
          <div class="cleaning-hero-progress">

          </div>
          <div class="cleaning-hero-sub">

          </div>
        </div>

    </div>

    <div class="urlaub-pending-section">
      <div class="urlaub-section-title">${sLabel.icon} Deine Aufgaben (${done}/${total})</div>
      ${myTasks.map(t => renderCleaningTaskRow(t, itemMap[t.id], previousDone[t.id])).join('')}
    </div>

    ${otherTasks.length > 0 ? `
      <details class="cleaning-other-shifts">
        <summary>👁️ Aufgaben anderer Schichten (${otherTasks.length}) – nur zur Übersicht</summary>
        <div class="cleaning-other-list">
          ${shiftCodes.filter(c => c !== currentShift).map(code => {
            const ots = otherTasks.filter(t => t.responsible_shift_code === code);
            if (ots.length === 0) return '';
            const lab = SHIFT_LABELS[code] || { icon: '🧹', label: code };
            return `
              <div class="other-shift-block">
                <div class="other-shift-title">${lab.icon} ${lab.label}</div>
                ${ots.map(t => `<div class="other-shift-task">• ${escapeHtml(t.task_text)}</div>`).join('')}
              </div>
            `;
          }).join('')}
        </div>
      </details>
    ` : ''}

    ${!isDone ? `
      <div class="cleaning-not-done-wrap">
        <details class="aufg-advanced">
          <summary>⚠️ Etwas nicht erledigbar?</summary>
          <div class="msg-field-group" style="padding:12px 14px">
            <label>Grund / Anmerkung</label>
            <textarea id="cleaning-reason" rows="2" placeholder="z.B. Wischmop kaputt, Reinigungsmittel leer..."></textarea>
            <button class="inbox-btn reject" style="width:100%;margin-top:8px" onclick="saveCleaningReason()">Speichern</button>

      </div>
    ` : `
      <div class="cleaning-success">

        <div class="cleaning-success-title">Top gemacht!</div>

      </div>
